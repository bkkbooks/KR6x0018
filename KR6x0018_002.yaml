body:
  text: 第一篇第一章無戲論品一無戲論本生談菩薩隊商主序分有關此無戲論法話為佛在舍衛城附近之祇園大精舍時所說佛對何人而云此話耶乃為長者之友人五百異教徒而言某日給孤獨須達長者率己之友人五百異教徒攜多數之華鬘薰香塗香及油蜂蜜糖蜜衣服等往祇園精舍禮佛供養華鬘等物更喜捨醫藥衣服與比丘教團彼等斥去六種錯誤著座坐法正當著座於一方彼等五百異教徒亦向佛禮拜彼等仰望佛顏吉祥如滿月相好具足為一尋後光圍繞之梵身向四周雙雙對對放射出大光明彼等接近給孤獨長老而坐時佛如雄黃山野原之幼獅作獅子吼如雨季雲雷之鳴如銀河群星之落如寶玉數珠繫擊之音佛以八音具足賞心悅耳之梵音說善巧方便甘露之法語聽佛法話心地清淨彼等由座起立禮拜十力之佛翻異教之心歸依佛教其後彼等常與給孤獨長者手執香華等物往精舍奉獻施物聽聞法話護持戒行恭行布薩說戒會佛由舍衛城再往王舍城佛去之後此異教徒再翻歸依之心回返異教還元狀態佛經七八個月後再返祇園精舍給孤獨長者復伴彼等參詣佛前供養薰香禮拜而坐於一方長者向佛申告彼等於佛遊行中破所獲得之歸依心回返異教還元狀態之事佛以無量億劫長久不斷所用之辨舌及依巧妙之威神力如啓天上薰香所薰種種馨香寶玉之函開如蓮華之金口出甘露之音聲而問曰汝等優婆塞破三寶之歸依翻還他之異教為事實耶彼等不能隱瞞而答曰世尊是為事實佛言優婆塞下由阿鼻無間地獄上極有頂天一旦無量之世界戒德具足無有及佛者況能勝佛乎汝等比丘一切生類由無足動物至二足四足之中如來為第一人無論此世彼世如謂具有財寶則有信仰之人為最勝者此為諸經所說示三寶之德如是歸依三寶之優婆塞優婆夷不落地獄陷惡趣超生天界得大成功是故破三寶之歸依汝等轉信異教實為大誤佛為使彼等解脫為達最高理想為說明歸依三寶者不落惡趣示以如次之經句歸依佛者不趣地獄捨人身後為天人姿歸依法者不趣地獄捨人身後為天人姿歸依僧者不趣地獄捨人身後為天人姿歸依種種他物為驚怖所襲山林遊園神樹非安歸依是亦非為最上歸依歸依此者不得脫一切苦歸依佛法僧者依正慧見四聖諦此為苦苦因苦滅導苦滅者八聖道分此為安穩歸依最上歸依依此歸依皆得脫一切苦佛不但如是說法更又云汝等優婆塞依憶念佛行法憶念法行法憶念僧行法將達預流道預流果一來道一來果不還道不還果阿羅漢道阿羅漢果等佛如是對機說法佛云汝等如是破三寶歸依實為不宜於是就憶念佛之行法等得預流道等事佛言汝等比丘修習一法增進完全使入厭離離貪滅絶寂靜神通正覺涅槃之道其一法云何即憶念佛是也此為經典所明示如是佛以種種方便訓誡優婆塞等汝等優婆塞於前生歸依非歸依之顛倒執思辨之人於非人鬼之領域恐怖之難處為夜叉之餌食陷入大滅亡中然無戲論有決心不持顛倒之念諸人雖在難處亦得繁榮佛語後沉默爾時給孤獨居士由座起立禮佛讚嘆合掌頭上而申告曰世尊今優婆塞等破此無上之尊歸依為疑念所囚繫豫等今已明了然於前世於非人領域難處之執思辨諸人之滅亡及執無戲論諸人繁榮之事唯世尊明了豫等尚未能知唯願世尊如於虛空月滿揭舉光明說明因緣於是佛言汝居士我於無量長時成十波羅蜜斷世間疑得一切知汝應如以獅子膏滿黃金管一語不泄傾耳細聽佛促長者注意如破叢雲揭開滿月說明前生隱藏之因緣主分昔日於迦尸國波羅奈之都有梵與王爾時菩薩生於隊商主之家次第成長達青年期率五百車輛經營商業或由西向東或由東向西遍歷各處又於波羅奈之都有一隊商主之子愚鈍而無臨機應變之才爾時菩薩由波羅奈持來高價商品滿載五百輛車中準備出發而彼愚鈍隊商主之子同樣滿載五百輛車亦準備出發爾時菩薩思惟若彼愚人與自己一同出行則千輛之車行道路上道路難耐諸人燃薪飲水困難牛亦不易得草彼或自己二者必有一為先行者於是招彼告知此事謂之曰豫二人不能同行君先行耶抑後行耶彼思豫若先行利益甚多能行未破壞之路牛食他物未觸之草能得他手未觸湯用之葉飲水清潔可隨意訂價賣出商品於是答曰豫將先行反之菩薩之見地以為後行利益甚多彼如是思惟先行者將使凹凸道路平坦自己將行彼等通過之道先行者之牛食強硬之草而自己之牛將食重新萌出之甘草由已摘取之葉跡所生湯用之葉味將甚美彼等先行將於無水之處掘水噴出自己可由其所掘凹處飲水隨意定價如同剝奪人命自己後行可按彼等之定價賣出商品菩薩見有如此諸多利益乃云君可先行愚隊商主之子云友甚善彼繫車出發通過人間之住處達到難處之境難處有盜賊難處猛獸難處無水難處非人難處饑饉難處五種住有盜賊之道路謂之盜賊難處住有獅子等之道路謂之猛獸難處無沐浴飲水之處謂無水難處非人鬼之住處謂之非人難處無可取嚼食物之處謂之飢饉難處於此五種難處之中此處為無水與鬼類之難處隊商主之子載有一碩大無平滿水之甕進入此六十由旬之難處當達難處中央時此處住有夜叉云廢棄彼等所攜之水使之衰弱然後將其人完全食之彼依魔力乘坐由純白之牛曳舒適乘物出現手執弓箭楯牌等武器由十鬼十二鬼圍繞飾以青蓮華白睡蓮濡濕頭部及衣服如人君之裝束坐於車上使車輪如塗泥狀由對方前來隊商主之子等皆於逆風吹時而乘車由從者圍繞以避黃塵坐於前方之車行進風由背後吹時則依此方法於後方坐車行進爾時正值逆風隊商主之子坐於前方夜叉見彼前來將自己之乘物避於路傍向彼寒暄交談問曰君往何處隊商主之子亦將乘物避於路傍與以通車之餘地立於一方向夜叉問曰友豫等由波羅奈都而來君等身飾青蓮花及白睡蓮手持赤蓮華及白蓮華口食蓮莖及蓮幹更車塗泥身滴水而來君等行來路上降雨耶前有赤蓮華等掩蔽之池水耶夜叉聞此語云友何出此言汝將見彼處緑林之蹤脈由彼處全部森林一面有水常時降雨充滿洞穴處處有赤蓮華所蔽之池水彼逐漸將車推進夜叉汝等之車曳往何處隊商主如是如是之處夜叉曰最後之車特重其中載有何物隊商主所載為水於是夜叉云由彼處運水君等所為甚善但水亦不需要由此向前有水甚多可毀甕棄水行路輕快更又作態云君等且行豫等已遲尚須趕路於是稍行前進達彼等不見之處入彼等之夜叉城中而此愚隊商主之子因其愚鈍信夜叉之言毀甕未留一掬之水全部捨棄驅車前進然其前方無一滴之水諸人不得飲料疲弊已極如是行至日落解車圍圓繫牛於車輪然牛無飲水人無粥食人等疲弊已極到處橫臥至夜半夜叉由夜叉城出奪牛與人之生命而食只餘殘骨而去如是因一人商隊主子之愚彼等一總破滅手骨四面八方離散五百輛車滿載而殘留於路上菩薩於隊商主之子出發後經一個半月率五百輛車出都漸漸到著難處之入口彼於此處盛滿水甕汲取大量之水於野營處鳴鼓集合諸人云如不得豫之許可一掬之水亦不可使用難處有毒樹凡前行路者汝等未曾食之樹葉花實如未向豫訊問不可食之彼如是告誡諸人率五百車輛次第進入難處當彼等到達難處中央時彼夜叉仍以如前之方法現身於菩薩之前菩薩見之頓悟此難處無水人謂無水難處即為此處彼之眼赤而無怖色又不見其身影此必先行之愚隊商主之子完全棄水疲弊已極與從者均為彼所食此大形夜叉尚不知豫之賢明機智於是彼向夜叉言曰汝等且去豫等為商人如未發現他處有水之時決不捨棄所持之水豫將於發現水處捨棄輕快而行夜叉稍向前行到著人所不見之處後歸入自己之夜叉城夜叉去後諸人向菩薩云尊者彼等諸人云彼處見有緑林之蹤脈由此向前常時降雨彼等著青蓮華與白睡蓮之華鬘一總持赤蓮華與白蓮華嚼食蓮莖與蓮幹濡濕頭部與衣服有水滴下並云豫等棄此水可輕車疾行菩薩聞此語即令停車集合全員問曰此難處有水及有蓮池之事以前曾有何人聽聞耶諸人尊者此事前所未聞人云此處為無水難處菩薩今有人云於此緑林蹤脈之對方降雨風雨吹送之力如何諸人尊者可達一由旬之處菩薩汝等有誰身觸風雨耶諸人尊者未有此事菩薩見有如何之雲層耶諸人豫等未見菩薩見電光之處如何諸人尊者將於四五由旬之處菩薩汝等有誰見電光耶諸人尊者豫等未見菩薩於如何之處得聞雷鳴耶諸人將於一由旬之處菩薩汝等有誰聞雷鳴耶諸人否豫等未聞於是菩薩曰彼等非人乃為夜叉使豫等棄水無力為食豫等而來先行之愚隊商主之子缺乏機智必捨水而疲弊為彼等所食五百車輛之滿載盡皆殘置我等今日將得見之一掬之水亦不可捨棄疾速前行菩薩如是催促從者等前行見滿載之五百車及人牛之手骨散離四方菩薩解車擺列圓形於張幕野營時刻使人與牛為取夕食使牛臥於諸人中央菩薩親自率隊長等執刀當夜之三時警戒之任以待天明翌朝整理萬事與牛以食捨弱車取強車捨廉價商品積高價之物達目的地後以二倍三倍之價賣出商品率領全體隨員再返原之都城結分佛述此故事後佛言汝等居士如是前生執著思辨者陷大滅亡固持無戲論者由非人鬼之手得脫安全到達目的地再還鄉里佛結此二事就無戲論而為法話成正覺後唱次之偈無戲論處某人說思辨者說第二物智者依此得開悟無戲論者彼應取如是佛向彼等優婆塞言授六欲天之三善成就法及梵天界成就法遂得授阿羅漢道者乃無戲論道而應生於四惡趣及五賤族者為有戲論道佛說此無戲論法話更依十六行相說明四諦說四諦竟五百優婆塞悉證得預流果佛說示此法話話此二事結取連絡本生之今昔佛言爾時愚隊商主之子是提婆達多其從者是提婆之從者賢隊商主子之從者是佛之從者賢隊商主之子即是我佛說法語竟二砂道本生談菩薩商隊主序分此本生談是佛在舍衛城時所作之談話此為何人所談乃對一無努力心之比丘所言某時如來佛在舍衛城城中住一良家子往祇園精舍佛前聽法話起信仰心見諸欲為可厭而出家為受具足戒費時五年覺二本典要目修學觀行於佛前選取與自己相應之業處觀法入森林為雨季之修行雖經三個月之努力微光之徵候亦未能表現於是彼如是思惟佛說有四種人豫將為最低級者豫此身究將能為何事佛所悟之道亦不得成豫今由森林生活往佛之側仰望秀麗第一之佛身聽聞如甘露之法以度此生活於是再還來祇園精舍彼之知人親友向彼云友君於佛之側選取業處決心欲行沙門之法今還來與衆人交互為樂汝於出家修行已達最高境界再不為受生者耶彼答曰友豫思豫為無能之輩不能得悟道之果是故停止精進努力而還來友人等謂曰友汝以堅固精進之心就佛教而出家捨棄精進實無理由汝須面謁如來於是攜彼往佛之側佛見彼來曰汝等攜此不欲前來之比丘究為何事比丘曰世尊此比丘奉解脫之教出家修行沙門之道今捨精進之心而還於是佛向彼問曰汝比丘汝捨精進之心為事實耶比丘曰世尊此為事實佛言汝比丘何以汝奉教出家而不自知為少欲者為知足者為遁世者為精住努力者之風範而示人為捨精進心之比丘耶汝前生乃一精進努力之人依汝一人之力使五百輛車行於砂漠之難處時人牛得飲物而安全渡過何以今捨精進心耶於是此比丘意念大為增強比丘大衆聞此語後向世尊懇願世尊今此比丘捨精進心豫等已明但前生依此比丘一人之努力於砂漠之難處使人牛得飲物而安全事關隱祕唯世尊一切知者得知伏請為我等說此因緣佛言汝等比丘諦聽為促此比丘等之注意佛說前生隱祕之因緣主分昔日迦尸國之波羅奈都梵與王治國時菩薩生於隊商主之家一人經營使用五百車輛之商業巡回於各處某日彼進入方圓六十由旬砂漠之難處此難處之砂有手握難存之細於日出後如燃火炬之熱赤足不能行走是故入此難處者薪水油穀等物載於車中於夜半行進天明止車列為圓形上張天幕於食事終了坐於蔭處渡過一日日沒進食待大地冷卻繫牛於車而行行進猶如航海攜同陸之嚮導者其人觀察星象命隊商前進爾時此隊商主亦依此方法渡行難處六十由旬中已達不足一由旬之處彼云再需一夜即可出離砂漠之難處於是於進取夕食後捨棄薪水繫牛於車行進嚮導者敷床於前車導者敷淋於車前仰觀虛空星象呼喚前進後即橫臥床上彼因長時未睡疲弊已極而眠以牛轉移方向尋原來之路而行未能留意牛行終夜嚮導者天明醒覺觀察星象云速轉方向然車轉正軌之時太陽已自東升諸人云此非昨日我等張幕之處耶今薪水俱無我等將滅亡矣於是解車列為圓形頭上張天幕各自於車下歎息而臥菩薩自思若我無勇猛精進之心則全體均將滅亡彼於朝涼之間各處徘徊見一吉祥草叢彼自思惟此草必下依水之惠而生命人執鍬挖掘掘至六十肘處於挖掘諸人鋤下有岩石阻塞諸人皆驚而停止努力菩薩更又思惟此岩石之下必然有水彼跳下立於岩上屈身以耳聽音果聞岩下流水之音於是出對侍童云汝若放棄努力則我等皆滅矣汝須努力不懈執鐵槌入穴向此岩石猛力一擊其他諸人皆停止努力唯有侍童甘受其言努力不懈下行入穴向岩石猛力一擊岩石由當中破裂下落堰止流水水柱升起如棕櫚之幹諸人皆大歡喜飲水沐浴劈斷餘軸及軛焚火煮粥而食日沒與牛以食近水穴處付記目標向目的地前進於是彼等賣出物品得二倍四倍之財産歸還己等故鄉於是彼等全其定命隨各自之業報而死去菩薩亦為布施等善行隨其業報離世而去結分等正覺者佛為此法話後唱次之偈不倦不撓掘砂道人人見出多量水牟尼佛得精進力不倦不撓得寂定如是述此法話後說明四諦說四諦竟廢弛努力之比丘證得最上阿羅漢果佛連絡此二事之話為本生今昔之結語以竟此法話爾時不棄努力裂岩給與大量之水之侍童是此棄捨努力之比丘爾時其餘諸人是今生為佛之從者爾時之隊商主即是我三貪欲商人本生談菩薩商人序分此本生談是佛在舍衛城時就某廢棄努力比丘所作之談話一如前談話時比丘等引彼比丘前來佛向此比丘云汝比丘汝就與汝如是道果之教而出家今放棄努力如賽利瓦商人失去價值十萬黃金之碗而永久悲哀比丘等為明其故向佛乞願於是佛說明前生隱祕之因緣主分昔日由今第五劫之昔菩薩於賽利瓦地方為名賽利瓦之行李商人行商彼與一貪欲之行李商人名賽利渥者同渡奈拉瓦哈河入安達普拉市劃分市街於自己入手之街巡回叫賣商品而另一人則準備接收入手之市街此市前有一紳商今已完全零落親子兄弟財産一切失去只餘一女與彼祖母生存二人均為他人雇傭而生活其家大紳商昔日使用之黃金茶碗棄置於他物之間不用為塵土塗蓋二人不知其為黃金茶碗恰於其時此貪欲商人叫賣請買寶石飾物請買寶石巡回步行來至其家門前其女見商人向祖母云祖母請為豫買一瓔珞飾物祖母豫等貧窮之身如何買物女豫等有彼茶碗亦不需要賣之可買於是祖母呼商人入使著座觀看茶碗云汝買此物與女任何飾物商人手取茶碗自思此似為黃金茶碗回轉觀察見碗底有針刻入之紋視之知確為黃金彼思豫將一文不與取此茶碗彼云此無任何價值之物半磨沙迦亦不值投碗於地上由座起立而去一人進入而又出去之街當然他人接手而入菩薩入其街請買寶石飾物繼續叫賣來至其門前女向祖母如前所云祖母向女曰先來商人投茶碗於地而去今以何物買之女先之商人言語粗暴今之商人優雅風采言語柔和必能大方收買祖母如是呼彼請入於是女喚彼入商人入其家坐時二人使彼觀看茶碗彼知此為黃金彼云此茶碗值十萬金只此茶碗價值物品豫之手邊不足祖母貴君先來之商人謂此碗不值半磨沙迦投諸地面而去今依貴君之功德得變為黃金茶碗豫等願將之奉上任君惠豫何物請君持去於是菩薩將手邊所有金子五百迦利沙波拏與價五百金之物品悉數與之請只與豫稱袋及八迦利沙波拏彼只要求此數受碗而去急往河岸與船頭八加利沙波拏乘船渡河其後貪欲之商人又再往女家云請與我茶碗貴女有何所需豫將付與彼女責彼曰汝對豫等價值十萬金之黃金碗不付半磨沙迦之價值與豫然有一似汝主人之正直商人投以千金持之而去貪欲之商人聞此語後彼知失此黃金茶碗對己為莫大損失心中沉痛憂慮失心而不起記憶散撒己手所持之金錢與商品上衣與下衣均皆捨脫手持稱桿代替棍棒逐菩薩之後到達河岸見菩薩乘船而行高聲喊叫船頭回船返來菩薩制止云不可返回原岸渡彼而此貪欲商人見菩薩行去愈積悲憤之情心臟熾熱口中迸出鮮血心臟如旱魃之池泥燥裂彼於抱怨菩薩聲中忽然命終此為提婆達多對菩薩最初之遺恨菩薩為布施之善行隨業報離此世而去於成正覺之結分等正覺者佛為此法話後後唱次之偈若於現世反導正法永受苦惱如賽利商結分如是佛以彼證阿羅漢為目的進說至話之頂點說明四諦說四諦竟捨努力之比丘證得最上阿羅漢果佛述此二事緣由之話畢連結本生之今昔謂爾時之愚商人是提婆達多賢商人即是我四周羅財官本生談菩薩財官序分此本生談為佛在王舍城附近之耆婆菴羅林對周羅槃特小路大德所述之談話於是對周羅槃特之出生必須敘述之王舍城之某豪商之女與其家僕相愛恐他人知其所為彼女云豫等不能居於此處若豫父母知此惡事豫將被追放須往他國定居於是持所有物出門而逃二人前往各處尋覓人所不知之處彼等於同居之間彼女懷妊臨月之時與夫相談豫將臨月豫等遠離知人與親戚於此處生産豫等彼此皆苦不如歸家然其夫云今日歸去明日歸去空蕩時日於是彼女自思此愚者為大惡事不敢前往世間唯有父母乃大恩惠者彼人行與不行豫將自行於是整理家具告知鄰人往己之生家而出發時其夫歸家不見彼女詢問鄰人告往生家彼急行逐後於途中追及彼女已於其地生産問其故妻夫君豫已生男兒夫將如之何妻豫因欲生産思歸生家於途中生産今已無往歸彼處之必要莫如仍返原處二人同意回返因於道路生子取名槃特道路彼女不久又再懷妊詳情仍如前述因皆於鄉里歸途所生最初之子名摩訶槃特大路次名周羅槃特小路彼等攜其二子歸往住家其間槃特童子聞其他兒呼喚叔父祖父或祖母問其母曰母親他人之子有叔父祖父祖母何以豫等無有親類母此處無汝等之親戚於王舍城有大富有之祖父彼處汝等有多數之親戚子母親何以不往彼處彼女數度向其子解釋自己不能前往之理由彼女後向其夫云此子等非常使豫困惑豫之父母雖見豫等亦不致食豫等之肉豫等使豫等之子往祖父之家一見夫豫不能與之會面汝可攜子前往妻無論如何亦應使子等得見祖父之家為宜於是二人終於攜子到達王舍城中宿於都門入口處之屋舍彼女攜二子前往告知自己父母歸來之事父母聞語後云流轉輪回之身不能無子然汝等為豫等之大罪人豫等眼前不能留置同居汝等可持去若干財産二人可往安樂之土地度日二子可寄養於此處長者之女受取父母所贈之財産而將二子交付伴來之使者二子於祖父之家成長其中周羅槃特年幼摩訶槃特隨同祖父一同往聽十力佛之說法於佛面前常聞法語起出家之心彼告祖父云若祖父等許准豫將出家祖父云善哉汝言汝之出家較全世界人出家為難能可貴如能如願許汝出家於是伴彼往佛之前佛長者汝如何得子長者世尊此子為豫之孫彼願侍佛出家佛命一托鉢僧曰汝為此子剃度出家長老向彼說示皮五業處行出家之式彼憶持諸多佛語達成年後受具足戒專心修行達阿羅漢果彼樂禪定享道果之樂而度日彼自思惟將以如是之樂與周羅槃特於是往祖父長者之前云長者若汝允許豫思使周羅槃特出家長者答云善哉豫許其出家彼使周羅槃特出家並受十戒而為沙彌之周羅槃特生性愚鈍雖然出家經四個月尚不能諳記左列一偈馨芳之紅蓮於曉綻香薰以看遍照佛輝空如日輪彼昔日於迦葉佛出世之時出家時甚為賢明因於他之比丘諳記教語時加以嘲弄比丘受彼嘲弄感恥蒙羞於是不復諳記教語亦不復誦依此業報彼雖出家亦甚愚鈍諳記經句亦讀後即忘而彼勉勵諳記此偈經四個月爾時摩訶槃特告彼曰槃特汝無奉教資格經四個月不能奉持一偈汝何能出家修達最上之位汝宜由此寺離去其兄強制將彼放逐周羅槃特慕佛之教不欲為在家之人爾時摩訶槃特為管齊者一小兒醫師耆婆持多香華自往菴羅果園中供養佛陀聽聞說法由座起立禮拜十力佛後接近摩訶槃特問曰尊者佛前有幾多比丘摩訶槃特有五百人耆婆尊者明日佛為上首汝引導五百比丘請至豫家受食摩訶槃特優婆塞周羅槃特愚鈍之人不悟正法除外餘者接受招待周羅槃特聞長老之言自思吾兄於如此比丘衆等接受招待而豫受除外彼必對豫無兄弟之情矣如是此教說對豫已無意義莫如在家積布施等善行而生活於是彼於翌日云豫將還家言畢離去佛於天明觀察世間見知此事於是先周羅槃特遊行於彼出走道路城門之邊周羅槃特由家中出見佛而禮拜於是佛向彼問曰周羅槃特汝今時分欲往何處周羅槃特世尊吾兄無理將豫放逐是故豫今徘徊佛周羅槃特汝就我而出家若為兄放逐何不來豫前汝在家何為汝且來豫前佛遂帶領周羅槃特至香室佛房之前使坐曰周羅槃特汝面向東方只居於此處手撫此布片口念除去塵垢除去塵垢佛與以神通力作成純淨之布片佛於約束之時刻由比丘衆圍繞往耆婆之家著於所設之座周羅槃特仰望日輪念除去塵垢除去塵垢手撫布片而坐此布片於撫摸之中污染彼就此自思此布片確為極清淨之物今為豫而捨去前之自性成為污染誠為諸行無常於是彼起盡滅觀而增觀察智佛知周羅槃特之心已上觀察智佛言周羅槃特汝不僅思此布片為易染塵垢之物當思除去心內之諸欲塵佛放光明恰如彼思佛坐其面前唱次之偈曰塵垢不得稱不淨不淨是貪欲染污不淨貪欲之異名捨此不淨比丘衆離貪不淨住教中塵垢不得稱不淨不淨是瞋恚染污不淨瞋恚之異名捨此不淨比丘衆離瞋不淨住教中塵垢不得稱不淨愚癡是不淨染污不淨愚癡之異名捨此不淨比丘衆離癡不淨住教中唱此偈終了時周羅槃特得四無礙辨同時達阿羅漢果依四無礙辨通達三藏彼於前生為國王時右繞城廊額頭出汗彼以清淨布片拭額布片污染彼思為此肉身使此清淨布片捨自性而被污染諸行洵屬無常於是而彼得無常想依此因緣為彼除去塵垢之緣小兒醫生耆婆向十力佛行水供養爾時佛曰耆婆精舍尚餘一比丘佛以手覆鉢摩訶槃特云世尊寺中已無一比丘佛云耆婆尚有一人耆婆如是往精舍察看有無比丘等在於是遣人前往此時周羅槃特自思吾兄云精舍無有一人豫今示彼精舍有諸多比丘之事於是彼化現各種情狀不同比丘一千人使菴羅林中全部充滿比丘或有比丘為懸掛衣服之事或有比丘為染色之事或有比丘為讀經之事使見精舍有諸多比丘歸去向主人耆婆報告主人菴羅林之一面充滿比丘爾時高僧周羅槃特亦急速將己身化為一千槃特心情愈快坐於菴羅林中靜待事態之發展爾時佛向使者彼男言曰速往精舍示知佛喚周羅槃特彼往告知一千人皆云豫乃周羅槃特豫乃周羅槃特彼男歸來云世尊千人皆云為周羅槃特佛言如是汝再一度前往捕捉最初自行報名為豫為周羅槃特之人則餘人均將消失無蹤彼往如言而為千人比丘忽然消失周羅槃特與來迎之人一同前往佛於食事完畢後向耆婆為如是之言耆婆汝取周羅槃特之鉢彼將向汝表歡喜之意耆婆如言而為高僧如幼獅為獅子吼高誦三藏天地震動表歡喜之意於是佛由座起立由比丘等圍繞回歸精舍示比丘衆應行之事由座起立立香室佛房之前對比丘教團善逝佛與之教誡說業處之修行激勵比丘教團然後入佳香所薰香室右脅向下就獅子之牀而臥晡時比丘等由各處集來法堂恰如褐色羊毛布環繞之幕狀列席而坐開始話談佛之威德諸位法友摩訶槃特不知周羅槃特之性格四個月間不能使之諳記一偈以其弟為愚者由精舍強行放逐等正覺者佛依彼無上法王之力於一次食事之間善能授與四無礙辨及阿羅漢位依無礙辨彼得精通三藏洵屬諸佛神力之廣大是時佛知法堂有此談話佛思今為自己應往出堂之時於是內著二重之衣締繫如電光之帶披如褐色羊毛布之善逝佛之大衣由佳香所薰之香室出來美如醉象獅子堂堂振步表無限佛德而往講堂於嚴飾堂之中央心情愈快升入設備華美佛之高座放六色光明能深照海底又如由犍陀羅山頂所出之旭光坐於座之中央當佛到來之時比丘教團之談話頓止而沉默佛以柔軟慈愛湛然遍觀比丘大衆佛言比丘集會洵屬莊嚴寂靜無一人動手動足出咳噴嚏此皆為見佛之莊嚴而起尊重之念畏服佛之光明假令我於一生不開口云事而坐則將無先開始談話者我應知開始談話之機會我應最先開口於是佛以如甘露之梵音問比丘等曰汝等比丘今有何談話集於此處耶汝等中途何為停止言談耶比丘等答曰世尊豫等坐於此處非談卑俗之話為讚嘆世尊之威德而坐談汝等法友摩訶槃特不知周羅槃特之性格經四個月不能諳記一偈謂彼為愚者由精舍強制放逐然等正覺者佛依無上法王之威神於一次食事之間使彼得四無礙辨並授與阿羅漢位彼依無礙辨而精通三藏佛之威力洵屬廣大豫等坐為此語佛聞比丘等之語而言曰汝等比丘周羅槃特今依我於教法中得大法益前生亦依我得財産中之大財産比丘等為明其意向佛乞願佛乃說明前生隱祕之因緣主分昔日於迦尸國之波羅奈都梵與王治國時菩薩生於財官之家長繼其業名周羅迦色提小財官彼賢明伶俐洞悉一切之前兆某日彼隨王而行途中見一死鼠即時參酌星宿思考自語云聰明之男子取此鼠去能得娶妻而經營職業爾時一窮困男子名周蘭特瓦西迦聞此財官之言自思彼不可能言不知之事於是彼男子取鼠於某酒店中施與一貓獲得一厘之錢彼以一厘入手糖蜜置水瓶中為飲料水彼由森林中出見華鬘匠等與少量糖蜜及一杓之水彼等與彼一握之華彼以華之代價翌日又以糖蜜與水瓶入手往花園而去是日華鬘匠等以摘剩半數之草花與之而去彼以此方法不久獲得八加利沙波拏又某風雨之日於宮殿內之遊園地為風吹落多數之枯幹枝葉於地上園丁不知如何棄捨之方法彼往其處告園丁曰如君將此枯枝及葉與豫豫代君將此等殘物運去園丁承諾云請汝取去彼信奉小財官之說可謂之為小財官之弟子彼往兒童遊玩場所與以糖蜜兒童為其運去枯樹及葉堆積於園林之入口處時有王之陶器師欲為王家燒陶器而求薪至遊園入口處見此即由彼手購買而運去彼即日賣薪得十六加利沙波拏此外尚入手五甕及五陶器於是彼有二十四加利沙般拏入手時彼云豫有更佳之方法彼於距城門不遠處置一水甕供給五百刈草人之飲料水彼等云吾友君為豫等之大恩惠者豫等為君能為何事彼云豫有要事之時當請協助此後彼到處巡回經營之間與水陸各商者相親陸上商人向彼曰明日有販馬者至將帶此村五百頭馬而來彼聞此語向刈草人云今日每人請與我青草一束豫之草賣出之前請勿賣草彼等承諾甚善於是持五百草束前來積置於彼家中販馬者於全村內不得馬之食草竟以千金與彼將草取去其後復經數日某日水上商人告彼云大船將來著港彼仍謂彼有善法彼以八加利沙波拏之金租借具備一切附屬人員品物之豪華馬車威風凜凜堂堂入港於是與以指環締結購買船貨之契約彼於船之近處張天幕而坐命令隨從人員曰由外來此商人會豫須經三人之門衛通報爾時有百名商人聞船來由波羅奈都城來此欲購品物入手船上諸人云君等不得購物此船之品物已由某處之大商人締結收買之契約彼等聞此齊來此男之處從者如前之所言通過三人之門衛始能與之會面於是百名商人每人各出千金始得與彼共同進入船內更相互商權由每人再各出千金請彼放棄所有權利品物由商人各自購得於是彼得二十萬金回歸波羅奈而去為表謝意彼持十萬金往小財官之前爾時財官向彼問曰汝為何事得此財産彼云依君之所言於四個月間而得如是之財富彼由死鼠之事開始向財官語一切經過之事此事為大財官所聞曰此人不可為他人奪去於是將其成年之女與之為妻作此金家族之主人大財官死後彼就市之財官職菩薩小財官亦隨其業報而去世等正覺者為此法語成正覺後說次之偈具眼之賢者僅有一厘金善能起其身如吹一點火結分如是佛言周羅槃特今依我得諸法中之大法彼於前生即已得財産中之大財産如是佛述此法話連絡此二事情作今昔之結語爾時之周蘭特瓦西迦是周羅槃特而周羅迦色提小財官即是我五稻稈本生談菩薩評價官序分此本生為佛在祇園精舍時對愚鈍之優陀夷大德所作之談話當時教團之管齊者為末羅族出身之沓婆尊者彼於晨起用籌碼為領取飯食之記號而優陀夷大德有時領得良食有時領得劣飯彼於領得劣飯之日輒赴籌室中騷擾吵鬧彼云何以唯沓婆知如何分與籌碼而我等不知某時彼照例赴籌室騷擾諸人云今日請由汝分與籌碼於是將籌籠交付彼自此以來由彼分與教團籌碼然當分籌之時有關良食與劣食之事某長老應分良食某長老應分劣食彼亦不知又有關規定席次此處為某長老之席彼處為某長老之席彼亦不能識別因此於比丘等就座之時此處為彼之席彼處為此之席於地上或壁上刻有記號然翌日籌室之中有少數比丘之處與多數比丘之處少數之處記號在下方多數者則為上方而彼不知席次只按記號以與籌碼於是比丘向彼云優陀夷記號雖或在下方或在上方但某長老為良食某長老為劣食應妥為準備但彼反駁云如是作記號又何為耶豫如何能信汝等豫只信記號於是年青比丘與沙彌等云優陀夷貴君與籌使比丘等之所得減少貴君之與法不當請由此離去將彼由籌室逐出爾時籌室非常騷亂佛聞之問阿難尊者阿難籌室甚為騷亂為何故耶阿難向如來佛白告其由於是佛言阿難優陀夷因自身愚鈍使他人所得減少非自今始前生亦為是事阿難為明其意向佛乞願於是佛說明於前生之隱祕因緣主分昔日迦尸國之波羅奈都有梵與王爾時菩薩為王之評價官其任務為規定象馬寶玉黃金等品物之價格經評價之物品與以相當之代價與所有者而王甚貪欲由其性格生來之貪欲彼如是思惟彼評價官如是評價我家之財産不久即將蕩盡須得一其他之評官王開窗眺望庭園見一愚鈍之田夫由庭園中通過王思惟彼男可服評價官之任務於是呼彼問曰汝能否當豫評價官之任務彼男答曰豫能王為保護自己之財産使彼愚者就任為評價官爾來愚者當規定象馬等之價時忽視真價任意與價在彼服務期間物品市價由彼口出此時由北方一販馬者率五百頭馬前來王呼彼男評估馬價彼對五百頭馬付以一稻稈之價彼以一稻稈與販馬者而將馬入廄販馬者往以前評價官之前告以此事問曰如之何則可菩薩曰汝可向彼男贈與賄賂並可如此發問豫已認知豫等之馬只值一稻稈之價然豫等欲知一稻稈之價究為幾何貴君可否於王前言明一稻稈之價值如彼允諾請與彼即往王前屆時豫亦前往販馬者謹知臺命應諾菩薩之言賄賂愚鈍評價官後告知此事彼收受賄賂對販馬者云豫可為一稻稈之評價於是販馬者豫等至王宮謁王彼伴隨評價官往王之處菩薩亦與其他諸多大臣同往販馬者向王作禮問曰大王豫已知豫之五百頭馬之價相當於一稻稈之值然一稻稈之價值幾何請王問評價官王不知此事問曰評價官五百頭馬之價位幾何評價官答一稻稈之價王更問曰五百頭馬其價為一稻稈然一稻稈之價位幾何愚鈍評價官答曰一稻稈之價相當於波羅奈都及郊外之地彼先迎合王意云五百頭馬等一稻稈更由販馬者之手收受賄賂云一稻稈之價相當於波羅奈城外之地而波羅奈之城壁四周為十二由旬其郊外則有三百由旬然此愚人將廣大之波羅奈及其郊外規定為一稻稈之價諸大臣聞此拍手大笑云豫等至今尚思土地與領土為未可評價之物而今如此廣大之波羅奈與王一同為一稻稈之值評價官洵屬具備智慧評價官於何處度過如是之年月耶實與我等之王相應諸大臣等大加嘲笑此時王甚感恥辱將此放逐愚人後授菩薩評價官之職菩薩隨其業報離此世而去結分佛說示此法話後取此二事之話連絡作本生今昔之結語爾人田野之愚鈍評價官即是愚鈍之優陀夷賢明之評價官即是我六天法本生談菩薩王子序分此本生談為佛在祇園精舍時對某多有財産比丘所作之談話住舍衛城有某資産家遭遇喪妻而出家彼出家時為己建之住房炊事場貯藏庫貯藏庫中滿貯酥油米等物出家後呼自己之家僕如自己之意調理食物而食用具豐富晝夜以不同之衣服交換纏身住於佛之精舍附近某日彼為風乾衣服敷具於住房擴展之時由地方湧來諸多比丘遍歷比丘之宿舍往彼住房見衣服等物問曰此為何人之物彼云乃豫之物比丘等問曰此為上衣此亦上衣此為下衣此亦下衣而此為敷具此皆君之物耶彼答唯然此豫之物比丘等謂曰佛只聽有三衣君既歸依重少欲之佛教而竟持有如許之道具今將帶汝往十力佛之前於是捉彼往佛之前佛觀此比丘云汝等比丘緣何汝等帶此嫌厭之比丘前來諸比丘答世尊此比丘多蓄財物與家具於是佛向彼比丘問曰汝持諸多財物為事實耶彼答世尊實為事實佛言何故持如此諸多財物耶就少欲知足離群精進諸行非我所稱讚者耶對少欲知足離群精進諸行非我所稱讚者耶彼聞佛之言瞋怒云豫將為如是之狀於是脫棄上衣於衆人之中只著一衣而立爾時佛乃庇護於彼佛言汝比丘汝於前生求慚愧心為水中羅剎鬼神時經十二年間何故今就如是可尊之教出家後竟於四衆當中脫棄上衣捨慚愧心而立耶彼聞佛語起慚愧心著上衣禮佛而坐於一面比丘等為欲明其故向佛乞願佛於是說明前生隱祕之因緣主分昔日迦尸國之波羅奈都有梵與王爾時菩薩宿於皇后之胎內誕生後命名之日取名為化地王子王子能為奔跑之時皇后又生一王子取名為月而於此第二王子能奔跑時菩薩之母皇后亡故王立其他一人為皇后彼女受王之寵愛同居結果生一王子取名為日王見此王子歡悅滿足云皇后豫將此子以授贈物皇后無時不在欲望之時向王申言受得賜物而彼王子成長時向王申述云此子生時王云賜與賜物請授我子以王位王豫之他二王子如火聚放光而成長不能讓王位與汝之子加以拒絶但彼見皇后數度請願國王自思惟皇后對豫二子將圖謀惡事於是呼二子前來曰吾子豫於日王子生時曾云以與贈物今其母皇后要求王位豫不想授與然婦人者有惡心故對汝等將懷惡念汝等且入森林待豫死後可歸王家所領都城執掌政治王慟哭吻二王子之頭送二人出二人向父王作禮由降下宮殿時在宮殿遊玩之日王子見此情形悟其理由彼云豫亦與兄等一同前往森林於是與其兄二人一同而去三人進入喜馬拉雅山內菩薩長兄離道坐於樹下向日王子曰日弟汝往彼湖水沐浴然後取水用蓮華葉為我等持來此湖水乃由毗沙門天之手交付某水中鬼神領有毗沙門天向水中鬼神如是云凡知天法之人以外任何入水者皆可食之但不入水者則不可食爾後水中鬼神對凡入水中者問其天法不知者即常被食之時日王子往此湖畔未加任何考慮巡回即行涉入鬼神捕王子問曰汝知天法耶王子答天法乃日月之事鬼神云汝不知天法於是將王子牽入水中使立於其住處菩薩見彼遲遲不歸遣月王子前往亦被鬼神所捉問曰汝知天法耶月王子答唯然豫知天法乃四方之事鬼神云汝不知天法亦捉彼立於其住處菩薩見月王子亦遲而不歸思此必有何故障於是自往彼處見二人涉入之足跡水中鬼神見菩薩來至水邊並不涉入遂伴作樵夫向菩薩云丈夫汝旅行疲勞何不降入湖水中沐浴飲水食蓮華之莖身飾蓮華豈不愈快菩薩見彼知為夜叉問曰汝捕豫之兄弟鬼神唯然乃豫捕之菩薩何故捕之鬼神凡入此湖水者豫即捕之菩薩何故汝捕所有之人鬼神知天法者除外其他者皆與捕之菩薩汝欲知天法耶鬼神唯然菩薩若然豫為汝說天法菩薩曰豫手足污垢難說天法鬼神使菩薩沐浴為之取食飲水飾華塗香裝飾講堂於中央伸展席位與坐菩薩就座使鬼神跪於足下曰汝等專念諦聽天法唱次之偈具足慚愧心專念清白法善士世寂定被稱為天法鬼神聞法話起清淨歡喜之心向菩薩如是云賢者我等依貴君之力起清淨歡喜之心可釋汝兄弟一人汝帶何者而去菩薩請帶幼者前來鬼神賢者貴君雖知天法但未能實行菩薩何以故鬼神置年長而攜幼者其故非敬長之道菩薩爾諸鬼神我知天法且正實行我等來此森林亦為彼之緣故彼母為彼向我等之父要求王位我等之父不與其賜物王位而為庇護我等許住森林彼王子不還願隨我等而來如豫云其於森林為鬼神所飱無人相信因此豫恐受責難故呼彼回返如是鬼神起信仰心對菩薩述讚嘆之辭將兄弟二人皆帶來爾時菩薩向鬼神云友汝因往昔所行之惡業食他人之血肉而生為鬼神如今更為惡事此惡果將使汝不脫出地獄因此自今以後應捨棄惡事多行善事菩薩如是調伏鬼神後受其護衛住於其處某日觀星知父王死去彼等攜同鬼神還波羅奈即王之位以月王子為副王授日王子為大將軍之位為鬼神擇一佳地建造住居使得最上華鬘最上之華最上之食菩薩依正義而行政治隨其業報離世而去結分佛述此法話後說明四諦說四諦竟此比丘證得預流果等正覺者佛話此二事情更取連絡為作本生今昔之結語爾時水之鬼神是此多財比丘日王子是阿難月王子是舍利弗而長兄化地王子即是我七採薪女本生談菩薩採薪女之子序分此本生談為佛在祇園精舍時對剎帝利族之女雨日蓋所作之談話此一事端將於第十二篇賢沙羅本生談四六五中說明彼女為釋迦族摩訶那摩之女那伽芬陀下婢所生拘薩羅國王之王妃彼女生産王子其後王知彼女乃下婢所生斥奪妃位及其子威多達巴亦使棄太子之位並將其母子二人禁閉於室內佛知此緣由朝時由五百比丘圍繞往王之宮殿著於座席問曰大王剎帝利女雨日蓋在於何處王告以緣由佛大王剎帝利女雨日蓋為誰之女王世尊摩訶那摩之女佛彼女歸屬誰而來王世尊當然為我之眷屬佛彼女乃王女為王來歸依王舉子王子何故不能為父領王國之主權者王於前生與採薪女暫時關係所生王子王尚讓國與其子於是王為明了其事向佛請願佛遂說明前生之隱祕因緣主分昔日於波羅奈都梵與王鹵簿堂堂前往遊園於其處為尋求華及果物巡回遊步之間於遊園之林中見一採薪女在歌唱王起愛著之心與之同宿於此剎那菩薩宿於彼女之胎中彼女之腹忽然如充滿金剛石塊之重彼女知己妊娠向王告言大王豫已妊娠王與指環曰若生女者賣此以為養育之金若生男者攜子持指環前來豫前語畢離去彼女月滿産下菩薩至能各處奔跑之時前往遊戲場遊玩有如是云者豫為無父之子而被打菩薩聞此往母前問曰母親豫父為誰母吾子汝為波羅奈王之子菩薩母親有何證據母吾子王與指環云若為女子賣此為養育之金若為男子持此指環攜同此子一同前來豫處語畢而去菩薩母親如是為何不帶豫往父之前彼女知其子之願遂往王之門前得向王通報為王呼入宮殿向王作禮女告言曰陛下此為貴君之子王知此事但於衆人之中思為可恥曰此非豫子女此為王之印王應知之王此非豫之印女豫無他證人但豫今立誓若此子為依王而生者應立於虛空若非王種即墮落地上而死於是捉住菩薩雙足投向虛空然菩薩即於虛空結跏趺坐如甘露之音聲而為父王說法唱次之偈大王我為汝子人主汝應養我王養他物況己之子王聞菩薩坐空中如是說法乃伸手曰吾子豫將養汝大衆伸出千手欲接但菩薩不落於他手而降坐王手坐於膝上王與菩薩副王之位使其母為正妃彼菩薩於父王死後即王位名運薪王依正義而行政治隨業報離此世而去結分佛向拘薩羅王為法語後連結說示此二事情作本生今昔之結語爾時之母是摩耶夫人父是淨飯大王運薪王實即是我八首領王本生談菩薩師尊序分此本生談為佛在祇園精舍時對一不急精進亦不努力比丘所作之談話此本生談有關現在與過去之事端將於第十一篇防護童子本生談四六二中說明此一談話與彼本生談相同惟偈相異主分首領王子守菩薩之教誡彼為百人兄弟中之最年少者彼為百人之兄弟圍繞於白傘之下坐於寶牀之上見自身之榮耀已極彼滿足於自身至極之榮譽思此乃我師尊之所賜為唱優陀那偈雖然不急應望果熟我梵行熟首領王應如是知彼即王位經數日後兄弟皆往自己住所而離去首領王依正義執行政治隨業報離去此世菩薩亦行福德隨業報離世而去結分佛述此法話後說明四諦說四諦竟懈怠之比丘證得阿羅漢果於是佛說此二事情作本生今昔之結語九摩迦王本生談菩薩王序分此本生談為佛在祇園精舍時對大出家所作之談話此於因緣談中已與說明爾時比丘等就十力佛之出家讚嘆而坐時佛往法堂坐佛之牀席如是告比丘等汝等比丘今有何話集於此處對此發問比丘等曰世尊豫等無別話論惟就世尊出家讚嘆而坐佛言汝等比丘如來佛出家非自今始於前生即已有出家之事於是比丘等為明其意向佛請願世尊遂說明前生隱祕之因緣主分昔日於韋提訶國之彌絺羅都有摩伽王為一純厚信仰正法之守護者法王彼經歷八萬四千年或為王子而遊戲或為副王而執行政治或為大王而執掌政治一一經過長年月某日彼向理髮師曰理髮師如見豫頭有白髮請與告知理髮師經過長年月日後某日見王之安繕那青黑色之髮間有一根白髮彼告王曰大王見有一根白髮王云如是將白髮拔下置於手上理髮師以金鑷子拔取置於王之手上爾時王仍有殘餘八萬四千年之壽命雖然如此王見白髮王以死神已來己身之側又其身炎炎如入燃燒之草菴以悲嘆之心情度日彼心中自思摩迦王汝實愚蠢緣何生白髮而不能斷此煩惱於是彼思念白髮之出現身內熱氣上升而流汗感覺衣服壓迫身體而須脫下王思惟今日為豫應出家之時矣於是以有十萬金收穫之村落與賞賜理髮師呼己之長男告曰吾子豫之頭現白髮豫已至老年人間諸欲既已享樂今思將求天欲此為豫應出家之大好時機汝踐王位豫往摩迦提瓦菴婆羅果園出家將修沙門之法如是大臣等來欲思出家之王前問曰大王何故欲出家耶王手執白髮向大臣等唱次之偈此一白頭髮奪豫生之齡出現死天使今豫出家時王如是語畢即日棄王位出家為仙人住於摩伽提瓦菴婆羅果園於八萬四千年之間修四梵住得不退禪定死後生梵天界由此世消失於彌絺羅之都為尼彌王糾合自己離散之一族於菴婆羅園出家修梵行再生於梵天界結分佛云汝等比丘如來非只於現世行大出家前生亦有出家之事佛說此法話後更說明四諦於是有得預流果者有得一來果者有得不還果者如是佛語此二事情與以連結作本生今昔之結語爾時之理髮師是阿難王子是羅睺羅而摩迦王即是我一樂住本生談菩薩道士序分此本生談是佛在近於阿㝹比耶都之阿㝹比耶菴婆羅果園時對過安樂生活之跋提長老所作之談話樂住之跋提長老是由剎帝利族出家六人中之一人加入優波離則為第七人之出家者其中跋提金毗羅婆咎優波離成阿羅漢果阿難陀得預流果阿㝹樓得天眼提婆達多修得禪定有關六人之剎帝族及阿㝹比耶都城之事將於司祭官本生談五四二中說明長老跋提為王之時彼守護自身如司守護之天神為多數護衛嚴守居於高樓臥於大牀仍感恐怖今達阿羅漢果於森林等處隨意遊步自行觀察已離恐怖不由發泄感嘆之聲今已如何之安穩今已如何之安穩比丘等曰長老跋提已明言其聖果阿羅漢果於是將此事向佛白告佛言汝等比丘跋提為安住之身非自今始於前生即已住於安穩比丘等為欲明其意義向佛請願佛為說明前生之隱祕因緣主分昔日於波羅奈之都梵與王治國時菩薩生為北方大富豪之婆羅門彼觀諸欲為身之禍出家乃身之利益捨諸欲入雪山為仙術之修行者遂得八成就法彼之從者甚多有五百道士彼於雨季由一群之道士圍繞而出雪山遊行城邑聚落達波羅奈都受王之支付供養定住於王之遊園地方雨季四個月過後彼向王告假王向彼曰尊者年老何故欲還雪山尊者請住此處命弟子等還歸雪山於是菩薩託五百道士於最年長弟子云汝與彼等共住雪山豫止於此處菩薩送彼等出後即定住於此處此最年長弟子曾經為王彼捨廣大領土而出家修迦師那竟體得八成就法彼與其他道士共住於雪山某日彼欲往會師尊告其他道士云君等勿憂且住此處豫往禮拜師尊即行歸來彼往師尊之前敬禮懇切交談然後展毛氈敷具坐於師尊之傍爾時值王前來造訪往遊園地禮拜菩薩坐於一方而弟子之道士見王不由座席起立彼坐而發感嘆之聲今已如何之安穩今已如何之安穩王因道士見王而不起座心頗不喜向菩薩云尊者此道士蓋已充分如意進食發泄感激之聲於座上表安樂之相菩薩云大王彼道士原如貴君為一王者彼曾謂豫以前在家之時賴王之威光雖由多數執武器者護衛但不得安樂今彼出家身得安樂彼依得禪定之樂發泄感嘆之聲菩薩向王說此法話而唱偈無他之護所自亦不護他大王不望諸欲者彼得臥安樂王聞此法話心甚滿足於敬禮後返還住處弟子亦向師敬禮歸雪山而去菩薩住此處修行禪定不怠死後生梵天界結分大師說示此法話後連結此二事情作本生今昔之結語爾時之弟子是跋提長老道士之師尊即是我第二章戒行品一一瑞相鹿本生談菩薩鹿序分此本生談為佛在近王舍城之竹林精舍時對提婆達多所作之談話有關提婆之事是欲殺害佛為目的將於犍陀羅本生談五四二又放護財象之事於小鵝本生談五三三至沒入大地之第十六篇海商本生談四六六中說明某時提婆向佛請願五種事項五邪未被容納彼使教團分裂率五百比丘衆住迦耶斯舍時此等比丘衆之智慧已達圓熟之境佛知此事向高足弟子二人云舍利弗汝之弟子五百比丘贊同提婆之邪見與彼一同離去今彼等之智慧已達圓熟汝等與衆多比丘同往彼處說示正法使彼等比丘悟正道果伴彼等歸來舍利弗與目連前往說示法話使悟道果翌日黎明引比丘衆還歸竹林精舍歸後長老舍利弗禮佛而立時比丘衆讚嘆長老舍利弗目連向佛告云世尊我等最為年長之法兄法將舍利弗由五百比丘圍繞而來威光赫赫輝耀提婆則為其從者所棄捨佛言汝等比丘舍利弗為其眷屬圍繞而還威光赫赫非自今始前生亦有如是輝耀之事提婆為其集團所棄捨亦非自今始前生亦有如此見棄之事比丘等為明其意向佛請願於是佛為說前生隱祕之因緣主分昔日於摩揭陀國之王舍城有一摩揭陀王治國爾時菩薩生於鹿之胎內及長率千頭之鹿住森林中彼有名瑞相及黑暗之二子彼自身入於老境時云豫今已入老境汝等可率鹿群使各取五百之鹿其後彼等二鹿各率鹿群當摩揭陀地方進入收穫期時田中穀物茂盛對鹿亦為最危險期諸人為捕殺荒食穀物者到處挖掘陷阱豎立尖鋭之木代懸掛繫石圈套及設置其他種捕捉之器以殺鹿甚多菩薩知穀物成熟之時呼二子近前云吾子於此穀物成熟期多數之鹿被殺我等老人盤算對策思欲往某處度日汝等率鹿群入森林中之山麓可於穀物刈取時前來彼等齊言父之言甚善彼等從父之言率部下離去諸人知彼等行路之事今之時分鹿將登山今之時分鹿將下山於是諸人於各處隱伏射殺多數之鹿黑暗鹿生性愚鈍不知此時當行此時不當行率鹿群不分朝夕黃昏或未明通過村門而行諸人時時隱伏於各處殺死多數之鹿黑暗因自身之愚鈍使多數之鹿死去而率僅有殘餘之鹿入於森林瑞相鹿賢明伶俐有臨機應變之才彼知此時可行此時不可行彼等不由村門通過日中不行黃昏不行彼率鹿群只於夜間行走因此未失一鹿而進入森林四個月間住於此處至穀物收割之時由山降下黑暗由後而行彼一如前狀將殘鹿亦均喪失唯彼一人歸來但瑞相則亦未失一鹿彼受五百之鹿圍繞返至父母之前菩薩見二子歸來語鹿群而唱偈曰唯有德者能長久有慈愛者有繁榮應見瑞相眷族繞應見黑暗棄眷族如是菩薩使其子歡悅而全其壽命隨業報離此世而去結分佛更曰汝等比丘舍利弗為眷族圍繞度光輝之生活非自今始前生亦復如是又提婆為衆見棄亦非自今始前生亦被見棄佛為此法話連結此二事情作本生今昔之結語爾時之黑暗是提婆達多其侍衆即是提婆達多今之侍衆瑞相是舍利弗爾時之侍衆是佛今之侍衆而其母是羅睺羅之母其父即是我一二榕樹鹿本生談菩薩鹿序分此本生談為佛在祇園精舍時對鳩摩羅迦葉之母所作之談話其母為王舍城大富豪之女積善行離俗事達最後之生如瓶中之燈明彼女之心中燃起聖力之火彼女自知自悟以來在家不樂思欲出家向父母云父母雙親豫在家心中不樂豫欲思出家入救世之佛教請允豫出家父母云汝為何言此家諸多財産汝為豫等唯一之女豫等不能使汝出家彼女再三懇願父母不許出家女思惟在父母膝下不能出家莫若嫁於他家得主人之原宥而出家稍長嫁入他家為良妻積德行善住於其家同棲而懷妊但彼不知懷妊之事爾時都中頒布祭令全體市民慶祝祭日全市裝飾如天人之都然彼女雖於如是喧鬧之大祭日己身既不塗香亦不著飾一如平日裝束往觀爾時其夫向彼女云市中祭日狂熱汝之身體應與注意然彼女云此身充滿三十二種污穢何加裝飾此身非天神化生亦非梵天化生非由黃金所成亦非摩尼所成既非由青栴檀所造亦非為白蓮赤蓮青蓮之胎所生穢中受生父母難養不死之藥難保長壽一旦無常破滅不免崩潰散裂孤墳纍纍墓場徒增此身執著於煩惱沉淪於悲哀實憂苦之因緣萬病之宅舍業力之容器膿血之皮胞蟲巢於內穢漏於外死期日近亡滅難逃此乃一切世間眼前生起之實狀也筋骨相結合皮肉覆其身污穢藏腹內真相不現露肝臟與膀胱心肺腎脾臟涕唾膽汁膏九孔常流穢眼眵與耳垢鼻洟口痰唾糞便由腸出汗垢身分泌頭腔滿腦髓屑皮充髮際思此為淨者愚人覆無明無限災厄身堪比為毒樹疾病之宅舍諸苦之積聚執棒防鴉狗閉門防盜寇禍由外部來觸身己命終惡臭不淨身腐爛如糞土此身愚人喜具眼者所賤貴君言飾此身豫以為乃飾一糞穢器之外部長者之子夫聞此言語乃問曰汝即知此身垢穢何不出家耶彼女答曰豫若能出家今日即行出家夫云善哉豫許汝出家彼為多大布施為大供養附以多數從者伴往比丘尼止住之所於提婆達多所屬之比丘尼前出家彼女出家宿願成就心中甚喜爾時彼女腹內之胎兒成長諸根呈現異狀手足及背粗大腹部隆起比丘尼等向彼女問曰貴女為一妊婦何以如是彼女答豫亦不明其故但豫守戒律爾時比丘尼衆攜彼女至提婆之前向提婆問曰聖者此良家女困苦得夫之原宥使之出家今彼女之胎兒日見明顯豫等不明此一妊婦究為在家中所為抑為出家中所為提婆既無作佛資格亦無佛忍辱慈悲之德彼如是思惟豫提婆側之比丘尼有妊娠者為豫提婆鑑察不明對我將起誹謗豫應將其放逐彼未善加察考即云將其逐出於是將彼女如推石塊牽扯而出爾時彼女向比丘尼衆曰諸位尼師提婆師非佛豫向佛前出家勿使豫之苦心成為泡影請帶豫至祇園精舍佛前比丘尼等由王舍城伴彼女經四十五由旬之路漸達祇園精舍向佛申述右列之事佛思惟縱然此女在家妊娠將與外道口實沙門瞿曇帶來提婆棄捨之人因此為斷此傳說此事應於王與侍臣之前判定翌日佛招請拘薩羅國之波斯匿王大給孤獨長者小給孤獨長者毗舍佉大信女及其他之著名長者等佛於黃昏集四衆時向優婆離告曰汝於四衆面前明白宣布此比丘尼之事大德云謹知臺命往四衆中坐於己席於王之面前呼毗舍佉信女察此一事件告曰毗舍佉此少女出家確定為何月何日後應知其懷妊為出家前或出家後之懷妊日期信女承諾謹知臺命於是周圍張幕於其中檢查此少女比丘尼之手足臍腹後比較月日確知其為於俗人之時懷妊於是往優波離大德之前告知此事大德即於四衆面前證明此比丘尼之清淨彼女為潔白之身向佛及比丘教團作禮與比丘尼等往止住之處而去彼女月滿於上蓮華佛足下祈禱如願舉得一子某日王往近比丘尼之止住處聞小兒啼聲詢問諸臣諸臣知其因緣向王白告大王此為少女比丘尼所産之子為彼之哭聲王曰比丘尼為保姆多有障礙豫將為之保育於是王將其子交付親類婦女之手以王子之資格養育命名之日名其子為迦葉以迦葉王子之名養育於是人人皆知鳩摩羅王子迦葉之名七歲至佛前出家達成年後受具足戒經年於布教家中成能辨者佛言汝等比丘我弟子中之第一雄辨家為鳩摩羅迦葉於是置彼於第一位其後彼聽聞蟻冢經達阿羅漢位其母比丘尼為觀法修行得最上之果報鳩摩羅迦葉大德就佛陀之教如空中滿月之明耀某日午後如來托鉢歸來教誡比丘後入於香室比丘等受教誡後於己等之夜室晝室度過晝間日暮集於法堂相談曰諸位法友提婆達多無作佛資格亦不備忍辱慈悲等之德使鳩摩羅迦葉大德與其母長老尼險陷破滅然等正覺者佛依法王資格與具足忍辱慈悲使其母子二人起信仰之心彼等讚嘆佛之威德而坐時佛顯佛之威德入於法堂著於設席問曰汝等比丘今有何話集於此耶比丘等云世尊對佛之威德而談論於是告知一切佛言汝等比丘豫使此等二人生信仰與安住非自今始前生亦有如是之事比丘等欲明其意向佛請願佛乃說明前生隱祕之因緣主分昔日於波羅奈都梵與王治國時菩薩宿於鹿之胎內彼由母胎出其體金黃色眼如寶玉角為銀色口如染赤毛布之房色尾如犛牛體驅大如小馬彼與五百鹿之眷族同住森林彼被呼為尼俱盧陀榕樹鹿王於其近處更住有五百眷族之薩伽枝鹿鹿王彼亦身為黃金彼時波羅奈王熱心狩鹿無獸肉不能飲食因此使人民中止職業總招集商人農夫日日出狩諸人自思惟王使我等中止職業我等莫如於御苑撒下鹿之食物準備飲料使多數之鹿進入御苑然後封閉入口奉獻與王於是彼等皆於御苑植鹿常食之草並準備飲水於入口處施行警戒手執棍棒及種種武器率領市民進入森林探尋鹿群並云捕其中間之鹿於是包圍一由旬之場所向前推進逐漸以尼俱盧陀鹿與枝鹿之住處為中心採取圍堵諸人發現鹿群以棍棒激打樹木灌木與地上將鹿群由密林之住處逐出鳴響劍槍弓等武器揚發大聲逐鹿群進入御苑封閉入口向王告曰大王每日出狩獵我等之職業廢弛今我等由森林逐鹿前來滿入王之御苑今後王請每日食鹿之肉言畢向王告別而出王聞彼等之言住御苑遍觀鹿群見有二匹黃金色鹿王命保證二鹿身之安全自此以來某時由王躬行射一鹿持歸某時由廚夫往射持歸鹿每見弓為死之恐怖而逃避二三隻被射疲病死亡鹿等以此事告知菩薩菩薩呼枝鹿王前來曰友鹿多失去雖然終必被殺今後勿使王用箭射鹿規定鹿之順序往斷頭臺上赴死一日由豫之眷屬一日由汝之眷屬之順序當值往斷頭臺橫臥延頸受戮如是可免多鹿受傷枝鹿王曰汝之意見甚善與以贊成其後當值之鹿往斷頭臺上伸頸而臥廚夫來此當即取去橫臥之鹿某日枝鹿之眷族中一懷妊之鹿當值彼女鹿往枝鹿王之處訴告曰豫懷妊故即將生子不能以母子二人當值王請跳越豫之當值枝鹿王云汝之當值不能由他鹿轉代須知此汝自身之果報汝可前往女鹿不得枝鹿之同情往菩薩之處告知菩薩聞其語云善哉豫往豫代汝之當值自身前往斷頭臺上附頭而臥廚夫見此謂受安全保證之鹿王何故臥於斷頭台上於是急往王前告知此事王立即乘車帶諸侍者來菩薩之處見彼王鹿王豫保證汝身之安全何故臥於此處耶鹿王大王懷妊之鹿來告請將豫之當值轉令他人豫自身不能以某受死者之苦轉令他人蒙受因此以自己之命付與彼女鹿臥此處領受降臨於彼女之死苦王請勿作他疑王黃金色之鹿王豫從未曾見人中具備有此忍辱慈悲哀愍之德者因貴君之福蔭使我心清汝請起立豫與保證貴君與彼女鹿之安全鹿王豫二人得受安全保證他者將如之何大王王以外者亦均保證安全鹿王如是御苑中之鹿得保證身之安全其他處者將如之何王彼等亦皆保證安全鹿王今鹿已為安全之身他之四足類者將如之何王彼等亦皆保證安全鹿王大王四足類如得安全二足鳥類將如之何王彼等亦皆保證安全鹿王大王鳥類如得安全水棲魚類將如之何王彼等亦皆保證安全如是大薩埵菩薩對王懇請一切生類之安全由座起立請王保持五戒後云大王應行正道向父母子女婆羅門居士商人農夫之間應行正道施行平等命終之後樂生天人境界以佛之威光向王說示正法其後數日間止住於王之御苑與王以教誡由鹿群圍繞進入森林彼牝鹿後産一如蓮華蕾之子其鹿子某時遊戲接近枝鹿鹿母見之諭其子曰吾子今後勿往彼處當往尼俱盧陀鹿之處彼女唱此偈曰僅於事榕樹鹿絶勿近住枝鹿於枝鹿之前生不如榕樹前死其後鹿等被保證雖食穀類諸人云此鹿等為受安全保證者是故無人擲打與追趕諸人集於宮廷向王申告此事王曰豫以信心故與尼俱盧陀鹿之恩惠縱然捨棄領土亦不破誓約汝等且去於我領土內不可害鹿尼俱盧陀鹿耳聞此事集合鹿群制告諸鹿曰自今以後不可食其他之穀類並向諸人如是告知今後農夫為保護穀物勿庸造牆可繞田結葉以為目標自此以來任何田地皆結葉以為目標相沿成習而此後凡立有結葉目標之處鹿即不入此乃由於受菩薩之教誡而來如是菩薩教誡群鹿全其定命與諸鹿同隨業報而離此世王亦守菩薩之教誡積善行隨業報而去世結分佛言汝等比丘我為長老尼與王子迦葉之救濟者非自今始前生亦復如是佛述此法話後轉四諦之說法並連結此二事情之話作本生今昔之結語爾時之枝鹿是提婆達多其眷屬是提婆達多之眷族彼牝鹿是長老尼其子是王子迦葉王是阿難陀尼俱盧陀鹿王即是我一三結節本生談菩薩樹神序分此本生談為佛在祇園精舍時為對昔日之妻故二誘惑所作之談話此於第八篇根本生談四二三中將再說明佛向比丘言曰汝比丘汝於前生為此婦人故而喪失生命比丘等為明此意向佛請願於是佛說明他生隱祕之因緣此後不言諸比丘懇願及佛說前生隱祕因緣之句只云為說過去之事如是云者應知比丘之懇願乃至有叢雲出月之譬喻其隱祕因緣之所存皆與上述為同樣之結構主分昔日於摩揭陀國王舍城之摩揭陀王治世時於摩揭陀國住民之收穫期對鹿為最大之災難鹿即進入森林之山麓此處森林棲有一匹山鹿與近村棲有一匹年青之牝鹿相親彼鹿由山麓來至近村將歸之時心為牝鹿所奪彼等一同由山麓降下爾時牝鹿向彼云汝誠為愚癡之山鹿近村乃危險可懼之處汝勿與豫同行然彼為愛著之心所誘引而不知返彼等一同前行摩揭陀之住民知鹿由山麓下來沿途立於隱密之處於此二鹿前來之道上隱藏牝鹿嗅得人之體味知有獵人彼女鹿使山鹿先行自己附隨於後獵師忽放一矢而殺鹿牝鹿知其被射跳起奔逃迅如疾風而去獵師由小屋出往鹿之處焚火炙肉食之甚美所餘滴血生肉以棒擔之歸家喜悅子女爾時菩薩生為森林之神見此因緣乃曰此愚鹿之死非為母亦非為父乃全為愛欲人因愛欲雖得善趣終於惡趣受斷手等之苦痛及五縛等種種苦惱使他人受死之苦痛於此世應與非難以婦人為一國之長橫行命令應與非難又受婦人支配之人應與非難彼以一偈示此三非難林中諸神齊聲稱讚汝言甚是以香華供養菩薩菩薩以如甘露之音聲響徹林中而以次偈說法尖矢深傷人身受其禍患婦人之指導國受其禍亂婦人之支配諸人蒙恥辱以一偈說明應三非難之事情菩薩示佛之威德響徹林中而為說法結分佛為此法話後說明四諦說四諦法話竟此悔恨之比丘達預流果佛連結此二事情作本生今昔之結語連結此二事情之句今後不言只言作本生今昔之結語應知雖然不言亦與上述為同樣之結語爾時之山鹿是悔恨比丘牝鹿是其妻示愛欲之災說法之天神即是我一四風鹿本生談菩薩王序分此本生談為佛在祇園精舍時對小給孤獨帝須大德所作之談話佛在近王舍城之竹林精舍時某日大福長者之子帝須童子來竹林聽佛說法請願志欲出家但為父母拒絶不許彼悲痛之餘斷食七日如彼賴吒婆羅大德遂使父母承諾於佛前出家佛使彼出家半月之間住於竹林後前往祇園精舍此子帝須於此處修十三頭陀行入舍衛城於各戶順次乞食以度時光於是小給孤獨帝須大德之名恰如虛空之月於佛教中名聲赫赫爾時王舍城行星宿之祭彼大德之父母以彼在家時裝飾品收於銀製函中捧於胸前哭泣而言曰前此星宿之祭我等之子以此裝飾品飾身與祭為樂而今被沙門瞿曇帶此獨生子去舍衛城今彼於何處起臥耶爾時有一娼婦往彼良家見長者之妻哭泣問曰貴女何故哭泣耶於是彼女告知緣由娼婦問曰貴女之子有何嗜好答曰如是如是之物娼婦告曰如汝暫與我汝家一切之主權豫可帶汝子歸來長者之妻承諾甚善多與費用授與從者勉勵彼女云汝善行藉汝之力請攜歸豫子於是彼女乘轎往舍衛城宿於大德托鉢之路線由長者家來之諸人不使得見只由自身之從者圍繞當大德進入托鉢與粥及汁物以味覺欲加以束縛漸次使坐屋內供以食物知其可如己意支配於是現為罹病之狀臥於內室大德至托鉢時刻次第巡行至入口處由門衛取大德之鉢使彼坐於屋內大德著座問曰優婆夷在何處門衛答曰現在臥病欲會尊師大德因受味覺欲所囚破自身應守之戒行進入彼女之臥處彼女語其前來之緣由誘惑大德以味覺欲束縛使其於棄出家如己之意使坐乘物由多數眷屬相伴還王舍城此事為外界所遍知比丘等集於法堂開始談論小給孤獨帝須大德受一娼婦味覺欲之束縛而帶往王舍城去佛近法堂著於飾座問曰汝等比丘今有何話集於此處彼等申述此事佛言汝等比丘此比丘為味覺欲所囚陷入彼女術中非自今始前生即有陷入彼女術中之事於是為說過去之事主分昔日於波羅奈城有梵與王之園丁刪闍耶者時有一羚羊來至御苑見刪闍耶而逃但刪闍耶不與驚嚇任其逃走彼羚羊屢屢前來苑內遊步園丁日日取園內種種華果獻王某日王向園丁問曰園丁近日苑內有何異事汝有所見耶園丁告曰大王他事豫無所見只有一羚羊前來園內遊步豫只見此事王問汝能將彼捕捉否園丁答稍為與蜜可帶彼來至宮殿之內王與蜜園丁攜往御苑於羚羊遊步場所之草上塗蜜置之己則隱匿以觀羚羊來食塗蜜之草為味覺欲所囚不往他處只來御苑園丁知羚羊為塗蜜之草所迷不久自身出現於是羚羊見彼數日之間逃走但因多次相見轉而相親不久即食園丁手執之蜜草園丁知其相親於通往宮殿道路圍席置切落樹枝於路上彼肩掛蜜之瓢簞結草束於腰衣以塗蜜之草於羚羊之前不斷散撒導入宮殿羚羊進入殿內諸人緊閉宮門羚羊見諸人大震恐懼死亡於宮殿內到處巡回奔跑王由樓閣下來見其震畏之狀言曰羚羊見多人之處七日間不相近彼受驚嚇之處終其生而不往如是住居於藪中之羚羊為味覺欲所囚而來此處世間實無過於如味覺欲之可怕於是以次之偈結束法話世無可懼如味覺無論居家知人前叢林居住羚羊者終為刪闍耶捕獲結分佛言汝等比丘此娼婦以味覺欲束縛於彼如己之意而為非自今始前生亦復如是佛述此法話連結作本生今昔之結語爾時之刪闍耶是彼娼婦羚羊是小給孤獨比丘波羅奈城之王即是我一五訶羅第雅鹿本生談菩薩鹿序分此本生談為佛在祇園精舍時對某惡語慳貪之比丘所作之談話彼比丘惡語慳貪不容他人之訓誡佛問彼曰汝惡語慳貪不容他人之訓誡是事實耶彼答世尊是事實佛言汝前生為惡語慳貪不容智者之訓誡陷入羅網而死於是佛為說過去之事主分昔日於波羅奈都梵與王治國時菩薩為鹿由鹿群圍繞住森林中時彼妹姊之鹿使其子往見菩薩曰此乃汝之甥可使彼習鹿之幻術菩薩承諾彼向其甥云汝於如是如是之時來習幻術其甥於所云時間未至七日之間七回訓誡一如往日空過彼鹿不習鹿之幻術而於各處倣徨終於陷入羅網其母往兄之前問曰吾兄何故不使汝甥修習鹿之幻術菩薩告曰汝可思彼為不可教之輩鹿之幻術汝子未能修得今將被殺尚不欲教誡於彼而唱次之偈訶羅第雅汝具八蹄者汝角曲又曲七度皆空過訓誡已無力爾時獵師殺彼陷入羅網之惡口慳貪之鹿取肉而去結分更曰汝比丘汝之惡口慳貪非自今始前生亦如是佛述此法語後作連結本生今昔之結語爾時之甥鹿是惡口慳貪之比丘妹姊之鹿是蓮華色教誡之鹿王即是我一六三臥鹿本生談菩薩鹿序分此本生談為佛在憍賞彌國之跋陀利園時就喜好戒學之羅睺羅大德所作之談話某時佛於近阿羅毗國之阿伽羅婆塔廟止住之時諸多之優婆夷與比丘尼欲聽說法集於精舍於晝間聽聞說法時間已過優婆夷與比丘尼不來參詣只有比丘與優婆塞爾後於夜間聽聞說法聽聞法竟長老比丘衆等各歸各自宿處年少者等與優婆塞等一同寢於庫室有者鼻鼾齒軋而寢有者暫眠而起彼等見此事白告世尊佛言若比丘與未受戒人同宿犯波逸提罪於是制定學處戒離憍賞彌國而去於是比丘等向羅睺羅尊者曰友羅睺羅佛已制定學處故貴師應尋自身之宿處以前比丘等對佛具恭敬心因彼尊者佛之子羅睺羅喜好戒學彼來比丘等宿處時受非常優遇整牀造枕與以己衣而今日恐犯學處即連宿處亦不敢與賢者羅睺羅於彼父十力佛之處彼之和尚法將舍利弗之處彼之阿闍梨大目犍連之處乃至彼之伯父阿難大德之處彼皆不往彼入於佛常用之觸房廁所如入梵天宮中宿泊諸佛常用之觸房門戶堅閉地平塗香備有香繩及華鬘之繩終夜點燃燈火賢者羅睺羅決非因房舍莊嚴而定宿處實因比丘等云彼自尋宿處彼由尊重教誡喜好戒學之心而決定此為宿所故此時時有比丘等見尊者由遠方而來欲試其心將手簸箕投置戶外於彼來此處時問曰吾友何人投置於此處此時更有人云羅睺羅適方通過此處尊者羅睺羅不云尊師豫實不知而默然與以整理並謝罪云吾師請與原諒彼之喜好戒學如此彼之決定宿於此處亦因其喜好戒學之心而如是佛於天明之時立於觸房入口而為聲嗽尊者羅睺羅亦於戶內而為聲嗽佛問何人在內尊者答豫羅睺羅佛問曰羅睺羅汝何故宿於此處尊者曰豫因無宿處世尊前此比丘等對豫親切今恐犯罪不與宿處於是豫思此處為與他人無衝突之處故寢於此處爾時佛思惟比丘等對羅睺羅尚如是見棄如他之善男子出家之時將受如何待遇佛為此而憂慮於是次晨集合比丘佛向法將舍利弗問曰舍利弗汝知羅睺羅之宿處今在何處舍利弗世尊豫實不知佛舍利弗羅睺羅今日住於觸房舍利弗汝等於羅睺羅尚如此捨棄他之善男子出家時將如何待遇之耶如是入於佛法之出家者將無止住之處自今以後未受具足戒者一二日間可住於己近側第三日覓得彼之宿處可就外住是為佛制定隨制之學處此時集於法堂之比丘等對羅睺羅之德行相互交談諸師請觀此羅睺羅實為喜好戒學之人彼如不斥責任何比丘云貴師之宿處雖被決定然豫為十力佛之子汝等何以能就房舍住宿而豫不能汝等且出彼不語此而自住於觸房之中如是彼等相互交談時佛入法堂著於所飾之座云汝等比丘今有何話集於此處答曰世尊乃為羅睺羅喜好戒學之話別無他話佛言汝等比丘羅睺羅喜好戒學非自今始前生生於畜生胎內時即已如是於是佛說過去之事主分昔日於王舍城摩揭陀國王治國時菩薩生於鹿胎由鹿群圍繞住森林中其妹攜子前來云兄長請授汝甥鹿之幻術彼云甚善與以承諾彼向甥云歸後可按時刻來習彼甥於伯父所告時刻未過之內即往伯父之所習鹿之幻術彼一日倣徨林中陷入羅網而悲鳴鹿群逃告母鹿彼女往兄之處問曰兄長汝甥已習得幻術耶菩薩云汝對子之災難勿憂彼善有幻術之心得今將歸來為唱次偈此鹿三臥狀幻術知幾多彼有八隻蹄中夜飲泉水彼以一鼻孔呼吸於地上甥鹿得幻術六種術欺人如是菩薩示知其甥完全獲得鹿之幻術安慰其妹此幼鹿誤中圈套彼不屈膝橫臥地上伸足坦腹於近足之處以蹄掘起鹿塵草體放糞尿垂頭出舌體濡唾液膨腹瞪眼鼻孔斷氣行內呼吸全身堅硬如死相青蠅群集而來禽鳥止於各處獵師前來以手叩腹曰此必晨起被縛體已發臭於是解去套索即於此處割肉再歸彼無掛慮往集枝葉幼鹿乘機跳起伸頸震身如大風吹散片雲迅速逃歸母處結分佛言羅睺羅喜好戒學非自今始前生亦復如是佛述此法話後連結作本生今昔之結語爾時之甥幼鹿是羅睺羅母是蓮華色伯父之鹿即是我一七風本生談菩薩道士序分此本生談是佛在祇園精舍時對二人之老出家者所作之談話彼等二人住拘薩羅國之某森林一人名黑大德一人名白大德某日白向黑問曰尊者何時寒冷黑云黑月之時某日黑向白問曰尊者何時寒冷白曰白月之時二人均不能解自身之疑往佛前禮拜而問曰世尊何時寒冷佛聞彼等之話言曰汝等比丘前生豫已回答汝等此一疑問汝等對過去世之事尚難理解佛為說過去之事主分昔日某山麓有獅子與虎為友同住一窟爾時菩薩於仙人之前出家住此山麓某日此二友對寒冷問題引起論爭虎謂黑月之時寒冷獅子謂白月之時寒冷彼等不能解己之疑向菩薩尋問菩薩為唱次偈寒風吹來時不論黑白月風吹寒應至兩者皆不負如是菩薩安慰二友結分佛更謂汝等比丘我昔已答汝等之質疑佛述此法語後說明四諦說四諦竟二人大德證得預流果佛連結作本生今昔之結語爾時之虎是黑大德獅子是白大德為解疑問之道士即是我一八死者供物本生談菩薩樹神序分此本生談是佛在祇園精舍時對死者之供物所作之談話爾時諸人多殺山羊及羊等稱為親族之死者供物比丘等見諸人如此之行向佛問曰世尊諸人多奪生物之生命稱為死者供物有何功德佛言汝等比丘雖為供死者之供物而殺生並無任何功德昔日賢者等坐於虛空說法語此殺生之罪障爾後使金閻浮提全世界之住民廢棄此業今此過去世之事將再出現於是為說過去之事主分昔日於波羅奈之都梵與王治國時有一通曉三吠陀於世名高之婆羅門阿闍梨欲供死者之供物使捕一羊向弟子等曰牽此羊往河中沐浴頸捲華鬘與五分量之食飾後牽還弟子等受命牽羊往河中沐浴飾以華鬘立於河岸此羊己知宿業今日豫將脫苦起歡喜心高聲笑如裂甕彼又思惟彼婆羅門殺豫彼將受豫所得之苦彼對婆羅門起憐愍之情又大聲號泣於是婆羅門之童子等向羊問曰汝羊汝於前思而大笑而今又號泣何故發笑又何故號泣耶羊答汝等請於汝師尊之前問豫之緣由於是彼等牽羊往阿闍梨處告知此事阿闍梨聞彼等之言向羊問曰汝何故發笑何故號泣耶羊依智力憶念前生思起自己之宿業向婆羅門答曰汝婆羅門豫昔日亦如汝為一讀誦經典之婆羅門為欲供死者之供物殺一羊以供之豫因殺一羊於四百九十九生之間斷頭今為豫最後之第五百生今日豫能脫如是諸苦起歡喜心故而發笑又豫所哭泣者豫因殺一羊受五百生斷頭今日行將脫苦但汝婆羅門殺豫亦須受五百生間斷頭之苦豫對尊師起憐愍之情故而哭泣婆羅門汝羊勿恐豫不殺汝羊婆羅門汝為何言無論尊師殺與不殺今日豫均不能脫死婆羅門汝羊勿恐豫加保護與汝同行羊婆羅門尊師之保護力弱豫為之惡業力強婆羅門放羊云任何人不得殺羊彼攜弟子等與羊同行當羊被放近於岩頂所生之叢林羊開始伸頸食樹葉之剎那落雷擊於岩上岩之一角破裂落羊頸上切斷羊頭諸人集來其處爾時菩薩生為其處之樹神彼見於大衆端坐於虛空曰汝等應知此等衆生如是惡業之果今後當不再殺生彼以如甘露之音聲說法唱次之偈此世生存實為苦有情當得如是悟生類不可殺生類殺生必得悲慘果如是大薩埵菩薩以墮獄之可怖說使彼等驚恐之法諸人聞此法驚恐墮獄之可怖而禁止殺生其後菩薩亦再說法使大衆受持戒法後彼隨業報而離去大衆亦守菩薩之教誡積布施等善行生於天上之都結分佛述此法話後連結作本生今昔之結語爾時之樹神即是我一九祈願供養本生談菩薩樹神序分此本生談是佛在祇園精舍時為對諸天神祈願捧獻供養所作之談話爾時諸人出為商賈時殺諸生物向諸天神捧獻供物我等日後目的成就時再來捧獻供物於祈願後出發於是日後目的成就還來思惟依諸神之威德始克如此為解除祈願殺諸生物以為供養比丘等見此向佛問曰世尊彼等如此有何等利益耶於是佛為說過去之事主分昔日迦尸國有某村之長者發願供養尼俱盧陀無花果樹鎮座之神彼立於村之入口立誓曰日後還來當多殺生類以解祈願彼往樹下樹神立於樹叉唱次之偈若解應於來世解現在欲解卻成縛賢者如是不為解如是解者縛愚者自此以後諸人禁止如是殺生之業修正法升於天上之都結分佛述此法話後連結作本生今昔之結語爾時之樹神即是我二蘆飲本生談菩薩猿序分此本生談是佛於拘薩羅國遊行中到達蘆飲村在近於蘆飲蓮池之啓達迦園對蘆莖所作之談話爾時比丘等於蘆飲蓮池中沐浴為造父針筒使沙彌等折取蘆莖見蘆莖中為空洞往佛前問曰世尊豫等欲造針筒折取蘆莖但蘆莖由根至莖端全部空洞此何故耶佛言汝等比丘此我往昔之命令於是為說過去之事主分昔日此叢林為一森林彼蓮池水中有羅剎居住凡入水者悉為所食爾時菩薩為一如赤鹿之子大小之猿王彼由八萬之猿圍繞率群猿住森林中彼向群猿訓誡曰此林中有毒樹及非人鬼領有之蓮池汝等如欲食尚未曾食之果實及欲飲未曾飲之水時可先問豫彼等承知謹遵王命某日彼等行至未曾行之場所於彼處經數日之巡回覓水見一蓮池彼等暫不飲水靜待菩薩猿王前來而坐菩薩來云汝等何不飲水彼等答云豫等仰望大王前來菩薩此為殊勝於是彼往來於蓮池之畔察看足痕只有入水之痕不見出來之跡彼知此非人飲之場所告衆猿曰幸而汝等未飲此池為非人之所有水中羅剎知彼等不入化為青腹白顏赤手足可怖之形相分水為二而出問曰汝等何故坐而不入請入而飲水菩薩問曰汝為住此水中之羅剎耶羅剎唯然菩薩汝欲捕進入蓮池者耶羅剎正是豫欲捕之凡入此處者縱令飛鳥亦將捕捉不放即如君等亦將食之菩薩豫等之身不為汝所食羅剎然則汝須飲水菩薩飲水汝亦不能如願羅剎然則汝等如何飲水菩薩汝思入池飲水但豫等不入八萬猿衆各取蘆莖恰如以青蓮華之莖飲水之狀將飲汝蓮池之水因此汝不能食殺我等佛知此意義於成等正覺後唱次偈之前二句不見足痕之上行唯見足痕之下行我等用蘆管飲水汝尋無蹤跡殺我菩薩為如是說取一蘆莖念波羅蜜而作誓言以口吹之於是蘆之內部不餘任何結節完全成空菩薩以同樣方法授與他之諸猿一一取來吹之如是此事尚未終結菩薩環繞蓮池教令曰凡環繞蓮池所生之蘆皆空洞無節菩薩之教令奏功利行廣大爾後環繞蓮池所生之蘆皆成空洞此劫之間續有四種神變四者為何一月中現出兔相完全存於此劫之間二在鶉本生談三五謂火之滅處此劫之間火完全不燃三陶器師之住處此劫之間雨不下降四圍繞蓮池所生之蘆此劫之間全成空洞此為此劫之間續有四種之神變菩薩如是祝禱取一根蘆草而坐八萬猿衆皆各取一根圍繞蓮池而坐菩薩用蘆管吸飲池水時彼等亦皆坐於岸邊飲水彼等如是飲水水中羅剎一無所獲心懷不平歸己住家菩薩亦與從者一同進入森林結分佛言此等蘆之空洞乃由我昔日之教令而來佛為此法話後連結作本生今昔之結語爾時水中之羅剎是提婆達多八萬之猿是佛之弟子思出妙案善巧方便之猿王即是我第三章羚羊品二一羚羊本生談菩薩羚羊序分此本生談是佛在竹林精舍時對提婆達多所作之談話某時集於法堂之比丘等曰提婆欲殺害如來佛傭弓師投石放護財醉象弄一切手段欲狙殺十力佛彼等誹謗提婆而坐佛來坐於設之座問曰汝等比丘今有何話集於此處比丘等答世尊提婆欲狙殺世尊豫等語其不德而坐佛言汝等比丘提婆覬覦殺我非自今始前生即已如是而未能得逞佛為說過去之事主分昔日於波羅奈都之梵與王治國時菩薩為羚羊森林之住處食果實而棲某時彼來至果實豐富之吉祥葉樹下食吉祥葉樹之實時村中住一高臺獵師於果樹之下見有鹿之足痕彼於樹上結高臺坐於其處待鹿來食果實投槍射鹿賣其肉為生某日獵師於樹下見菩薩之足痕彼於吉祥葉樹上結高臺朝食已畢攜投槍入森林中攀樹坐於高臺菩薩於天尚未明由住所而出云往食吉祥葉果彼往樹下不為急行彼自思惟高臺獵師時時結高臺於樹上豫行有無彼之災害彼止於外部獵師悟菩薩不來之故坐於高臺投下吉祥葉果落於其前菩薩此等果實滾來此處落於豫前樹上有無獵師在耶彼幾度仰望發現獵師然彼故作不見之狀云汝樹以前汝之懸著果落直下而落今日汝樹棄捨前之規定豫將往他樹之前求豫之食餌彼唱次偈羚羊善知此事汝臥吉祥葉樹我不喜汝之果我往其他樹所爾時獵師坐於高臺投槍云此次被彼逃過菩薩回顧止而告曰汝獵人此次汝使豫逃過但八大地獄十六增地獄五種桎梏及業力汝不能逃彼向所思方向馳去獵師下樹亦向所思方向而去結分佛又謂汝等比丘提婆達多欲狙殺我非自今始前生即已未能狙殺佛述此法語後連結作本生今昔之結語爾時之高臺獵師是提婆達多羚羊實即是我二二犬本生談菩薩犬序分此本生談是佛在祇園精舍時對親族之利行所作之談話此將在第十二篇跋陀娑羅樹神本生談四六五中說明然為樹立此因緣談佛說過去之事主分昔日於波羅奈都梵與王治國時菩薩依相應之業生於犬胎由幾百之犬圍繞住大墓地某日王乘繫白信度馬盛飾之車往遊園終日遊樂日沒後還來城市諸人未解車之革紐置車於王庭而去是夜降雨革紐濡濕王庭階上貴種之犬降下食去皮與革紐翌日諸人向王告言大王諸犬由下水口進入食去車之皮與革紐王怒犬云發現犬等次第捕殺於是開始對犬之虐殺諸犬次第被殺逃往墓地奔至菩薩之前菩薩問曰汝等何故多數來集彼等云宮中馬車之皮與革紐為犬所食王大憤怒命大虐殺犬犬多失命生大恐怖菩薩思惟外部之犬無隙可入有守衛之所此蓋內部王宮貴種犬之所為今盜者無事而非盜者被殺豫將為親族友伴施捨生命向王指示盜者並安慰同族云汝等勿畏豫將使汝等安全汝等於豫會見國王期間待豫歸來彼念波羅蜜以慈悲行為先望石與槌勿擊我身彼定其意後獨入城內爾時無一人見彼生憤怒者王命撲殺犬後自坐於法庭菩薩到達其處跳入王之牀座之下王之侍者欲將彼曳出然王加以制止菩薩奮勇由王座匍匐而出向王作禮問曰大王欲盡殺諸犬耶王唯然菩薩人間之主彼等有何罪耶王彼等食馬車之覆皮及革紐菩薩王知為何犬所食耶王此豫不知菩薩此食皮者未能確知而見犬一一殺害大王此非正行王犬食馬車之皮因此豫命見犬一一撲殺菩薩究竟所有諸犬總殺之耶抑有不殺者耶王有之我家貴種之犬不殺菩薩大王今王因馬車之皮為犬所食王命見犬總一一撲殺而今又言我家貴種之犬不殺如是王為一己之樂欲非為無理之行耶無理之行非正當之事亦非為王道王應於事察考原因須如天平之正衡今貴種之物不殺而弱犬皆殺此非撲殺一切之犬實為撲殺世之弱者大薩埵菩薩出如甘露之音聲曰大王王之所行而非正義彼對王示正義唱次之偈犬養於宮庭貴種美有力殺我不殺彼無辜殺弱者王聞菩薩之言云賢者汝知食車皮者耶菩薩唯然豫知王食者為誰菩薩乃王家貴種之犬王如何知為彼等所食菩薩豫將示知彼等所食之事王賢者請示菩薩請呼王宮貴種犬至然後持少許酪漿與吉祥草來王如其言而作爾時大薩埵菩薩向彼云碎此草混酪漿中使犬飲下王如其言使飲犬飲後盡吐皮出王以菩薩如佛之示現心喜供養菩薩於白傘之下菩薩曰父母俱為剎帝利族之大王當行正義於是菩薩開始以由十首所成正行之偈向王說示正義並謂大王自今以後王宜勉勵授王五戒返納白傘與王王聞大薩埵之法話後向一切有情行無畏施日日供養菩薩及一切犬與自身同樣之飲食從菩薩之教誡終生為布施等善行死後往生於天界犬之教訓歷一萬年之久菩薩亦全其定命隨業報離此世而去結分佛言汝等比丘如來為同族計非自今始前生即已如是佛述此法話後連結作本生今昔之結語爾時之王是阿難其他諸犬是佛弟子犬王實即是我二三駿馬本生談菩薩馬序分此本生談是佛在祇園精舍時對廢精進比丘所作之談話爾時佛向比丘言曰汝等比丘前生之賢者於外敵之中能行精進雖負傷亦不廢弛佛為說過去之事主分昔日於波羅奈都梵與王治國時菩薩生為良種之信度馬施以種種裝飾為波羅奈王之寶馬彼食越三年之米飯加種種之美味盛於價值一萬兩黃金之器中身塗四種之香料立於地上其廄圍以赤色毛布之幔幕上張鏤以黃金星之幔飾以香氣之華鬘常供香油之燈火以照明他國諸王無一不望波羅奈之王位某時七國之王包圍波羅奈城致信於波羅奈王謂與我等王位否則戰爭王集諸大臣問曰此事如何處置諸大臣曰大王陛下最初勿險戰場遣彼騎士與戰彼如不勝最後豫等再為商酌於是王呼騎士近前曰汝與七王能戰否騎士曰大王若能與我王之駿馬莫謂與七王之戰即如與全閻浮提全世界諸王亦能戰鬥王曰如是無論駿馬及其他一切之物任汝所欲取之速往戰鬥騎士云謹遵王命向王作禮由樓閣下來牽來駿馬附以馬具己身亦充分武裝佩大力跨駿馬出城市如電光巡回奔馳破第一陳營生擒一王而返交付守城之軍再出陳破第二陳營次第生擒第三乃至五王但破第六陳營擒第六王時駿馬負傷鮮血涌出激痛不已騎士知其負傷使駿馬橫臥於宮庭之門解馬具附與他馬菩薩長伸而橫臥睜雙眼以觀騎士彼思惟騎人附馬具於他馬彼馬不能破第七陳營擒第七王所達成豫之事業將歸泡影彼無雙之騎士亦將亡滅王將陷於敵手除豫之外他馬無能適於破第七陳營擒第七王彼臥而呼騎士近前云騎士勇者打破第七陳營能擒第七王者除豫之外他馬應無此力不使達成豫之事業終歸泡影豫將奮起請附著馬具菩薩唱次之偈縱令豫橫臥其身被箭穿駿馬優駑馬調御士請以著我鎧騎士使菩薩站立以繃帶裹傷緊附馬具乘其背上破第七陳營生擒第七王交付與王軍諸人牽引菩薩往王宮門前王見而親自出迎大薩埵菩薩向王曰大王勿殺七王使彼等立誓而放免豫與騎士應得之名譽均與騎士對捕七王之勇士不可無賞陛下亦應行布施守戒律依正義公平推行政治如是菩薩與王告誡後諸人解其馬具菩薩於馬具漸解後立即亡去王行葬儀授與騎士以大榮譽一方使七王立誓永無二心送歸各自之住所王以正義公平推行政治命終隨業報離此世而去結分佛言汝等比丘如是賢者前生於外敵中仍行精進雖負傷亦不廢棄今汝導汝於涅槃之教出家何故廢棄精進耶於是佛說明四諦說四諦竟廢精進之比丘證得阿羅漢果佛述此法話後連結作本生今昔之結語爾時之王是阿難騎士是舍利弗駿馬實即是我二四良馬本生談菩薩馬序分此本生談是佛在祇園精舍時對一廢棄精進之比丘所作之談話佛向此比丘言汝比丘賢者前生於外敵中負傷仍行精進於是為說過去之事主分昔日於波羅奈都梵與王治國時如前之故事所說七人之王包圍此一城市爾時車軍一勇士以兩頭兄弟駿馬駕車出城連破六處陳營擒王六人但兄馬負傷車士駕車返回王宮門前將兄馬牽出車外脫馬具使之橫臥將附馬具與他馬菩薩見此事仍如前故事思惟呼車士近前於臥中唱次之偈無論何時與何處無論何處與何時良馬努力求精進駑馬意氣常消沉於是御者牽起菩薩再繫於車破第七陳營擒第七之王駕車返回宮門由車解下駿馬菩薩橫臥仍如前故事與王告誡而死去王行葬儀使御者得浴光榮依正義而為政治隨業報離此世而去結分佛述此法話後說明四諦說四諦竟此比丘獲阿羅漢果佛為作本生今昔之結語爾時之王是阿難大德馬實即是等正覺者二五沐浴場本生談菩薩賢臣序分此本生談是佛在祇園精舍時就法將舍利弗之弟子出家前為黃金匠之比丘所作之談話唯佛具有知他心意之他心知通其他諸人則不具有因此法將自身缺他心知通故亦不知弟子之他心知通因而只說不淨業處不淨觀法然對此弟子並不相應何以故彼順次於五百生間出生黃金匠之家常久期間只見黃金心受薰染所謂不淨之事於彼並不適當因此彼不起相不淨之觀念四個月間時日空過法將不能授自己弟子阿羅漢果彼思惟彼確只能依佛之力可為教養豫將攜往如來之前於未明時刻攜彼往如來之前佛問曰舍利弗何故一人攜比丘前來舍利弗世尊豫授彼業處經四個月彼仍不起相不淨觀念豫思惟只能依佛力可為教養是故前來尊前參謁佛舍利弗汝授弟子如何之業處舍利弗不淨業處世尊佛舍利弗汝無知衆生心中之通力汝且離去夕時攜汝弟子前來如是佛與長老暇後與彼比丘相應之下衣與上衣帶彼行乞並與彼美味之嚼食硬食噉食軟食然後佛由大比丘衆圍繞再歸精舍佛於香室佛房度過晝間夕時帶彼比丘遊行使菴羅果園出現蓮池佛以神通力於其蓮華叢中出現一大蓮華佛使此比丘目注蓮華而坐然後佛入香室比丘不斷注視蓮華佛使蓮華枯萎枯萎之中漸見褪色由邊緣落葉忽而盡落然後雄蕊枯落只餘果皮比丘見此自思惟此蓮華不久前色美見而心爽今忽褪色葉蕊枯落只餘果皮如是蓮華衰老我身能不衰老耶於是彼得諸行無常之正觀佛知彼心己起正觀坐於香室放大光明唱次之偈應斷自愛心手折秋蓮華唯進寂定道善逝示涅槃佛唱偈竟彼比丘證得阿羅漢果比丘自思惟我實由一切諸有生存解脫矣於是感興而唱次等諸偈渡盡此一生其心得圓熟身心法漏盡保此最後身善守清淨戒諸根得寂定月由羅睺口脫出被蝕身愚癡大黑暗一切諸心垢遍布我身中排除盡無餘恰如日光明輝映千光線如日在虛空遍照諸空中彼唱此等諸偈後再往佛前禮拜長老舍利弗亦來向佛禮拜然後攜弟子離去此事遍知諸比丘間諸比丘坐於法堂讚歎佛之威德彼等互語曰諸位法友舍利弗無知他人意向之明故不知己之弟子意向佛則知此於一日之間與無礙辨同時授與阿羅漢果佛之威德甚為廣大佛來著於設座問曰汝等比丘會有何話集於此處比丘等答並無他話實為世尊對法將舍利弗之弟子意向能與洞察所作之談話佛言汝等比丘此非不可思議之事我今成佛知彼意業然於前生亦知彼意業於是佛為說過去之事主分昔日於波羅奈都梵與王治國時爾時菩薩於物質精神雙方之事為王之指導時有諸人於王寶馬之沐浴場沐浴其他駑馬寶馬而使向駑馬之沐浴場進入時心起嫌厭而不入馬丁往見王告曰大王寶馬不入沐浴場王遣菩薩云賢者寶馬何故不入請往一觀菩薩謹遵王命彼往河岸檢視寶馬知無疾病何故不入浴場彼於熟思後思得此蓋為最初有他馬沐浴彼因嫌厭而不進入於是問馬丁曰此沐浴場何人先為馬沐浴馬丁有他之駑馬先為沐浴菩薩察知其意寶馬因自重心故嫌厭而不欲沐浴可牽往他之浴場沐浴菩薩云馬丁汝以酥蜜砂糖調和乳糜時時食之亦將饜飽此馬多次於此浴場沐浴亦將嫌厭汝可牽至其他浴場使浴且使飲水於是為唱次偈御者他之諸浴場汝使馬飲水如人飽乳糜亦感身饜苦諸人聞彼之言將馬入他浴場使之沐浴飲水馬於沐浴飲水期間菩薩往王之前王如何馬沐浴飲水耶菩薩均已為之王最初何故不入耶菩薩如是之故一切向王申告王如是能知畜生之意甚是賢者王授菩薩以大榮譽命終隨業報而離此世菩薩亦隨業報離此世而去結分佛云汝等比丘我知彼之心意非自今始前生即已知此佛述此法話後連結作本生今昔之結語爾時之寶馬是彼比丘王是阿難賢臣即是我二六女顏象本生談菩薩賢臣序分此本生談是佛在竹林精舍時對提婆達多所作之談話提婆使阿闍世太子入信仰受其供養阿闍世太子於伽耶斯舍為提婆建立精舍日日以五百大銀盤之種種美味調理越三年而有香氣之米飯施行供養因如是之供養提婆之信徒大增提婆與衆徒皆住於精舍之中爾時王舍城有住民二人為友其中一人於佛前出家一人於提婆之前出家二人相互處處相會又常往精舍相見某時提婆之弟子向他一友人曰友君日日流汗行乞而提婆坐於伽耶斯舍精舍食種種調味之美食汝之此行殊非良策君何自求苦明朝早起往伽耶斯舍精舍與豫同食甘旨之粥十八種嚼食硬食種種調味之噉食軟食豈非善哉彼再三受勸心頗思往自此以後彼往伽耶斯舍精舍充分進食按時刻即回返竹林然彼之隱私不能常保彼往伽耶斯舍食供養提婆食物之事不久為人遍知時有友人等向彼問曰傳聞君食供養提婆食物為事實耶彼曰此為何人所言者哉友人某甲與某乙彼曰事實豫往伽耶斯舍進食非提婆與豫之食物乃他人所與者友人友提婆為佛之怨敵以破戒之身使阿闍世入信非法受得供養而今君對如是之教說出家食提婆達多依非法所得之食物豫須伴君往佛之前於是攜彼比丘還至法堂佛見此而問曰何故帶此汝等嫌厭之比丘而來友人世尊此比丘於世尊之前出家食提婆依非法所得之食物佛汝比丘汝常食提婆依非法所得之食物為事實耶比丘世尊非提婆與我豫乃食他人所與之物大師言汝比丘汝莫用此遁辭提婆為惡行破戒之身何故汝於此處出家奉我教說而攝取提婆之食物耶汝平常對輕信薄見者悉皆信奉於是為說過去之事主分昔日於波羅奈都梵與王治國時菩薩為一大臣爾時王有一女顏之寶象德高而行儀方正決不侵害他人某日午夜盜賊來近象屋貼近而坐彼此集議如是則能破下水道而行如是則能破窗下水道與窗既破則如大道無何等障礙貨物可適意運出掠奪之時必須殺戮如是將無任何抵抗所謂盜賊不受德義心等拘束須殘忍酷薄暴虐彼等如是協議相互告誡後散去翌日如是情狀又繼續數日皆來其處協議象聞彼等之言思為對己所說彼思惟我亦應殘忍酷薄暴虐翌日晨起象之御者前來象以鼻攫彼投諸地上而被殺如是來彼處者一一被殺諸人向王告言女顏寶象發狂彼眼見者皆被殺死王遣菩薩當調查之任王云賢者汝往觀察何故激怒於彼菩薩往觀知其身體無病彼自思惟此物何故發怒必於就近聞人之話心得教自己者而起激怒菩薩以此確信向象之御者問曰夜間有無近處談話者御者答誠有其事盜賊前來談話豫亦聞之菩薩往王處報告大王象之身體無何異狀惟聞盜賊之言而發怒王如是應如之何菩薩應請高德沙門及婆羅門坐象屋中可說道德之話王尊者即如尊言於是菩薩請高德沙門及婆羅門坐象屋中告曰尊師請說道德之話彼等坐近互為道德之話云不可打殺任何一人人具德行應為慈悲忍辱之行彼等為道德之話象聞此語自思惟此為彼等教自己之語今後須行道德於是象仍如昔日之從順王向菩薩問曰象已溫順耶菩薩云唯然如是激怒之象依諸賢之力仍如以前溫順之態於是唱次之偈初聽盜人語女顏象殺人繼聞智者言最上德安住王云汝善察畜生之意於是與菩薩大榮譽王全其定命與菩薩同隨業報離此世而去結分佛言汝比丘汝於前生歸依汝所眼見之人聞盜人語歸依盜人聞高德語歸依高德佛述此法話後連結作本生今昔之結語爾時女顏象是事反逆者之比丘王是阿難大臣實即是我二七常習本生談菩薩大臣序分此本生談是佛在祇園精舍時對一優婆塞與一老大德所作之談話舍衛城中有二人為友其中一人於出家後每日來另一人家中訪問其人與之食物自己亦自進食後與出家者一同前來精舍坐而交談種種故事以至日沒然後入市還家歸時出家者送至市之入口再返精舍對二人之親交他之比丘等亦深知之某日比丘等坐於法堂對二人親交之事交談佛來其所問曰汝等比丘今有何話集於此處比丘等答其緣由佛言汝等比丘此二人之親交非自今始前生即有親交之事於是為說過去之事主分昔日於波羅奈都梵與王治國時菩薩為一大臣爾時有一犬時往寶象之屋舍食寶象場所落地之飯塊犬如是為食與寶象相親兩者相近而食且須一同而食犬時時捉象之鼻搖之為戲某日一村人付守衛象者代價攜犬而去自此以來象不見犬不食不飲亦不沐浴於是諸人向王申告王向菩薩大臣云賢者象何故如是請往調查菩薩往象屋知象之沉痛悲哀之狀並非疾病彼思此必為彼不見某相親者而沉於憂慮於是向象之守衛者問曰此象有無與之相親者守衛者唯然某犬與之非常相親菩薩彼今在何處守衛者為某人攜去矣菩薩彼男之住所汝知之耶守衛者豫不知也於是菩薩往王之前申告大王象無疾病彼與某犬非常相親今不見犬故不食不飲乃為唱次偈一口之粗飯今已不能攝握飯吉祥草今亦不欲食此身不思飲擦浴亦不適日日思相見象犬戀慕情王聞彼言問曰如是將如之何菩薩告曰王可擊鼓巡回宣告今有攜我等寶象之友犬而去者務速速交來否則一經發現將處以刑罰王如其言以行攜犬之男聞此事後立即放犬犬急奔象屋象以鼻捉犬置於頭頂喜泣而叫犬由頂上下降象使之食後自己亦食王云賢者善知畜生之意於是對菩薩授大榮譽結分佛言汝等比丘此二人親交非自今始前生即亦如是佛述此法話後說明四諦之理此四諦之宣明載於所有本生談中豫等則只認其有功德時而為記載佛連結作本生今昔之結語爾時之犬是優婆塞象老是大德賢者大臣即是我二八觀喜滿牛本生談菩薩牛序分此本生談是佛在祇園精舍時對六群比丘之毀呰語詈罵所作之談話爾時六群比丘喧譁嘲罵誠實之比丘等並揭舉十條以辱之比丘等以此事向佛申告佛呼六群比丘問曰汝等比丘此為事實耶答曰誠為如是佛責彼曰惡口傷人雖畜生不喜前生某一畜生受其主人惡口責罵損失千金於是為說過去之事主分昔日於健䭾邏國之得叉尸羅都為健䭾邏王治國爾時菩薩生於牛胎彼於幼犢之時一婆羅門供養牛之家買彼牛入手命名曰歡喜滿置於兒童之所食以乳粥與飯珍惜養育菩薩長大彼思惟此婆羅門辛苦育豫今全閻浮提全世界將無如豫之具有牽引力之牛豫將以示己之力量以償付婆羅門扶育之資財某日牛向婆羅門云婆羅門汝往某飼牛之長者前稱豫之牡牛可牽曳百臺滿載之車請與彼以千金為賭婆羅門往長者前開始交談問長者曰於此都中何人之牛為最有力長者言某人某人之牛婆羅門云都中之牛無有能及豫之牛者豫有一牛能曳百臺之貨車長者彼牛現在何處婆羅門在豫宅長者若是可為一賭婆羅門甚善與汝一賭於是以千金為賭彼以百臺之車滿載砂石順行排列由車軸以繩互結使歡喜滿沐浴與添香味之五指量飯肩飾華鬘於最前車之軛繫此唯一之牛婆羅門自身占坐軛處舉鞭呼叫庫達欺瞞者庫達前進牛思惟豫非庫達欺瞞者何以用此惡語呼叫於是四足突立如柱而不動長者於此一剎那向婆羅門云汝負請與千金於是奪去婆羅門千金彼解牛還家沉憂而寢歡喜滿見婆羅門沉憂來至其側云婆羅門貴君為何寢臥婆羅門豫千金被奪如何成眠牛婆羅門豫於汝宅如此長久之間有踏碎汝鉢及於他場所放糞尿之事耶婆羅門並無此事牛如是何故汝呼豫為庫達欺瞞者耶此乃為汝之惡非豫之惡汝可再與彼男賭二千金然豫非庫達不可以此呼豫婆羅門聞言往賭二千之金仍如前狀結付百臺之車飾歡喜滿繫縛於最先車之前方彼以如何方法繫縛車之前方固結以軛一端繫牛一端繞繫於軛與軸間之滑棒如是堅固結縛不使軛到處活動能以一牛曳之前行於是婆羅門坐於軛處撫歡喜滿之脊云賢者前進賢者運力菩薩將並連百臺之車一氣曳動使最後之車達到最先停車之場所以牛為財産之長者賭負出二千金與婆羅門其他諸人亦對菩薩與諸多之財物皆為婆羅門之財物如是彼受菩薩之蔭惠獲得諸多之財物結分佛言汝等比丘惡口使任何人心情皆不愈快佛斥責六群比丘制定學處戒成正覺後唱次之偈口應出愛語決勿出惡言口為愛語者使牛牽重荷既可得財寶由彼得喜歡佛言口應出愛語佛說此法話後連結作本生今昔之結語爾時婆羅門是阿難歡喜滿牛即是我二九黑牛本生談菩薩良牛序分此本生談是佛在祇園精舍時對二重神變所作之談話此與天人降臨之事收同在第十三篇舍羅婆鹿本生談四八三中說明等正覺者演二重之神變住天上界而後於雨季終了之祭日下降於僧羯奢城與多數之從者入祇園精舍比丘等集於法堂云諸位法友如來非他人之所能比如來所運載之荷物決非他人之所能運行六人之師尊云我等將示神變我等將示神變然從未示一神變佛實為最勝之優者彼等談論佛之威德而坐佛來問曰汝等比丘今有何話集於此處比丘等世尊並無他事如是如是對世尊之德而言佛言汝等比丘今我所擔之荷物何人能擔耶前生豫生於畜生之胎時即已擔負任何荷物亦不能得可相比之事於是為說過去之事主分昔日於波羅奈之都梵與王治國時菩薩宿於牛之胎內彼於幼犢之時其持主等宿於某老婦人之家為精算宿泊資金以犢作為代價與之而去此老婦與犢乳粥及飯看顧養育如自己之子與犢命名為祖母之黑子長大之後毛色純黑如安膳那藥石眼藥與村牛同行行儀正當村中兒童捉彼之角耳與喉使之下垂更曳尾為戲乘背而行某日此牛自思惟豫母老婦貧乏辛苦育豫豫應為母蓄財救其苦境自此以來彼尋覓蓄財機會而走某日有一隊商主之子曳五百臺車到達渡口牛等不能曳車渡達彼岸五百臺車繫結相連一車亦不能渡菩薩牛與村牛等一同步近渡場隊商主之子為一牛之鑑定家彼自思惟此諸牛之中有無育成之良牛能曳此等車輛渡河彼向菩薩注目知為一良牛彼思惟彼為一良牛能渡我等之車彼牛之主為何人耶彼向番人問曰此牛之主人為誰如能為豫曳車使完全得渡豫將付工銀牧牛人等云可攜彼菩薩繫車而行此處並無牛主隊商主之子以綱縛鼻使曳車前進但牛因工銀未定停止不動隊商主之子知其意向牛云君能曳車五百臺每車付工銀二迦利沙波拏其與千金爾時牛即自動前行諸人為彼結縛車輛彼一氣曳引到達陸上如是渡過所有之車隊商主之子每車付一利沙波拏其五百金之包結掛牛之喉部牛因彼男不按規定付銀彼於諸車之前方遮路而立使車不能前行諸人卻行推開但用盡氣力亦不能動隊商主之子知此牛因自己所付工銀不足而不動於是以布包一千迦利沙波拏掛於牛首云此為渡車之工銀牛得千金之包前往老母之前村中兒童云牛喉下所垂何物於是前來牛側牛追散彼等逃至遠方彼即前往母親之前彼因曳五百臺車已眼紅身疲老婦見彼首掛千金之包云汝由何而得彼女問牧牛者始知其故於是老婦云豫何忍作食汝工銀之打算汝為何為此辛苦之事於是香湯浴牛身之全體塗油飲以飲物食以甘旨之食老婦命終與菩薩一同隨業報離世而去結分佛言如來非他者可比非自今始前生亦即如是佛述此法語後作本生今昔之結語於成正覺後唱次之偈如何泥濘路如何重荷車一旦黑牛曳彼可為捷運如是佛言汝等比丘彼時黑牛捷運重荷於是連結作本生今昔之結語爾時之老婦是蓮華色母之黑子實即是我三姆尼迦豚本生談菩薩牛序分此本生談為佛在祇園精舍時對處女之誘惑所作之談話此將於第十二篇小那羅陀苦行者本生談四七七中說明佛向彼比丘問曰汝比丘汝心痛為事實耶比丘尊者唯然佛就何所事比丘世尊對處女之誘惑佛言汝比丘彼女為害及汝者前生汝於彼女結婚之日而死為多人之招待肉品於是為說過去之事主分昔日於波羅奈之都梵與王治國時菩薩於某村長者之家生為牛胎名曰大赤而其弟名曰小赤其家依此二牛為運搬工作配合相宜其家有一女為其村村長選為其子婚配彼女之雙親準備結婚之時招待賓客特與所養之姆尼迦豚以乳粥之食小赤向其兄問曰此家運搬工作配合得宜皆我兄弟之力而與我兄弟草及稻桿而豚則食乳粥何故彼受如是優待爾時兄牛曰小赤汝勿羡彼之食物彼豚在食死亡之食彼長者唯一之女結婚之時將以彼所育之豚招待來客自今經數日後客人將至爾時彼豚四足被縛曳至下方之豚小屋中宰殺汝將見彼被調理成客人之湯物於是唱次之偈莫羡姆尼迦彼食死之食離欲食穀皮此為長命源其後不久諸人前來長者殺姆尼迦調理種種菜肴菩薩向小赤云汝見姆尼迦耶小赤答曰兄長豫已見姆尼迦食物之報豫等之草稻桿穀皮之食實較彼之食物為千百倍之上等乃無罪長命之基結分佛言汝比丘汝前生為此女而失命為諸多衆人之招待物佛述此法語後說明四諦說四諦竟沉憂之比丘證得預流果佛更連結作本生今昔之結語爾時之姆尼迦豚是悲痛之比丘今之處女是彼時之女小赤是阿難大赤實即是我第四章雛鳥品三一雛鳥本生談菩薩帝釋天序分此本生談是佛在祇園精舍時對飲水不過濾之比丘所作之談話有二青年比丘此二人互為朋友二人由舍衛城出發前往田舍二人於某喜好之場所隨心而住彼等思欲面謁等覺者佛再由彼處出發往祇園精舍而來其中一人有持濾水囊其他一人則未持有因此二人濾水而飲某日二人引起爭論持有濾水囊者不貸其友濾水之囊而只自己濾水而飲其友不得濾水之囊口渴難忍而飲不濾之水二人繼續旅行終至祇園精舍禮佛著座交相問訊後佛問曰汝等由何處而來二人尊師豫等住於拘薩羅之田舍某村為思欲晤尊顏出發前來佛如是汝等蓋甚和睦前來此處其未持濾水囊者告曰尊師途中此友與豫發生爭論其後彼不貸濾水之囊與豫他之一人申述曰尊師此友人實係飲水中有生物之水佛汝比丘汝知有生物存在而飲其水是為事實耶比丘豫願認罪尊師豫飲未濾之水於是佛向二人言曰汝比丘前生於天都治國之賢人某時戰敗由山谷之間道遁出賢人為恢復王權立誓云我決不殺害有生命之物其後戰勝得非常之榮譽時因救金翅鳥雛之命使軍車得以歸還於是為說過去之事主分昔日一王於摩揭陀國王舍城治國爾時菩薩一如今之帝釋天前生所出生之摩揭陀國瑪奇雅拉村中出生為非常高貴之子命名之日名之曰摩佉童子然經年長青年摩佉婆羅門為世人皆知於是雙親為其迎娶同族之女為妻生男育女家庭繁榮摩佉為一慈悲心深之主人守持五戒其村有家三十軒某日三十軒之人集於村之中央處理事務之時菩薩以足踏平其處之土而立足使彼場所平坦善立當菩薩前往他處其他之人即來其處而立於是摩佉菩薩再使其他場所善立而更有其他一人前來其處而立如是菩薩依次為諸人皆使場所善立又某時彼處張有天幕菩薩將之取去建立會堂整頓內部桌凳配置水甕如是諸人亦與之同心建設菩薩使村人等固守五戒其後村人同行善事並與菩薩同為善行晨朝早起外出諸人手執刀斧槌等平復四街大道有石障礙以槌除之有樹障礙通車即與砍伐高低場所使之平坦築橋掘蓮池建會堂行布施守持戒律於是全村住民皆從菩薩之訓誡守戒行善爾時村中一老輩村長自思惟以前此村之人飲酒殺人時豫依酒錢罰金稅金有相當積蓄然今有此青年婆羅門摩佉教人守戒村中停止諸惡事全村之人均守五戒豫已無所得於是彼甚忿怒往王之前誣陷諸人向王告曰大王豫之村中有甚多盜賊橫行掠奪王聞此老村長之言立即下令速往將盜賊全數捕來村長率衆前往捕縛村中所有人衆帶至王前告曰盜賊全數帶到王未調查村人行為即命令將村人皆用象殺於是將村人與象一同由法庭牽出汝等宜念持戒豫菩薩摩佉與村人訓誡云汝等雖被無實之罪但對王及象亦應如豫等之身體同樣愛惜諸人皆如菩薩所言爾時為殺村人象向諸人接近象雖被牽曳但不願前進大聲嘶叫而逃他之諸象次第牽出亦均逃遁不前王自思惟村中之人有何魔藥命令檢查諸人前往檢查但無所發現向王告曰一無所見於是王云彼等必誦咒文即問村人有誦咒文者耶王臣尋問菩薩摩佉云有之王臣白王一人言有於是王將村人悉數喚來問曰汝等知何咒語速行念出菩薩摩佉告曰大王豫等之咒文並非別物只為豫等不殺生物不為不與取不為邪行不語僞言不飲酒行慈悲行布施平道路穿蓮池建會堂此即為我等之咒文亦為我等之保護與特權王對村人等心喜將彼誣陷無實罪之村長財寶悉數與村人並將象與村亦均與彼等其後村人等隨心勵行善事其後思欲於此四街大道建大會堂雇傭木工前來建造但村人等因女人不持何等欲望是故禁止女人等入堂行道爾時菩薩摩佉之家有善法思惟歡喜善生四位女人其中善法女結識一木工彼女云兄長請使豫為會堂長老彼女贈送賄賂木工云甚善豫可設計彼與同意於是道先開始製作塔頂使木乾燥然後切割穿孔完成工作彼以布片包覆塔頂藏於別處會堂建築完成於建堂之塔尖時木工云貴主人事有不洽豫有遺誤究為何事須作塔頂誠然豫等亦思須有塔頂然新伐之木不能製造須用前伐之木切割穿孔須尋索如是之塔頂將如之何若此村中有前造者有出賣此尖塔頂者須向彼搜尋買來在村人等搜尋之下發現村中善法之處有一塔頂村人雖與金錢但彼女不賣善法云若許豫得入會堂則豫願獻納塔頂村人云豫等不與女性利益於是木工向村人云貴主人汝等為何話耶除梵天界外無排斥女人之世界請其捐納塔頂豫等始能完成工作村人等終與贊許求取塔頂落成會堂整頓桌凳配置水甕常時準備施捨米飯會堂周圍圍以牆垣設置門戶垣內敷沙垣外種植棕櫚樹列思惟女亦於彼處場所經營樂園彼女思惟多華多果之樹頗不適宜因此不植如是之樹歡喜女亦於同一場所挖掘蓮池池上覆以五種蓮華十分快樂唯善生女一人不作任何一事菩薩摩佉在家事母事父彼以身敬長者語真實無粗暴言辭不惡口陰言不吝嗇行事立以上七誓誡條於完成後唱偈曰若人為在家敬長事父母優物發慈心愛語不譏人真實不貪求制怒無瞋恨三十三天界呼為有信人菩薩摩佉如是成為受人褒揚者命盡之時為帝釋天王更生於三十三天村人等亦與王同生三十三天爾時三十三天住有魔神阿修羅天王帝釋天自思惟與魔神共治為己等所不取乃以天神之酒與魔神共飲於魔神醉後捉其手足投於須彌山絶壁之下魔神等落著於魔之宮殿所謂魔之宮殿住於須彌山之最低處洽如三十三天界相同廣大天國有珊瑚樹而魔國則有一劫之間生存之灰彩色華樹魔神等因開灰彩色華樹以此處非自己所領之天國天國應為開珊瑚之樹花魔神等宣言此老背之帝釋飲豫等以迷酒投豫等於大海占領豫等天之城廓豫等向彼宣戰誓須奪回天之城廓於是如蟻攀圓柱相續攀登須彌山頂帝釋聞魔神登山來攻前往海面兩軍接近相戰帝釋為魔軍所破沿南海之端乘超勝之車逃逸一百五十由旬爾時帝釋之車於海面急行來至一綿樹森林須伐棕櫚之林始能通過於伐樹時綿樹之森林掃落於海面時海面有金翅鳥之雛見狀旋轉飛舞大聲鳴叫帝釋向御者發問瑪達利此為何種之音聲洞徹人之心腑瑪達利天主吾主車行之過急不顧一切以致蹂躪綿樹之林車達林時金翅鳥之雛誤思為取命一聲悲鳴而恐懼飛舞大薩埵瑪達利我等勿使雛鳥憂心我等不可為自力而殺生縱然為鳥雛犧牲性命亦較與魔族為善汝將車轉返於是唱次之偈瑪達利綿林造巢者車柄勿向彼我等於魔前歡喜願捨命此鳥類之巢不可為亂動御者瑪達利聞語轉車由他路轉向魔神世界前進魔神等見帝釋轉還而自思惟帝釋又由他國前來彼必又得友軍而返軍車魔神等惟恐見殺紛紛逃入魔國帝釋於是進入神村彼由二天界梵天帝釋天之住神軍衆圍繞進占村中央位置於一瞬間地裂一千由旬之高顯現戰捷之宮殿因得勝利故名戰捷於是帝釋設五處防禦使魔神不得接近於此作偈頌曰神族與魔族難攻二城間為設五種守以防魔族侵龍族金翅鳥甕形之夜叉荒醉夜叉據外有四天王於是帝釋設此五種防衛為王者享天之榮譽時善法女辭世生為王后善法以捧獻塔頂之果報於天宮顯現於天之珠玉所飾五百由旬之善法堂此堂於純白之天蓋下設一由旬之黃金玉座由帝釋君臨為諸天之王行天人之政爾時思惟女亦辭世生為王后彼女依造思惟樂園之果報於天宮顯現一心蘿園之樂園而歡喜女亦命終生為王后彼女依造蓮池之果報於天宮顯現一名歡喜之蓮池然僅善生女未為善業彼女命終生為森林洞穴中之鶴帝釋不見善生自思惟彼女究生何處彼思惟結果發現彼女為鶴於是出發往善生處攜彼女至天界使彼女見快樂之天村善法之天堂心蘿之樂園歡喜之蓮池帝釋向善生云彼女等因行善事生為我等之后汝未行善事故生為畜生自今以後請守五戒彼誡鶴授與五戒然後攜歸彼處而放去其後善生守五戒帝釋於二三日後思彼鶴是否守戒化為魚相背下而仰臥善生鶴以為魚死口銜其頭魚尾忽動彼女云此魚尚生於是放魚帝釋云善哉善哉汝能守戒譽之而去善生由彼處死去生於波羅奈之陶器師家帝釋思彼女今生於何處繼知其生處於是化為老人之相坐於滿載金色胡瓜之車於村之中央叫賣誰買胡瓜誰買胡瓜村人近前云老者豫買汝瓜老人云豫賣瓜與守戒者汝為守戒者耶村人云豫等實不知戒請汝賣與老人答曰豫非為賣瓜得錢豫實與瓜於守戒者村人此乃一愚癡之老人言畢離去善生聞此消息自思惟此蓋為豫之故而來彼往老人之所云老者請與我瓜老人貴女為守戒者耶女答豫實為一守戒者老人云豫乃為汝持此而來於是連車置其門口處而去善生於有生之年守戒死後生為毗摩質多阿修羅王之女因守戒之果報生為美人王於女至成年時云將為汝選一適心之夫於是集合魔神爾時帝釋自思善生究生於何處彼巡回察看知彼之生處彼思惟善生欲選適心之夫自己必可當選彼化為魔神之相前往彼處一方善生施以化粧被伴往魔神集會之處命彼女於魔神中選適心之夫彼女環顧四周忽見帝釋彼女因前為摯友關係彼女即曰此為豫夫於是執帝釋之手帝釋伴彼女返還天都彼女為二千五百萬舞姬環侍之女王享其定命從業報離此世而去結分佛述此法話後佛言汝等比丘如是古之賢人治天之王國時捨己生命不為殺生然汝受此教導而出家飲含生物未濾之水是何可耶佛斥責彼比丘連結為作本生今昔之結語爾時御者瑪達利是阿難帝釋實即是我三二舞踊本生談菩薩白鳥序分此本生談是佛在祇園精舍時對某持有諸多財産之比丘所作之談話此與前本已說明之天法本生談六完全為相同之話佛向此比丘問曰汝持有諸多財産為事實耶比丘誠如尊言佛汝緣何持有諸多之財産佛再問之時此比丘聞此言語發出急怒脫去所著之衣與以棄捨謂曰豫將如此而去彼不顧於佛前裸體為諸人所不恥比丘由此處逃去成一下流卑鄙之人比丘等集於法堂云彼於師前如此行為實何可耶比丘等就彼比丘之無德相互談論師適來其處問曰汝等比丘汝等究有何話集於此處比丘等云尊師實彼比丘於世尊前及四衆當中不畏忘恥之罪如村中玩劣之子而裸身彼已為諸人嫌惡之卑鄙者彼背佛之教豫等就其無德而談論佛言汝等比丘彼比丘背棄正當之教不畏無恥之罪非自今日始前生即已同樣失去美麗之婦人於是佛說過去之事主分昔日世界開始之時四足獸類以獅子為王魚類以歡喜魚鳥類以金色之白鳥為王金色之白鳥有一美麗之女王向女云吾女汝可選一汝所欲之任何鳥類為夫彼女亦欲望得適心之夫白鳥之王為達女之欲望集合雪山一切鳥類於是種種鳥類如白鳥孔雀等均前來集合彼等群集於巨大平岩之上白鳥之王呼女云汝可選適於己心之夫彼女見諸鳥群集見一頸持寶珠之色生有美翼之孔雀彼女云此為吾夫於是選定諸鳥於是近於孔雀之前云孔雀此乃王之愛女彼女於如是諸鳥中探尋而君被選中孔雀云汝等今日尚不知豫之能力孔雀喜甚不畏忘恥之罪於諸鳥集處當中肆無忌憚展翼狂舞躍踊脫去著物金色之鳥王怒云彼之內心無稍羞恥外觀態度不畏有罪如是不畏不知恥之罪者豫不能以女與彼鳥王於群鳥之中唱次之偈鳴聲使心樂背尾皆美麗頸現琉璃色展翼及一尋惟因亂舞故豫女不與汝白鳥之王於群集當中將女與其甥白鳥之雄雛孔雀則未能得白鳥之雌雛心感甚恥起立逃去白鳥之王亦歸己之住所結分佛言汝等比丘此比丘不畏不知恥之罪失去大教非自今始前生即已失去美麗之女佛述此法語後連結作本生今昔之結語爾時之孔雀是持多財産比丘白鳥之王實即是我三三和合本生談菩薩鶉序分此本生談是佛在近迦毗羅衛城之榕樹園時有關對圓座諍吵所作之談話而此事將在鳩那羅本生談五三六中說明當時佛向親族等言諸位大王親族之間不應有何等諍吵於前生征服敵之動物等因起爭端而陷入一大破滅於是佛對王族之發問為說過去之事主分昔日梵與王於波羅奈之都治國時事菩薩生為鶉與幾千之鶉友住森林中爾時一捕鶉者前往彼等之棲處倣效鶉之啼聲彼知彼等來集之時向其上投網然後收繫網邊纏縛一處充滿籠中歸家售鶉以為生活之資某日菩薩鶉向彼等鶉友云此捕鳥者使我等之親族滅亡豫知一方便之法使捕鳥者不能捕得豫等今後汝等之上如被網投罩各各將頭鑽入網孔然後一同振翼飛騰往所欲之處或往棘草之藪將網捨棄如是合作豫等可由網中遁出彼等均與贊同曰謹遵如命翌日彼等之上為網投罩時依菩薩之教法持網飛騰棄捨於某棘藪之中各各由網下遁出捕鳥者由藪取網之間已至日暮彼唯空手而歸翌日鶉鳥仍如前所為彼捕鳥者至太陽沒時取綱仍唯空手歸家於是彼妻怒云汝每日空手而歸汝必於他處有娛樂者夫汝勿胡言豫無他處樂者實因彼鶉鳥狡猾為一同合和之事當豫投網彼等立即一同飛起將網運去投諸棘藪然至幾時彼等相互不再真正和合汝勿憂慮俟彼等諍吵之時豫使彼等一羽無遺悉數捕歸使汝歡笑彼向妻語述次之偈彼等相和合鳥可持網去一旦起爭端將歸我掌中然其後數日一羽之鶉降落餌場時無意之間踏著他鶉之頭於是彼鶉怒云誰踏豫頭被責罵之鶉亦怒云豫未注意何必動怒彼等再三互相合口之中相互生起諍論一鶉云今後汝可單獨持網飛升菩薩於彼等相互諍吵之時自思喜好諍吵實際將無幸福彼等於不能持網起飛時將陷入一大破滅將使捕鳥者得以乘機豫不能住於此處於是連同自己之弟子伴侶往赴他處捕鳥者於數日後前來倣效鶉之啼聲於彼集合之上投網爾時一羽之鶉云君於持網時髮毛將拔請君持網飛騰他之一鶉云君持網之時雙翼之羽毛拔脫請君持網飛騰如是等互相爭論之間正為捕鳥者乘機投下網於彼等頭上之時彼等皆被一同充滿於籠中彼為使其妻歡悅歸宅而去結分佛言大王如是親族之間不可諍吵諍吵乃滅亡之根源佛述此法話竟連結作本生今昔之結語爾時之愚鶉是提婆達多賢鶉實即是我三四魚本生談菩薩司祭序分此本生談是佛在祇園精舍時對某比丘為前妻之誘惑所作之談話爾時佛向彼比丘問曰汝比丘汝之苦惱為事實耶比丘世尊是為事實佛為誰所惱比丘世尊豫之前妻甚美豫難捨棄於是佛向彼告曰汝比丘彼婦人實害汝之物前生汝為此死而得救於是為說過去之事主分昔日於波羅奈都梵與王治國時菩薩為一司祭爾時漁夫等於河投網捕魚爾時有一大魚為愛欲所牽接近己妻雌魚與之游戲彼妻雌魚先夫而游泳嗅聞網臭回旋游而不入然溺情貪愛之雄魚則誤入網中漁夫等知魚恰已入網將網曳上捕彼未殺投置砂上謂將以炭火燒食於是起火削製炙串魚悲嘆自思火炙之苦貫串之痛豫皆無所惱惟對豫妻因失豫而前往他處而感悲痛是誠為己之苦惱於是唱次之偈寒暑處網中我皆不苦惱戀夫赴他所妻思我苦惱爾時司祭由從者圍伴為水浴來至河邊菩薩善知一切之音聲彼聞魚之悲嘆而思惟此魚為情愛之悲哀所惱彼之心病不死仍將生入地獄豫將為之救助彼往漁夫處云君等一日所捕者皆為食用不能供養我等漁夫祭主何出此言如貴君等有意食魚請即持去菩薩豫不需其他多物請只供養此魚漁夫請君取去菩薩司祭以雙手捉魚來至河邊謂魚曰汝若非今日遇豫汝將遭遇死亡今後切勿為情愛所牽菩薩於訓誡後將魚放入水中回都而去結分佛述此法話後說明四諦說四諦竟哀痛比丘安住於預流果佛連結作本生今昔之結語爾時之雌魚是出家比丘之前妻雄魚是哀痛之比丘司祭實即是我三五鶉本生談菩薩鶉序分此本生談是佛在摩揭陀國巡錫出發時對消滅森林火事所作之談話某時佛在摩揭陀國巡錫出發期間向摩揭陀國他之部落托鉢食事終了由托鉢歸來由數多比丘衆圍繞於道中前進爾時森林起大火事佛之前後實有諸多比丘圍繞其火煙焰交雜蔓延於是此下根比丘等恐怖死亡云我等焚燒逆火如是今所燃之火不能蔓延至我等處彼等取出所準備之附木柴以起火而其他比丘等曰諸位法友汝等究欲何為汝等未見空中懸月實由東方升起千光之日輪如自立於海濱在須彌山下而不見須彌之山與天人界高貴無比之人相伴而行時反不思念真正之佛焚燒逆火而呼叫汝等實不知佛之力汝等應往佛前為宜於是比丘等一切諸人聚為一團齊來十力佛前於是佛由大比丘衆伴隨往他處逗留森林之火強烈狂猛但吹至如來所立之場所則達於四方十六伽里薩面積之處而止宛如投入水中之火把而消去其直徑不能擴展只達於三十二伽里薩比丘等開始讚歎佛之功德云此實為佛之功德無心之火尚不能擴展至佛座之處此實為佛之神通力所致佛聞彼等之言佛言汝等比丘火來此處消失決非為豫之力然此乃為豫古昔真實之力何以故火到此處將永劫不能燃燒此即所謂劫持續之奇蹟爾時長老阿難陀擴展四疊之衣以為佛座佛端坐後右繞如來恭敬禮拜而坐爾時一同向佛問曰世尊豫等只知現在過去甚為隱祕請佛示知於是佛為說過去之事主分昔日菩薩於摩揭陀王國再生於鶉之母胎彼得由母胎之出生於破卵飛出時美麗如月圓圓狀之鶉子爾後彼之雙親置彼於巢中每日銜來食餌以嘴喂食彼雖展翼而無騰空飛翔之力彼雖揚足而無支持地上步行之力而年年森林之火災侵來其處某時森林大火發出爆音侵來彼之場所鳥群由巢中飛出皆恐怖死亡而逃菩薩鶉之雙親亦恐怖死亡置菩薩於巢中而逃去菩薩昂首見火燒近彼自思惟若豫有展翼騰空之力即可隨欲飛往他方若豫有揚足步行之力即可徒步行欲行之他方雙親尚恐怖死亡為保護自身單獨置豫而逃去是故豫今無他保護者亦無救助者今日豫將如何不得而知爾時彼之腦中浮起一想此世之中有稱戒律之美德者有名真理之美德者昔日為實現波羅蜜坐於菩提樹下現身成正覺之佛依戒律禪定智慧而得解脫依解脫完成知見保持真理慈悲愍念忍辱為平等庇護慈愛一切衆生是名為一切知之佛而佛所體驗者名曰法德豫亦具有此一真實諦又亦保有信此一自性法是故思惟昔日諸佛及諸佛所得之德能得自行體驗此真實之自性法行此真實行則今日之火可由豫使之退去而自他所餘之鳥豫必須計劃使之安全於是唱如次之偈世有戒德有真實對此清淨有慈悲依此真實自性法我為無上之誓言思念自性法之力憶念昔之賢勝者知見真實法之力我為無上之誓言又菩薩思念昔日得涅槃諸佛之功德依存自己真實性為誓言而唱偈曰有翼不得飛有足不能步父母雙飛離汝火速歸去與彼誓言之同時火退止於十六伽里薩之處退時亦不往森林燃燒而如火把之投水瞬間消滅於無形於是菩薩作如是言曰熾燃大火聚與我誓言俱十六伽利薩一旦皆消去恰如一火把投向水中滅此後此一場所永劫逃過火劫之征服此名之曰劫持續之奇蹟如是菩薩體得誓言命終隨其業報離世而去結分佛言汝等比丘此森林之火不得蔓延非豫今之力乃昔日為幼鶉之時依豫實現之真實力而成佛述此法話後說明四諦說四諦竟某者得預流果某者得一來某者得不還某者達應供阿羅漢佛更連結作本生今昔之結語爾時之雙親是今之雙親而鶉之王實即是我三六鳥本生談菩薩鳥序分此本生談是佛在祇園精舍時對燒失庵之比丘所作之談話某一比丘於佛之前授得禪定法後由祇園精舍出發往拘薩羅國於近某邊鄙村之林中住一僧房恰於最初之月其庵被燒掉彼比丘向村中諸人告述村人云豫等之土地乾旱先行灌溉灌溉後蒔種施種終了結垣作垣及除草終了刈割刈割終了後舂搗如是工作中渡過三倨月於三個月間彼比丘於原野為不愈快之生活修行禪定一無所得彼於自恣後往佛之前禮拜後坐於一隅佛亦叮嚀問候後佛問曰汝比丘雨安居生活安樂否達於正確之禪定否彼比丘述所遭遇之事而答曰因無適當之僧房未得達禪定之極地佛言汝比丘汝前生為動物尚知對自己之適與不適汝何以仍不解耶於是為說過去之事主分昔日於波羅奈梵與王治國時菩薩生為鳥受群鳥圍繞於枝葉茂盛繁密之大樹附近之森林中住為棲家某日樹枝相互摩擦灰塵跌落升起火煙菩薩見此自思惟此二樹枝相互摩擦將欲生火此火落於古枯葉之上則己物相燃將燒及此樹我等不能住於此處必須由此場所逃往他處彼向鳥群唱次之偈鳥棲之樹今自吐火鵝鳥今赴他處尋避難所與習菩薩鳥言行之鳥立即隨菩薩飛往他處然不學之愚者云此如滴水之中見鱷魚彼等不從菩薩之言仍居其處此後不久果如菩薩之思慮燃燒起火燒盡其樹當焰煙升起之時煙薰鳥多盲目不能飛往他處逐一落入火中均被燒死結分佛言汝比丘如是如前生為動物住於樹枝尚知對己之適與不適汝何以尚不了解佛述此法語後說明四諦說四諦竟彼比丘安住於預流果佛更連結作本生今昔之結語爾時從菩薩所教之鳥是佛之伴隨比丘賢鳥實即是我三七鷓鴣本生談菩薩鷓鴣序分此本生談是佛在舍衛城時對舍利弗長老之牀座被奪事所作之談話實因給孤獨長者建立精舍派遣使者前來佛前時佛由王舍城出發到達毗舍離於其處隨意逗留後正往舍衛城之行進途中爾時有六位弟子先行於長老等尚未取得牀座之間彼等云此牀為我師尊此牀為先輩指導者此牀為我等自用妨礙長老取得牀座使彼等之後前來之長老等不能入于牀座而舍利弗長老之弟子等亦未能尋得長老之牀座長老因不得牀座於近佛牀座處之一樹根有時為座有時繞根步行度過時日於晨朝出發時佛起聲嗽長老亦為聲嗽佛彼處何人舍利弗世尊弟子舍利弗佛舍利弗此時因何居於此處舍利弗告以事之原委佛聞長老之言後思巡對法發生之事憂心天明佛集合比丘教團向比丘等問曰汝等比丘吾聞六人先行者奪取長老比丘之牀座為事實耶比丘是為真實佛斥責六人比丘後向比丘等說示法話佛問彼等汝等比丘究竟誰有受此最上牀座最善之水最良食物之資格某比丘答彼為剎帝利族之出家者又某比丘答彼為婆羅門族或居士族之出家者又其他諸比丘答持戒者布教師初禪之得達者二禪三禪四禪之得達者更有其他諸人答預流一來不還阿羅漢及得三明六通者如是比丘等依各各之希望暗示得最上牀座之資值彼等語言終了時佛言汝等比丘於我教團得最上牀座等標準非為剎帝利族之出家者亦非婆羅門族居士族之出家者亦非律師經家論師及得達初禪等者乃至亦非預流等之標準汝等比丘於此教團實為隨其年長者始應受敬虔之問候合掌敬禮真誠之奉事可得最上之牀座最善之水最良之飲食此實為真正之標準是故年長之比丘實為適應汝等比丘今於此處之舍利弗為豫之高足為轉法輪者應得次於豫之牀座然彼昨夜未得牀座於樹根處過夜汝等今尚如此有失尊敬缺乏從順移時而行究將如何其後佛更與彼等教訓云汝等比丘於前生為動物時失去互相尊敬缺乏從順有悖普通生活而行者於我等決不適宜於我等之中知誰為較年長者應為敬禮汝等宜善加思惟知此為較我等之年長者向彼敬禮得往天道於是佛為說過去之事主分昔日於喜馬拉雅山中腰近一大榕樹處棲有鷓鴣猿與象三友彼等相互失去尊敬缺乏從順乃至有悖普通生活之法於是彼等浮起思惟如是生活於我等頗不適宜我等實應向我等中之年長者為尊敬禮貌之生活然我等之中誰為最年長者耶某日彼等欲思出一法三者共坐於榕樹之根鷓鴣與猿對象問曰象君汝前知此榕樹如何生長象云豫於幼年兒童時分此榕樹為一灌木豫跨彼而行更豫立於灌木之間時彼之最高之枝達至豫臍是以豫由彼為灌木之時即已知之又鷓鴣與象與前同樣向猿問之猿曰友豫為小猿時分坐於地上伸首可以食及此榕樹最上之幼芽因此豫由極幼之時即知彼之生長爾後象與猿與前同樣問鷓鴣彼云友昔日於種種場所有大榕樹豫食其實後來此場所落糞由是而此樹始生因此豫於此樹未生之先即已知之因此豫為汝等之年長者如是猿與象向賢者鷓鴣云友汝較豫等年長此後豫等將對汝恭敬尊重承事敬禮合掌供養敬語奉迎禮拜和敬豫等將從汝之教汝今後應與訓誡豫等自彼時以來鷓鴣教訓與彼等使保戒律自身亦守戒律彼等三者守五戒相互尊敬隨順守普通之生活法盡壽命時均赴天界安住之所結分彼等三者所受持者名曰鷓鴣系之梵行佛言汝等比丘彼等動物實尚相互尊敬從順而為生汝等出家善受經律之教何以相互失去尊敬缺乏隨順而生活耶汝等比丘豫決定如次爾來汝等應向年長者為敬禮合掌供養隨其年長可得最上之牀座最善之水最良之食物而爾來年幼者不可奪年長者之牀座凡奪物者無論何人皆為惡作突吉羅罪如是佛宣此法話竟現身成正覺佛唱次之偈恭敬耆宿者通曉真理法現法聖者讚等值阿羅漢來世赴善處如是佛說尊敬耆宿之功德竟連結作本生今昔之結語爾時之象是目犍連猿是舍利弗鷓鴣實即是我三八青鷺本生談菩薩樹神序分此本生談是佛在祇園精舍時對一裁縫師比丘所作之談話據傳住祇園中有某比丘對任何有關衣服之必要裁法合法假縫設計真縫之工作甚為熟練彼以善巧堪能之手藝製作衣服是故彼為裁縫師而知名彼之善巧為何彼為示其技能以一古舊布片能製成柔軟而穿著愈快之衣服彼為衣服著色終了以染料染後以貝殼擦光製成美麗光華之上好衣服而不知縫紉之比丘穿著衣服來至彼所云豫等不知製作方法請君為豫等製作彼云汝等法友衣服製作乃長期之事此處恰有豫製成之物請用布交換衣服持去彼取衣服示現於彼等彼等只見美色不知其他以為耐用以新布與之取彼衣服而去然穿著稍污以熱水洗之布之本性出現襤縷之狀使彼等後悔如是前來諸人彼以拼湊繼接之衣服布片相欺於是彼比丘之行遍為人知而彼於祇園之所為與此同樣於他村亦有一欺世間之裁縫師彼忠實之友比丘等語彼曰尊師恰如汝之欺騙世間祇園亦有一裁縫師於是彼亦浮起思惟豫將往欺騙彼處之市民彼以布片製成非常美麗之衣服染成赤色穿著往祇園而來他一裁縫師見時心懷羡慕問曰尊師此衣服為君所製耶裁縫師唯然諸法友友請將衣服讓與我貴君可取得他物裁縫師諸位法友豫處村民等咸信此為難得之物若豫今將此與汝豫自身將著何物友尊師豫有新布可持去請君縫製衣服裁縫師諸位法友豫之技藝於此可見然貴君如是言者豫能為如何請取此去於是彼與拼湊繼接之衣服而換取新布欺彼而去祇園之住民著此衣服數日之後以熱水洗濯之時見為破舊之襤褸布片甚感羞恥彼向人云住於鄉村之縫師朦混祇園之市民彼被欺瞞之事實遍知於教團之中其後某日比丘衆著席於講堂議論其事佛出來時問曰汝等比丘汝等今有何話集於此處彼等語此發生之事佛言汝等比丘住於祇園之裁縫師朦混他人非自今始前生即亦為同樣朦混之事而此住祇園之裁縫師為鄉村之裁縫師所欺亦非自今始前生亦同樣被欺於是佛為說過去之事主分昔日以森林為住家之菩薩是生立於某蓮池附近大樹之神爾時此不太大之池夏季水常乾涸而彼處棲住大量之魚一隻青鷺見彼等之魚云以一方便欺魚而食之彼往池之對岸長思而坐時魚見彼問曰鷺主汝有何思而坐鷺豫思汝等之事而坐魚鷺主汝對豫等思何事鷺此池之水甚少食物貧乏且暑氣酷烈因此此等之魚究將如何故對汝等之事思惟而坐魚鷺主然則豫等將如何之為宜鷺若汝等實行豫言用嘴銜接尾尾相連豫將汝等往有五色蓮華掩蔽之池投入彼處魚鷺主自劫初以來未聞鷺為魚身作救援之思案貴君思欲將豫等逐尾食之鷺汝等惟有信豫豫決不食汝等若更對彼之所在如不信我可遣一尾魚與豫俱往見其池於是遣一水中丘上皆適之一尾獨眼大魚魚遣彼與汝俱往鷺銜彼魚帶往彼池使見池之全體後又復回返入於諸魚之處彼魚向其伙伴諸魚賞讚彼池之美麗彼等聞其說明皆欲前往彼處魚鷺主甚善可帶豫等前往鷺首先帶獨眼大魚前往池畔使見池後然後攜同到達池畔所生之波羅奈樹處將彼魚投入樹叉之中用嘴啄殺然後食其肉將骨投入樹根之處再行回返云豫已將彼魚投入池中其他諸魚依同一方法逐尾攜往食諸魚後復歸來時已不見餘一魚然此處殘留一蟹鷺思欲盡食向蟹云蟹君彼等諸魚皆為豫攜往入大蓮池中汝出豫攜汝行蟹汝以何法攜豫前往鷺豫以嘴銜之前往蟹汝以此法攜豫前往豫將跌落豫不與汝同行鷺汝可勿恐怖豫以嘴銜緊攜汝前往爾時蟹自思惟此鷺何故為此攜彼魚等往投入池中之事耶若彼將豫亦投入池中則豫甚滿足若彼不使豫入池則豫鋏斷彼之喉管而奪其命於是蟹向鷺云喂汝鷺汝將不能用嘴銜緊攜豫而行豫將以鋏捉緊汝之喉管挾住汝首一同前往鷺不知蟹在欺己向蟹云甚善與之同意蟹以自己之鋏如鍛之火箸緊鋏鷺之喉管云現在可行矣鷺攜蟹往使見池後後往波羅奈樹之處蟹喂叔叔彼池在此而汝攜豫前往他處鷺豫為汝親愛之叔叔汝為豫甥汝思豫為銜汝而行之奴隸汝懷是思然汝試觀此波羅奈樹根之骨山彼等諸魚皆被豫食同樣汝亦將被豫食蟹曰此等諸魚為自己之愚而被汝食豫豈但不許汝食豫豫且將殺汝汝實愚蠢不知為豫所欺如死則共之豫切斷汝之喉管投諸於地面於是以如火箸之鋏挾彼喉管鷺口圓張眼中流淚喉管痛苦非常彼受死之恐懼所脅迫向蟹云蟹主豫不食汝請救豫命蟹若是汝落下豫入池鷺回返落於池所蟹立於池畔泥上蟹鋏如刀切斷鷺首如切睡蓮之莖然後入於水中住於波羅奈樹之樹神見此不可思議之事大加讚嘆於森林為喜悅之呼喚以美音唱次之偈常於奸智者永不得繁榮奸智鷺遇蟹終得惡業果結分佛言汝等比丘此者為田舍之裁縫師所欺非自今始前生即已同樣受欺佛述此法語後連結作本生今昔之結語爾時住祇園之裁縫師是昔之鷺住田舍之裁縫師是此蟹樹神實即是我三九難陀本生談菩薩地主序分此本生談是佛在祇園精舍時對舍利弗長老之弟子所作之談話據傳彼比丘謙遜從順對長老非常努力奉仕某時長老向佛乞假出發托鉢來至南方某山間之田舍彼比丘到達其處時慢心積聚不從長老之言長老云法友汝為是事但彼逆長老之言而行長老不解比丘之心意長老於彼處托鉢終了再歸祇園彼比丘於歸來祇園時後對長老再如原恭順之狀長老告佛曰世尊豫之一比丘某時如百文所買之奴隸某時則積聚慢心逆豫所言而行佛言此比丘之如是行動非自今始前生即亦於某時如百文所買之奴隸有時逆言而反抗佛因長老之問而為說過去之事主分昔日於波羅奈梵與王治國時菩薩生於某地主之家族彼有一友人地主自己年老反娶一少妻彼與妻之間生有一子彼思此女年少豫死之後為其他之人覬覦豫之財産不與豫子一切成空豫為安全將此財産埋入地中彼攜帶家中使用奴隸難陀往森林某處埋藏彼之財産彼告奴隸云難陀汝於豫死後將此財産事告知豫子此一森林不可讓渡他人彼於曉諭後不久死去其子時來達於成年其母謂彼曰汝父生前攜難陀前往森林埋藏財産汝可取來振興家業彼子某日向難陀曰叔叔豫父藏置之財産究有幾何難陀實有甚多主人彼子究在何處難陀埋森林中主人彼子如是豫等前往挖掘彼等持鋤與籠往藏財之所時彼子云叔叔財産埋藏於何處難陀往財寶埋藏之處彼立於其上心起貪慢罵彼子曰女傭之子此處何有汝之財産彼子聞其粗暴之言如不聞之狀而言曰如是我等歸去彼子經二三日後又復經過其處難陀仍如前狀罵彼彼子以其言語粗暴彼思此奴隸自此以來對豫往尋財寶輒以惡口相向其理由不解然豫父有一地主友人豫往問彼於是往菩薩處說明一部始終經過後問曰伯父是何故耶菩薩難陀如再對汝施以惡口汝可對其嚴加叱責此財産為豫父所有汝奴隸之輩何能罵我速持鍬鋤將豫家之財産挖出並與彼立即持歸於是為唱偈曰此處如所思難陀所立處有金有瓔珞彼吐粗暴語彼子告別菩薩歸家攜難陀往埋金處如菩薩之教命難陀將財寶掘出振興家業隨菩薩之教訓為布施等淨業命終之後隨業報離世而去結分佛言此人前生亦為此同樣之性質佛述此法話後連結作本生今昔之結語爾時難陀是舍利弗之弟子賢明地主實即是我四迦提羅樹炭火本生談菩薩豪商序分此本生談是佛在祇園精舍時對給孤獨長者所作之談話給孤獨長者實為精舍向佛教施捨五億四千萬之財産彼不認勿視三寶而為他寶之意義佛在祇園精舍彼每日為三大奉事即晨朝一度朝食後一度夕時一度共為三度之奉事其間尚有中間之奉事每於出發之際彼思沙門與少年皆欲見我手謂彼將持何物前來是故彼決不空手前往晨朝出發時持粥而往朝食之後持熟酥生酥蜜糖蜜等夕時持香料花環布類前往如是每日消費且其消費無有限度諸多商人以借據向彼貸巨額之金達一億八千萬餘彼之豪爽對此事決不掛在口上又屬於家産之一億八千萬金埋於河畔為洪水破壞堤防時流入大海彼之財寶密閉於銅甕之中沉於大洋之底雖然如此彼之家庭仍對五百比丘經常準備不斷供應飯食彼豪商之會館對比丘教團而言宛如十字街頭所堀之蓮池彼由比丘等視之實居於父母之地位是故正真之佛常過其館八十諸大長老亦同常往其餘諸多比丘亦往來不知其數彼館由七層大廈及七座望樓所莊嚴在第四望樓住一異教之魔女神當正真之佛入其館時魔女神不能留住於其家攜其子降至地上又八十位大長老及其餘諸長老出入之時彼女仍須如是彼女自思沙門瞿曇及彼之弟子等來入此館期間我等不能安心居住我等不能終日不絶降臨地上必須設法使彼等不入此館於是某日於大管家休憩之時彼女往彼處現光輝之相管家汝是何人女神豫是生於第四望樓之神管事何故前來此處女神汝等不見豪商之所作彼不思己之未來耗費財産肥飽如沙門瞿曇者既不為商賈之事亦不執何等之事務汝等應忠告豪商作自己之工作又勸告勿使沙門瞿曇與其弟子進入此館於是彼向彼女云愚癡之魔神豪商減少財産實為佛教之導引救濟而消費縱然彼捉豫之毛髮出賣豫亦決無何怨言汝速退去於是女神更往豪商長男之前作如前之忠告彼亦如前管事之言斥退於是彼女終不能與豪商相談豪商雖然常為布施然因不為商務收入減少財産瀕臨破滅彼逐漸貧乏供物衣類寢具食物亦不如以前雖然如此彼思不至於不能布施之前決向教團作滿意之布施其後某日彼豪商長者向佛禮拜著座時佛問居士汝之家庭尚能行布施耶彼答唯然世尊尚可為少許然於前日開始尚能奉獻酸粥爾時佛向彼言曰居士汝思施物不佳汝勿煩惱實則心如為善則施與佛辟支佛及弟子等決非惡事何以故大果報在其中故實則淨心所為者其布施決非不淨而如次偈可以得知即等覺如來佛弟子心淨布施無少多鮮小奉事妙智佛少量乳糜果報多更對彼言曰居士汝雖施不佳之施物然為施與證得八聖道之諸人豫施七寶耕耘世界至終極豫行一大布施如五大河溶為一大激流對歸依三寶或持五戒者少之又少真正足以接受布施者亦極為難得是故豫不思豫之布施不佳而煩惱如是語後使讀誦經典滅盡經從此豪商繁昌之時未能與彼交談之魔女神自思今此貧乏者當可接受豫言矣彼女於午夜進入寢室現光輝之相立於空中豪商見狀云汝是何人魔女神豪商豫是住於第四望樓之女神豪商何故前來此處魔神為向爾勸告豪商如是請言魔神豪商汝不思及未來不顧慮子女諸人而奉沙門瞿曇之教消失莫大財産爾自身之不當及財産之浪費更因不為新奇之事業接近沙門瞿曇使汝成為貧乏雖然如此汝仍不捨沙門瞿曇彼等沙門日日出入爾之家門彼等受取之物汝已不能收返汝須堅決承諾自今日以後爾自身勿再往沙門瞿曇之前又彼之弟子等亦不許再入汝家尚更離沙門瞿曇而勿顧善營自己之商業與工作於是彼向魔神問曰此為依汝主人所與之忠告耶魔神唯然豪商如是魔神雖有百千乃至百萬豫無所畏依十力之佛乃得如是豫之信仰實如須彌山之安住不動豫為勸導救豫之寶教而施捨財寶汝主之言邪惡如汝依不敬不遜惡魔之言向佛之正教攻擊汝與汝主不可住於我家速由我家退出往他之所彼女聞此預流者聖弟子之言不能停留往己之住居牽其子等之手出走然於出行後不得其他住居思欲向豪商乞求仍住原處彼女往街上之守護神之所敬禮而立問其是何緣由而來彼女云豫因造次向給孤獨長者進言彼怒而由彼家將豫放逐請攜豫往豪商之前向彼懇求與我住家守護神汝向豪商云何事耶魔神神主豫謂以後不可向佛奉事向教團奉事沙門瞿曇不可入爾之家守護神爾所言甚惡乃向佛教攻擊豫不能帶爾往豪商之前彼女由其處未得何等恩惠即往四天王之前與前同樣為彼等斥退於是親近帝釋天王語彼之事向帝釋熱切嘆願天帝豫不得住所牽子等之手徘徊無假宿之處請依王身之威光與我以住所彼亦向彼女云汝之所作邪惡攻擊勝者之教豫亦不能為爾向豪商相然然豫可與爾使豪商容認之一方法魔神謹遵臺命天帝請言天帝諸人由豪商借有一億八千萬之借據爾以彼之委託者之姿勿使人知執其借據前來然後牽青年之夜叉數人一手執借據一手執收據往彼等之家突現於彼等家之當中爾以自身及夜叉之勢力向彼等盡力脅迫云此為汝等之借據我等之豪商事業興盛執牛耳之時未向汝等有言然今彼已貧乏汝等應還借金於是現自身之魔力將一億八千萬金幣準備充實豪商空虛之寶庫此外於阿致羅筏底河畔所埋之財寶因河提潰掘流入海中爾可以自身之魔力取回充實寶庫此外尚有他處無主之財産一億八千萬亦一同持來充實空虛之寶庫汝可依此等五億四千萬充實空虛之寶庫以為贖罪之資向豪商乞求彼女謹遵臺命天帝依彼之言從彼之法攜來所有之財産午夜中入於豪商華麗之寢室現光輝之相立於空中被問為誰彼女豪商豫為住於爾第四望樓之愚癡盲目之神豫大愚鈍不知佛之威德目前向爾稍為煩言請爾恕罪豫從帝釋天王之言為爾收回一億八千萬之債款覓得沈於海中之一億八千萬金更有其他無主之財産一億八千萬共計五億四千萬金額持來充實空虛之寶庫欲為贖罪豫現在未得任何之住所疲弊已極恕我為愚癡之事勿掛於心請與寬恕豪商長者給孤獨聞彼女之言自行思惟彼女為魔神今向豫贖罪告白自己之過惡豫將導彼女至佛前佛將對此思惟使彼知佛本身之德爾時彼向彼女云親愛之神若汝主欲如豫之原諒汝主可至佛前作此原諒魔神甚善如汝所行如是請攜豫至佛前豪商如是甚善天明破曉豪商與女同赴佛前向如來告知彼女所為一切之業佛聞彼言終曰居士罪惡者於罪惡未熟之間雖現善良但知罪惡徹熟之時始開知見善良者亦於善事未熟之際見如邪惡然於善事成熟之後始開正當善事知見於是唱次之法句經二偈惡人罪未熟所作如善良罪惡之熟時惡人知邪惡善行未熟時見之如邪惡善行已熟時善人知善良佛唱偈文竟彼魔神得安住預流果彼女敬禮佛之輪足曰世尊豫染於欲沉朽罪惡惑於邪念眩於無明不知世尊之美德發邪惡之言辭請佛恕罪於是得佛之原宥得豪商之原宥爾時給孤獨於佛前話自己之德行云世尊此魔神雖妨礙豫對佛所作之奉事然豫仍為布施之行世尊此非豫之功德耶佛言居士汝實為改宗之聖弟子而又為堅信與淨見之持主汝為此無勢力神之妨害而不被抑壓無何不可思議然汝於前生佛未出世汝為一智識尚未圓熟之賢者受欲界之主惡魔之妨害彼立於空中謂若爾為布施則為此地獄所焙彼示以熾燃八十尋深炭火之爐令汝不可布施但汝仍立於蓮華果房之中施行布施此實為不可思議於是佛依給孤獨之請求為說過去之事主分昔日於波羅奈之都梵與王治國時菩薩生於波羅奈豪商之家族彼受種種愈悅之方法如王子之養育順適修得智慧十六歲時熟達種種技藝彼於父亡故繼承豪商之管理家業彼於都城四門中央及自己住宅門前總合立六處布施堂所行大布施並保戒行布薩行於是某日朝飯向菩薩捧獻種種特殊美味食物時一辟支佛緣覺由七日間法悅滅諦中起立知應為托鉢之時彼云今日應往訪波羅奈豪商之館彼銜檳榔樹之潔齒楊枝用阿耨達池水漱口立於雄黃山之平原著內衣繫帶著纏衣持以神通力所作土製之鉢通往空中恰於向菩薩獻食之時到著彼家之門口菩薩豪商見彼之時由座起立以示恭敬服從且注視侍者侍者主人將欲何為菩薩汝往取世尊之鉢恰於此一剎那罪深之惡魔云此辟支佛於第七日得食今日若彼不得勢必死亡豫殺彼禁止豪商布施於是扮成武者形相震威而立彼於此一剎那前來於館之內側焚起八十尋深炭火之爐彼以地置炭充滿之爐炎焰熾燃上升恰如阿鼻無間大地獄之狀然彼製作之後自己立於空中彼為持鉢而行來之侍者見此意外事大怖而返菩薩問汝何故由彼處返回侍者主人此館內側有大炭火爐炎炎燃燒而其次前來諸人皆仰面乞驚急行逃去豪商自思惟今日此無上快樂奴隸之惡魔將對豫行布施之妨害者彼自為努力然彼不知豫非百千惡魔所能戰栗者今日豫將與惡魔見何者之力強權力威大彼自持將準備進食之鉢由家內出往炭火熾燃之爐邊而立仰望空中發現惡魔云爾是何人惡魔我乃惡魔菩薩此炭火之爐爾所造耶惡魔唯然菩薩此將何為惡魔為妨害對爾行布施又為斷絶辟支佛之壽命菩薩豫對任何妨害豫自己之布施及向辟支佛之壽命加諸危害之事皆不許可今日將見我與爾何者之力強大菩薩於是立於炭火之爐邊云世尊辟支佛豫向此炭火爐中倒豎墜落不再返來唯請取豫所獻之食物於是唱偈寧入地獄淵不為卑賤業雖然逆墜落望速取獻食菩薩唱此偈後以強烈之決心持飯食之鉢沿燃火之爐外側漫步恰於此時由八十尋深炭火爐底忽然高生出現優美之一大蓮華頂禮菩薩之足然後如入於大水瓶中噴出大量之花粉降於大薩埵之頭上全身如金粉似酵母之光輝彼立於蓮華之頂以種種美好之食物納入辟支佛之鉢中彼接受而表滿足之意於是投鉢於空中於多數人圍觀之中自行升空猶如撥開密雲往喜馬拉雅山而去惡魔敗北意氣消沉彼亦回返自己住所而去而菩薩尚坐蓮華之頂向大衆讚嘆布施之功德彼說法話竟由大衆圍繞進入自己之住居菩薩盡形壽行布施等淨業隨業報離此世而去結分佛言居士汝達如斯知見對今之惡魔不怖無何不可思議而於前生依賢者所為之事實不可思議佛述此法話後連結作本生今昔之結語爾時之辟支佛即於其處證得涅槃而征服惡魔坐蓮華之頂向辟支佛供養食物之波羅奈豪商實即是我第五章利愛品四一羅沙伽長老本生談菩薩戒師序分此本生談是佛在祇園精舍時對長老羅沙伽帝沙所作之談話羅沙伽帝沙為誰彼為拘薩羅國漁夫之子為己家族之破滅者彼於為比丘後已成無一物之人據傳彼於拘薩羅國一千人家族所住之漁村新生於某漁夫之妻胎為其最後離去之出生場所當彼新生之日一千家族之人持網往川池捕魚即一尾小魚亦不可得自彼時以來漁夫等日見衰敗當彼於胎中期間此村七度被火七度受王刑罰當然結果悲慘彼等思惟我等以前從未如此我等不久恐將滅亡此於我等之中必有不幸者在今將分為二組於是各五百人為一家族於是雙親所在一方衰敗而他之一方繁榮彼等將衰敗之一方再分為二更又再分終於將彼母分離成一家族彼等知此為彼等之中之不幸狀態者由家族中分離將彼母放逐於是彼母自立生計機熟臨月於某處生産世間得最後存在者不滅何以故此恰如瓶中之燈於彼心中燃起阿羅漢之命運故彼女看顧其子至能各處巡回行路之時與一鉢於其手云汝入人家乞食為生彼女將子逐出自己逃往他處而去爾後其子完全孤獨探索施食寢於各處不行沐浴不稍惜身完全如一塵垢之餓鬼辛苦保命彼七歲之時於某家門前洗鉢處如鳥之啄食拾撿飯粒為食爾時法將舍利弗於舍衛城中巡回托鉢見此子甚為憐憫彼思此為何村之兒對彼柔聲曰汝來彼來向長老作禮而立於是長老問曰汝為何村之兒雙親在於何處彼答尊師豫為孤兒豫之雙親謂對豫倍感辛勞疲弊已極捨豫而去長老汝不欲出家耶童子尊者豫極願出家然如豫之貧賤而無體面者誰能使豫出家長老豫將使汝出家童子實甚感謝請尊者帶我出家長老與彼嚼食硬食與噉食軟食伴往寺院親手為彼洗浴使之出家達充分之年齡時使受具足戒彼至老年後稱之為羅沙伽帝沙長老彼實不幸但少欲知足彼與他人受諸多布施者不成比較彼不求滿腹只求保命已足彼之鉢只能容一柄杓之粥即已溢出邊緣故此諸人知其鉢已滿用他物盛粥與之諸人或有云者向彼施粥之時施主之容器中亦將無粥施與嚼食亦復如是彼於其後增加知見得最高果之阿羅漢彼仍少欲知足年壽盡時入涅槃日近此人生當然之結果法將舍利弗暝想知彼將入涅槃彼思惟羅沙伽帝沙長老今日將入涅槃豫應與彼所望之食物於是攜彼入舍衛城托鉢長老為彼向多人伸手而不使人敬禮於是長老向彼云友汝往坐堂中使往彼處後長老將集得之物交付他人云將此與羅沙伽但持物之人忘卻羅沙伽長老之事彼等竟自分食其後長老入寺時羅沙伽長老進前作禮長老回顧而立問曰友汝已進食耶彼答尊師豫最後再食長老頗為焦急見食時已過於是長老云友汝請坐於此處彼使羅沙伽長老坐於座堂急往王宮入拘薩羅王之宮殿王取長老之鉢云食時已過命取四甘食充滿鉢中長老得食歸來告曰友羅沙伽帝沙請食此四甘食長老持於手中而立然帝沙長老表示敬意恥而不食於是長老向彼云友帝沙若豫將鉢離手其中之物即將化為烏有豫須持鉢而立汝請坐而食之尊者羅沙伽帝沙長老在最上主法將持鉢在手而立之間食四甘食長老依聖神通之力不使彼之食物成空故此羅沙伽帝沙長老得如願而食滿腹而後實於其日即入無餘涅槃等正覺者立於近前厚葬於彼集骨為作墳墓爾時比丘等集於法堂云諸位法友羅沙伽帝長老實為不幸然少欲知足何以如是不幸與少欲而得至聖位彼等相互交談而坐佛入法堂問曰汝等比丘汝等今有何話集於此處彼等答尊師如是如是佛言汝等比丘此比丘自行少欲自得聖法彼於前生亦拒他人之施少欲知足具世之無常苦之無限知見依其適應境遇之結果至得聖法之位於是佛為說過去之事主分昔日迦葉飲光佛在世時一比丘賴某長者度村里生活彼為比丘應為之事德行具足行適應知見之作業彼與得阿羅漢果之某長老為同僚而住於一處然於長者之村此比丘之不運開始降臨今說明事之經過始末如下先是長者對長老之態度甚為滿足取鉢使入其家恭敬供養聞簡短之法語後向長老云尊師請住於豫等附近之寺豫於夕時歸來後前往訪問長老往寺向住於其處之長老敬禮得其允許坐於一方彼亦對長老歡迎而問曰法友汝得施食否長老唯然豫已得之寺之長老於何處得之長老於汝之臨近之村長者之家於是長老整頓自己求得之庵室收拾衣鉢坐住於禪定樂及果樂長者於夕時運來香花燈火及油前往寺院向先住者長老敬禮問曰尊師新至長老在否來此處耶彼答曾來豫處長者今在何處彼答如是如是之庵室於是長者至長老處敬禮坐於一方聽聞法話氣候漸涼長者向墳墓及菩提樹供物點燃燈火招待二人後離去先住者之長老自思欲彼長者為分離若彼比丘住居此寺豫將受如何待遇彼心甚不快彼思豫須講求使彼不能住居於此寺之方法是故長者招待之日雖然到來彼亦決不通知長老得阿羅漢果之長老知彼比丘之心長老自思惟彼比丘不知豫並未對其家族或一族構成障礙於是彼往己之庵室仍住於禪定樂與果樂翌日先住者長老以曲指敲鑼用指爪擊戶後往長者之家長者取彼之鉢準備置席使坐問曰尊者新來之長老住往何處耶彼云豫不知汝之信友之狀豫敲鑼擊戶不能使彼清醒昨日於貴宅接受招待美食未能消化今將熟睡汝請安心彼對彼之狀態甚為滿足一方得阿羅漢果之長老思惟行乞時至整頓身邊取鉢騰空飛向某方而去長者使長老飲酥蜜砂糖所作之乳粥後以香粉磨鉢更滿盛乳粥於鉢中向長老云彼長老旅途疲勞請持此與彼彼未拒絶持此而行歸途中自思惟若彼比丘飲此乳粥則捉其首而放逐彼亦不走若豫將此乳粥與人則將為人發覺若投入水中則酥油浮於水面若投諸地上則烏鴉群集為人所知然究應棄往何處耶爾時彼發現火燃之處彼取除燃屑捨棄乳粥於火中燃燒然後以燃屑蔽附其上而歸寺歸來不見彼比丘而自思惟彼得阿羅漢果之比丘確知豫之思考而他去豫為胃腸而行惡事矣彼立即起大悲哀其後不久死為幽炙生入地獄彼於數百千年之間於地獄中受苦因業果之餘薰續於五百世之間生為夜叉一日亦不得滿腹之食物每日只能食糞便以充饑次五百世生而為犬此時亦每日只得見而厄逆嘔吐之食物以果腹此外完全不得飽餐之食物幸得脫離犬性生於迦尸國某村之貧家自彼出生以來彼之家族更為貧乏自彼剪臍降生以來彼連水粥亦不可得彼之名為知友者雙親不堪生活之痛苦向彼云汝去此一不幸者將打彼而逐出彼為無賴之身來至波羅奈市當時菩薩於該市為有名阿闍梨教授五百婆羅門青年之婆羅門技術爾時住民與貧者費用使學技術知友者亦親近菩薩學高尚之技術彼粗暴而不從順動輒動武傷人菩薩雖教誡彼亦不聽教諭菩薩之收入因彼之故亦感不足最終彼與一青年喧譁鬥毆由彼處逃亡而去彼來某邊鄙之村受雇而為生彼於此處與一不幸之女同居與彼女生有二子村人等云請教我等為善戒惡之道與彼薪給使彼住於村入口處之小屋然此邊鄙之村民等自知友者來此之後受王七度之懲罰彼等之家七度被燒池水七度乾涸彼等思惟此知友者未來之前豫等未起此事彼來之後我等開始衰微於是將打彼而放逐彼伴妻子他去入某惡魔所住之森林於此場所惡魔殺其妻子而食其肉彼由其處逃出到處流浪倣徨來至甘比拉港村正值有船揚帆出海之日故此彼又受雇為船夫而登船船於海上行一周間第七日船在海中遇難船於岩上停止不行彼等追究災難之責任者投票表決而知友者七度皆中諸人與彼竹筏執手使乘放入海中彼離船後船即開始行動知友者臥於竹筏之上漂流海上因其在迦葉佛世時守戒結果於海上之水晶宮遇四天女彼親近彼女等度七日間之幸福生活水晶宮之精靈等七日間為幸福之生活而次之七日間則為不幸彼等去時云汝於我等歸來之前留於此處知友者於彼女等去後立即乘竹筏更往前進到達八天女所居之銀之宮殿彼由彼處更又前進至十六天女之寶玉宮殿及三十二天女之金宮殿彼不從彼女等之忠告更進而發現某島夜叉之街市彼處一夜叉女如羊形行走知友者不知其為夜叉之女思欲食山羊之肉往捉彼女之足彼女用魔力將彼牽起而投擲彼依彼女投擲之力沿海騰空而行到達波羅奈都後濠之刺藪上滾落於地上爾時有盜賊殺王之於濠後巡回食草之山羊故此山羊牧飼者等思欲捕此盜賊隱於一方之側而立知友者起立見草藪中山羊彼思惟豫於海島捉山羊之足而為彼女投落於此處今若再捉其一隻之足則彼女將更投擲豫近於海上天女之宮殿彼抱此昏庸之幻想往捉山羊之足山羊被捉大聲喚叫山羊牧飼者由各處奔來捕彼云此盜賊於常久時間食王室之山羊於是打彼而縛之帶往王之近所恰於此時菩薩率五百婆羅門弟子離街出發沐浴途中見知友者知彼為誰向諸人問曰諸位此我弟子何故捕彼山羊牧飼者答曰尊師此盜羊人捉山羊之足是故將彼捕縛菩薩曰如是甚善豫將罰彼為使役將彼與我彼將隨我等而生活彼等云尊師之言甚善於是將彼放釋而去於是菩薩向彼問曰知友者汝於此長久期間在於何處彼向菩薩說明自己所為之一切行為菩薩云不從為汝計益人之忠告受如是之痛苦於是唱次偈人為自己思不從正教誡誤捉山羊足險遭悲慘境其從業師與知友者各依其業報往生於應生之所結分佛言汝等比丘彼自己少欲知足體得聖法之阿羅漢果佛述此法語後連結作本生今昔之結語爾時之知友者是羅沙伽帝沙長老有名之戒師實即是我四二鳩本生談菩薩鳩序分此本生談是佛在祇園精舍時就某貪欲之比丘所說者此比丘貪欲之事將在第九篇之烏本生談中述及爾時比丘等向佛申告曰世尊此比丘甚為貪欲於是佛問曰汝比丘傳聞汝甚貪欲此為真實耶比丘答世尊是為真實佛言汝比丘汝前生即為貪欲因貪欲而生命被奪不僅此也賢者等亦為此而失去己等之住所於是為說過去之事主分昔日梵與王於波羅奈都治世時菩薩生為一鳩當時波羅奈之住民皆為善行鳥類得幸福安住於種種場所掛置藁籠波羅奈長者之廚師亦於自己之廚所掛一藁籠菩薩鳩於此處定為住家天明出尋食物夕刻歸來彼於此處為如是生活而度日某日一羽之烏飛回於廚所之上彼嗅得酸與未酸魚與肉之香味而起貪欲彼思依誰可得此魚與肉彼近前止而等待夕刻見鳩歸入廚所彼思依鳩可得魚與肉食翌日彼於鳩出覓食時恰為天明而飛來尾於鳩後而行於是鳩向彼問曰烏君君何故隨豫而來耶烏答鳩主君之動作甚合我意故而相從鳩云君之食物與豫相異我等一處同行於君甚苦烏云鳩主若於覓食之時豫亦與君同往探索鳩云甚善唯君須熱心鳩對烏教誡後自己探尋食物食草種等烏於鳩覓食之間烏亦往探索牛糞之塊啄食其中昆蟲而果腹於是來至菩薩近前云鳩主汝長期飛回得食甚多烏為鳩同持食物於夕時一同歸入廚所廚師云此鳩帶來其他之烏於是亦納烏一籠爾後二鳥均住於廚所某日諸人為長者持來甚多之魚肉廚師取來吊於廚所之各處烏見之而起貪心彼思明日不往牧場豫將食此其夜彼思食嘆息而臥翌日鳩欲往覓食向烏云烏君請來出發烏鳩主請君自行豫腹疼痛鳩烏君豫未曾聞有腹痛之事夜之三時於各時間中夜闌人靜之時飲食燈火之芯亦可使腹飽滿君意欲食此家之魚肉請汝一同出發人間食物對君等不宜不可為此等之事請與豫一同前往覓食烏答豫不能往鳩君所為之事立即分曉希汝注意勿為貪欲所負鳩為忠告後覓食而去一方廚師配置種種之魚肉為使乾燥將盛物之籠蓋稍開上面置以湯之濾器漏杓彼外出拭汗而立即此一瞬之間烏由籠中伸首眺望知食料室中之廚師外出彼思惟即今為豫滿足欲望食肉之時食大肉耶食零肉耶零肉不能飽腹豫取大肉一片歸籠寢而食之彼由籠中飛出止於湯之濾器之上發出鏗鳴之聲廚師聞聲甚怪云此為何音彼入來見烏彼思惟此狡獪之烏食豫為長者烹飪之肉豫本為長者而生活非為汝惡物而生活豫將捕而殺之於是閉戶捕烏拔去全體羽毛用哲及搗碎以蒔蘿種子所濕之生姜混以酸酪之漿塗其全身投入籠中烏為過度之苦痛所打擊呻吟而臥倒菩薩於夕時歸來見烏沉淪之苦惱向烏云貪欲之烏不從豫之言君為貪欲而受此殘酷之苦痛而倒臥於是為唱次之偈人為自己思不從正教誡烏不守忠告致落敵手中菩薩唱此偈後去豫亦不能停留此處於是向他處飛去烏死於彼處廚師將彼由籠中取出丟棄於塵芥箱中結分佛言汝比丘汝非只於此世為貪欲前生即亦如是為此賢者亦須離去己等之住所佛述此法語後宣明四諦之理說四諦竟時此比丘得阿那含果於是佛連結作本生今昔之結語爾時之烏是彼貪欲之比丘鳩實即是我四三竹蛇本生談菩薩師序分此本生談是佛在祇園精舍時對一肆意比丘所說者佛問汝比丘汝為肆意之事是為真實耶比丘對此答曰世尊誠如所言佛言汝比丘汝非只於此世肆意前生即亦如是汝為肆意不從博士之忠告而至失命於是佛為說過去之事主分昔日梵與王於波羅奈都治國時菩薩生於迦尸國財富之家族彼達有分別之年知由欲望而起苦由無欲而生幸福於是捨欲望入喜馬拉雅山雪山出家為仙人道行一切入豫修法得五神通八成就住禪定樂其後由大行腳僧波利婆羅之五百行者圍繞成為衆團之師而住其時一小蛇無意中進入某行者之庵室行者對之如己子之可愛使入竹節中寢息大事珍重因住竹節之中蛇被命名為竹因行者對蛇如對子之愛情大事珍惜諸人與彼以竹之父為名爾時菩薩聞某行者珍惜蛇之傳聞遣人詢問聞汝有珍惜養蛇之事為真實耶彼之回答是為真實於是彼被警誡云蛇為不可信用者不可珍惜養育行者云蛇之於豫有如師弟之親蛇如不在豫不能生菩薩告曰汝將為蛇失去生命然行者違背菩薩之教不能捨蛇其後經過不久行者等皆出發採集野生果實所行之處發現野生果實易得之處於其處滯留二三日間竹之父使蛇寢於竹節中加蓋然後與衆一同出發於是經二三日後彼與行者等一同歸來彼向竹思與食物開竹節云吾子汝腹空飢矣伸手探竹蛇因二三日間斷食奮怒嚙其伸手當即殺死行者往森林逃去行者等見彼急告菩薩菩薩將彼厚葬彼坐於隱者團之中央對隱者等教誡唱次之偈人為自己思不從正教誡如彼竹之父終被蛇咬死菩薩如是教誡隱者團令得四梵天住死後得生梵天界中結分佛更謂汝比丘汝非僅於此世肆意而為前生亦自肆意因此為蛇所殺至於敗亡佛述此法話後連結作本生今昔之結語爾時竹之父是肆意比丘其餘之團衆是我之團衆團衆之師實即是我四四蚊本生談菩薩商人序分此本生談是佛在摩揭陀國行腳時對某村之愚人等所說者某時如來由舍衛城來摩揭陀國行腳到達某村其村住有甚多之明盲無知某日此等愚癡之明盲集於一處彼等思惟諸位豫等入森林工作為蚊所螫為此妨礙豫等之工作諸位攜弓及武器出發與蚊戰鬥斬射所有蚊蟲而殺之於是進入森林聲言豫等殺蚊而相互射矢相互斬殺痛苦歸來倒臥於村內中央及村之門口佛由比丘衆圍繞入村托鉢他之諸賢人見世尊來於村門作聚所以向佛為上首之比丘僧團施諸多供養向佛禮拜坐於一面佛見各處負傷之人向居士問曰傷病之人何如是之多居士答世尊此等諸人謂與蚊戰爭而出發同伴之間相互戰鬥造成傷病佛告曰愚癡之明盲等欲害蚊反而自傷非只此世前生亦有欲擊打蚊蟲反傷同伴之事佛應此等諸人之請求為說過去之事主分昔日梵與王於波羅奈都治國時菩薩為一商人建立生計爾時伽尸國之僻村住有衆多之木工某時白髮之木工伐木之時一隻蚊蟲落於彼如藥罐之後腦頭上用口螫頭如同刀傷之痛彼木工向坐於近前之幼子云此蚊螫豫之頭猶如刀傷汝將蚊趕走幼子云吾父且行忍耐豫一擊之下即可殺蚊恰於此時菩薩為購商品進入此村坐於彼木工之家爾時木工向其子云汝將蚊趕去幼子云現即追趕父親彼揮動大斧立於其父後側思欲擊殺此蚊以斧擊下將父之頭劈為兩半因此大工立即死亡菩薩見此行思惟賢者雖敵亦為殊勝怖刑罰者永不殺人於是唱次之偈同黨無智者惡於有智敵聾啞愚癡子殺蚊劈父頭菩薩唱此偈後為自己之業務出發而去木工由其親類厚葬結分佛言信士如是彼等前生亦思我等為欲退治蚊出結果卻傷害他人佛述此法話後連結作本生今昔之結語爾時唱偈而去賢明商人實即是我四五赤牛女本生談菩薩長者序分此本生談是佛在祇園精舍時對給孤獨長者之女傭所作之談話於給孤獨長者之所有女傭名赤牛彼女往搗米場其老母來此而坐群蠅飛舞咬其老母母謂女曰吾女蠅咬如針刺為我追趕女云豫為母追趕彼女舉杵殺蠅思欲擊潰然杵著母體母被打殺女見母死號泣不已此一事件向長者告知長者厚葬老母往精舍向佛談此一切佛告長者女思殺蠅而以杵擊殺其母非止此世前生亦如是而殺其母佛應長者之請為說過去之事主分昔日梵與王於波羅奈都治國時菩薩生於長者之家庭父死後得繼長者之地位彼亦有一名赤牛之女傭彼女亦來至己之搗米場所彼女之母寢臥向女曰吾女為豫追趕蠅蟲彼女亦同樣以杵擊殺其母而號泣菩薩聞此事故自思惟此世賢者雖敵亦優於是唱次之偈同黨之愚者惡於賢之敵粗忽赤牛女殺母徒生悲菩薩賞讚賢者依此偈而宣明法意結分佛言家長彼女思欲殺蠅而殺母非只於此世前生亦復殺之佛述此法語後連結本生今昔之結語爾時之母是今之母爾時之女是今之女大長者實即是我四六毀園本生談菩薩博士序分此本生談是佛在拘薩羅國某村對一荒廢園林者所作之談話據傳佛在拘薩羅國諸人之間遊行中到達某村彼處一長者招待如來於己之園林設座供養以佛為上首之教團長者告曰尊師願隨己意於此園林教步比丘等起立由園丁陪同環行於林中至一所空地比丘等向園丁問曰信士此園林到處樹木成蔭唯此處樹木灌木皆無此究為何故園丁答曰尊師當此樹園植樹之時一撒水之村童將此場所所植之稚苗連根拔出依根之大小增減灌水以故此等稚苗盡皆枯萎是以此處成為空地比丘等來至佛前申告此事佛言汝等比丘此村童非只此世荒廢園林前生亦荒廢園林於是為說過去之事主分昔日於波羅奈之都梵與王治國時彼處之人於市內發布祭令祭日大鼓之音開始傳播都中之人因祭日關係出家至各處遊行然彼時御苑林中住有多數之猿園丁自思市內發布祭令序命此猿等代豫撒水豫可往祭場一遊於是彼往猿王之所請託曰猿王此園林於汝等十分有益汝等於此可食花實與芽因市內出祭之布令豫往祭場一遊汝等於豫歸來前可代豫向御苑之稚苗灌水猿王答甚善豫可代為灌澆園丁云如是請專心為之彼為猿等撒水以皮囊木壺與猿而去於是猿等持皮囊與木壺向稚樹灌水爾時猿王向猿等云汝諸猿諦聽水甚珍貴汝等於向稚樹灌水時須將根拔出查看深根則多灌之不深者則少灌之因此後取水非豫等易為之事猿等謹遵王命均依言而為爾時一博士於御苑之林中見彼猿等如是之舉向猿問曰汝等緣何一一拔出稚樹向根之長者灌水耶猿等答豫等之王作如是言博士聞言自思惟無智之愚者思為有利益者反為不利益事於是唱次之偈有道理之行始能齎幸福無道不善行愚人失利益亦為此園丁亦如此猿等博士以此偈叱責猿等如此所為後由己之從者相伴出御苑而去結分佛言汝等比丘此村童荒廢園林非自今始前生亦即如是佛述此法語後連結作本生今昔之結語爾時之猿王是荒廢此園林之村童博士實即是我四七酒本生談菩薩長者序分此本生談是祇園精舍時對一破壞甘酒者所作之談話據傳給孤獨長者之一知友開設酒店蓄強酒而販賣得錢客人集合來往甚衆彼命小使云汝在此以現金賣酒自往沐浴小使賣酒與衆多之客人彼見時有客人持鹽椰子及糖前來酌酒食之彼思惟此酒中無鹽今且以鹽入之於是彼向酒中入一納里量之鹽以此酒享客客人滿入口中立即吐出問曰此酒汝如何為之小使答曰豫見汝飲酒時持鹽而來是故豫亦入鹽於酒中客人等斥責小使曰汝將此甘酒破壞酒已無用矣於是均離席而去酒店之主人歸來見無一客人問小使曰客人往何處而去小使語其緣由於是主人叱責小使並將此事告知給孤獨長者給孤獨思惟此為可傳之言彼往祇園精舍禮拜佛而告以此事佛云長者彼非只於此事壞酒前世亦復如是佛依彼之請為說過去之事主分昔日梵與王於波羅奈都治國時菩薩為波羅奈都之長者近於菩薩一人住一酒店彼預置強酒命小使代賣彼往沐浴小使於主人出行與前同樣向酒中入鹽使酒無用主人歸來知其緣由向長者談論長者告曰愚者無理之作業思為利益之事而實不利益於是唱次之偈有道理之行始能齎幸福無理不善行愚人失利益小使憍陳如如彼之壞酒菩薩依此偈宣明法意結分佛言長者彼小使非只於此世壞酒彼於前生亦即如是於是連結作本生今昔之結語爾時之酒店是今之酒店波羅奈之長者實即是我四八智雲咒文本生談菩薩弟子序分此本生談是佛在祇園精舍時對頑固比丘之所說者佛言汝比丘汝之頑固非只於此世前生即亦如是而為汝不守賢者之忠告汝為鋭劍斬為兩段倒臥途中由同一原因使千人失去生命於是佛為說過去之事主分昔日梵與王於波羅奈都治國時某村住一婆羅門知智雲咒文據傳此咒文是非常寶貴之價值於月與月宿相合之時返復唱此咒文眺望虛空則由虛空降來七寶之雨爾時菩薩於婆羅門膝下為弟子修學技術某日婆羅門攜菩薩為某事離自己之村欲往支提耶國途中於某森林中有五百賊人名為派遣盜賊作搶掠之事菩薩與智雲婆羅門於林中被捕何故彼等號稱派遣盜賊彼等捕獲二人使持財寶前來留置一人另派遣一人前往取之故名派遣盜賊彼等若捕父子則命其父曰爾持財寶前來與我等攜汝子歸若捕母女則派遣其母若捕兄弟則解放其兄若捕師與弟子則放免弟子於此情之下盜賊捕智雲婆羅門而派遣弟子之菩薩菩薩向師敬禮敬告師云豫經二三日即速歸來師決勿怖請從豫之忠告今日為月與月宿之相合將降寶雨師如不堪其苦可反覆誦念咒文勿使財寶降下若使雨降則不僅吾師而五百盜賊亦將破滅彼忠告後即往取財寶而去日暮之後盜賊終將婆羅門捆縛恰於此時由東方升起滿月之月輪婆羅門眺望月宿而自思惟月與月宿之相合寶雨將降豫何故須如此受苦豫反覆誦念咒文使寶雨降下分與盜賊財寶豫亦將為自由之身而去於是開始向賊談判彼問諸君何故縛豫彼等答為得財寶婆羅門云若君等欲求財寶則應解我束縛洗頭使著新衣服以香氣塗香以花飾身待我盜賊等聞彼之言依之而行婆羅門知月與月宿之相合即眺望空中反覆誦念咒文財寶忽由空中降來盜賊等集合財寶以上衣包裹出發婆羅門亦由彼等之後尾隨而來爾時其他之五百賊又將此等盜賊捕獲第一群之盜賊問曰緣何目的捕獲我等第二群之盜賊答為得財寶前著答若汝等欲求財寶應先捕此婆羅門彼眺望空中使降寶雨豫等之財寶亦由此人而得來第二群盜賊將第一之盜群放免向婆羅門云請與我等財寶於是又將婆羅門逮捕婆羅門云豫亦欲與汝等財寶但降財寶之月與月宿之相合自今須俟一年以後始能再得若汝等欲得財寶應須耐至後時寶雨始能降下盜賊等怒云惡性之婆羅門與他人降貴重財寶之雨於我等須待一年於是鋭劍將婆羅門一劈為二斬於路傍然後火速由後急追第一盜群而起戰鬥第一盜群之彼等悉數被殺將財寶奪去其次第二群之五百人分為二派為爭奪財寶再起戰鬥其一派二百五十人又被殺戮如是一千人至於全滅最後只餘二人殘生彼等將財寶運至與前同樣之近村森林中隱藏其一人執劍看守別一人為求白米煮飯進入村中貪欲實滅亡之根近於財寶而坐之盜賊思惟彼如歸來此財寶須將二分豫將於其歸來以劍刺殺於是持劍挺身而立窺視對方歸來而坐一面對方盜賊亦思惟此財寶將須二分豫必須於飯中入毒使彼食而滅亡則豫一人獨得財寶於是將煮飯自己食畢剩餘者入毒持之歸來將飯放置而立前之盜賊於彼站立瞬間以劍斬彼為二投棄不為人知之所然後取飯食之自己亦即死亡於是為此財寶而爭奪之人均歸破滅菩薩弟子經二三日後持財寶歸來於彼場所不見師尊卻見財寶散亂於各地彼思惟師不聽我忠告降財寶之雨為此以致一切諸人皆死矣於是菩薩進入大道而行行進之中見師於道傍被斬為二彼云師不聽豫之忠告而死於是集薪作尸積將師荼毗供野生花菩薩更往前進見有五百死尸更又有二百五十死尸依次至最後發現二人之死彼思此二人必於先之千人死者中不足之二人此二人必為最後之殘生者而此二人亦終不能控制戰鬥究竟二人又前往何處於是菩薩又向前進不久發現持去財寶通往森林之大道更向前進則發現捆縛財寶之布袋一人之鉢覆置探得死者之居處至此菩薩對一切之行為明瞭但另一人現在何處經不斷搜尋發現彼被棄捨於不為人知之場所菩薩思惟吾師頑固不聽豫之忠告不但自至滅亡更令一千盜賊亦因彼而致破滅此實為依不正之手段謀一己之利益如我師所招之結果於是唱次之偈手段邪誤求利益行不正者總滅亡支提國賊殺咒師彼等破滅至無殘如是菩薩於森林中響聲高唱此偈我師誤於不正場所努力降財寶之雨造成自死而他人亦歸破滅之原因他人亦以不正方法謀自己之利益雖盡全力當然亦歸破滅亦造成他人破滅之原因於森林諸神賞讚之間彼依此偈而為法話使其財寶毫無故障運抵自己家中為布施之善行定全其命死後得至彼處天界結分佛言汝比丘汝不只於此世頑固於前生亦復如是而為心之頑固引起至大破滅佛述此法語後作本生今昔之結語爾時之智雲婆羅門是頑固之比丘弟子實即是我四九星宿本生談菩薩博士序分此本生談是佛在祇園精舍時為某邪命外道所作之談話據傳住舍衛城之都中一良家女為同住田舍良家之一青年人選為配偶規定迎娶之日後彼於其日到來時往自己信賴之邪命外道處問曰先生今日為豫迎娶子媳之祝日於星命宜乎邪命外道怒彼事先最初不問而於決定之日前來甚善豫將教彼使生障礙於是外道云今日於星命不佳不可慶祝若欲迎娶將起極大之不幸彼之家族諸人信賴外道於是日不行迎娶一方城中女家諸人準備一切慶祝但後得知田舍之人不來城中諸人甚怒思惟彼此商定之日而彼等不來使我等受甚多之損害彼等是何居心於是對一切準備而將女當日嫁與他人翌日田舍之諸人前來迎娶於是舍衛城之住人等云汝等田舍之家主諸人實甚惡劣汝等置決定之日於不顧輕蔑我等而不至行至半途而折回是故我等已將女與他人矣於彼等指責之下互相諍吵田舍諸人由原路而歸為此邪命外道妨害諸人之婚嫁祝典事為比丘等之間周知比丘等集於法堂彼此交談而坐云諸位法友邪命外道障害他人家族之婚嫁慶祝佛近前問曰汝等比丘今有何話集會坐於此處比丘等答如是如是之問題佛言汝等比丘邪命外道為家族祝賀之障害非只於此世前生亦因彼之怒而起障害於是為說過去之事主分昔日於波羅奈都梵與王治世時住於都市之人選娶一田舍之女迎娶之日已定彼男向自己信賴之外道詢問先生今日為我迎娶之祝日星象宜否彼因彼男任意決定日期不來先問而甚怒思欲障礙彼等之婚嫁彼答曰今日星象不吉如慶祝將起極大不幸彼男信彼止而不行迎娶田舍之人知都會之人不來而怒曰彼等置決定之日而不來是何居心用意於是將女於當日即嫁他人都會之諸人於翌日前來迎娶田舍之人答曰汝等都會之人無恥乏信家長亦皆如是於決定之日不來迎娶汝等不守信用豫等已將女嫁與他人都會諸人曰我等尋問邪命外道云星象不吉所以未至今請仍允我等迎娶田舍之住人等曰汝等不來女與他人已嫁人如何回返於是雙方開始諍吵時都會之某博士因事前來田舍都會博士聞而告諸人言我等問邪命外道言星象不吉故止而未至博士云依星象又何有幸福迎娶新娘豈非吉星之象耶於是唱次之偈觀星占吉凶愚人無幸福幸福自幸福於星又何為都會之人等諍吵終不得女而歸結分佛言汝等比丘彼邪命外道非只於此事降害家族之慶祝於前生亦為如是佛述此法話後連結作本生今昔之結語爾時之邪命外道是今之邪命外道是爾時之家族是今之家族唱偈立論之博士實即是我五無智本生談菩薩王序分此本生談是佛在祇園精舍時對益世行為所作之談話此一行為之事將於第十二篇之大黑犬本生談中詳述主分昔日梵與王於波羅奈都治國時菩薩得再生於王后之胎由母胎出生後命名之日被稱為梵與王子彼十六歲時於得叉尸羅學習學術精通三吠陀修得十八科目之學問於是彼父與彼副王之位爾時波羅奈之住人等祭神為歸命於神大量屠殺山羊綿羊雞豚等生命以種種香花血肉為犧牲祭菩薩自思此時人民祭神多殺獸類一般諸人傾向非法豫於父死後得繼王位建立名案使生物受苦殺者不見一人某日彼乘車由市內外出時見諸多人等群集於大菩提樹下於此樹再生之神前見諸人乞願欲求得男女名譽財産等如償所願彼下車近樹供養香花撒水右繞大樹為禮亦為一祭神者歸命於神然後乘車歸市由此時始彼以同一方法有時前來此處祭神如祭神之人崇神之其後父死彼得繼王位廢四非道行十王法依法治國實行己之意圖彼思惟豫登王位豫所曾抱之理想願今將實現彼集會大臣婆羅門及家長等告曰諸位豫緣何理由而得王位汝等知之耶大臣豫等不知王諸君汝等曾見豫向菩提樹供香合掌歸命耶大臣陛下曾經拜觀王爾時豫曾立誓若豫得王位豫將奉獻供物今依彼神之神通力豫得王位今將向神奉獻供物汝等切勿猶豫應速向神準備供物大臣陛下應準備何物王告曰爾時諸臣豫曾向神立誓豫在位中凡有踏入殺生等五不法行為及十不善行為之道者不論何人皆當殺之死後以其腐敗之血肉為供物因此汝等應擊大鼓通告我等之王未為王時曾立重誓若得為王於在位中凡有為不法行為者皆當殺之以為供物因此王思今凡與五事或十事相關而犯有不法行為者當殺千人取其心臟及肉等以為神之供物希汝市民等一體周知自今以後凡行不法行為者不論何人當殺千人以為供物以完成豫之誓願菩薩尚為說明此意義唱次之偈愚者千人為不法豫誓獻彼為供物今為不法之人多豫將以此供犧牲大臣等聞菩薩之命令云陛下謹遵奉行於是於波羅奈十二由旬間擊大鼓宣告市民聞大鼓之響聲犯不法行為者竟無一人如是菩薩治國期間於五或十不法行為中無一觸犯之人如是菩薩未害一人使一切人民守戒自己為布施等善行死後與己之同伴共得生往天界結分佛言汝等比丘如來不僅於此世為世間之利益於前生亦即如此佛述此法語後連結作本生今昔之結語爾時之群臣是今佛之弟子波羅奈王實即是我

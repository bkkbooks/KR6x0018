body:
  text: 因緣談歸命彼世尊應供正等覺者因緣談總序序偈一救護者大仙生轉百億次唯為世間人行無限利益二禮拜大仙足於法合掌禮敬禮諸一切崇敬之器僧三敬禮此三寶功德由此生依彼之威光除去諸障礙四大仙有光輝彼乃此由來本生無戲論説古本生語五教主之導師念世之救濟久遠實踐行成就菩提資六法藏集成者寄集總為一此等為結集本生古話名七願此佛種姓系統永住世大寺之長老利見來乞豫八常住無他雜其心成靜寂弟子有上智覺友亦同乞九比丘之所屬系統化地部清淨智方便覺天亦同乞一大士之行迹威光不思議本生之古話説明其釋義一一大寺住者語豫則説其道善良之佳士聽豫説其事三之因緣此本生之釋義分為遠因緣不遠因緣近因緣之三因緣古話加以説明使聞者十分知此因緣後對本生古話始善了解然者今先述此三因緣古話然後再説明本生古話於是首先應知此因緣古話之段落由大士伏於提槃迦羅燃燈佛之足下以將來必定成佛之決心及為度一切之身而死至出生於兜率天都此間之話題為遠因緣古話由兜率天降生世間至在菩提道場得一切智此間之話題名為不遠因緣古話至近因緣古話則為佛住於各處之話題現述遠因緣古話如下一遠因緣談善慧婆羅門據傳距今四阿僧祇十萬劫之昔有一名不死之城彼處住一善慧婆羅門父母皆生活清淨之家系遠溯至七代間關於族姓無他人可非難之處彼具秀麗可愛無上優美之容貌彼不為他事唯習婆羅門之學藝彼尚幼少雙親逝去殖其財産任務之執事持鐵製之帳薄前來開啓金銀摩尼真珠其他入寶之庫曰幼主此為貴母君之物此為貴父君之物此為貴祖父貴曾祖父之物告以遠溯至七代間之財産並謂請與收存賢明善慧自思積集如是財産豫父豫祖及其他諸祖往彼世未持一文而去然豫須作為持去之種子於是申告國王擊鼓巡回宣告都中向大衆諸人行施自己出家入苦行者之道為明此意此處須述善慧之古話此一古話出於佛種姓經然其中只列出偈語不甚明了是故本文各處以偈文交互語此古話不死城去今四阿僧祇十萬劫之昔有充滿十種聲之不死之城就此不死之城佛種姓經中唱如下之偈一二四阿僧祇百千劫不死城名美樂都城中充滿十種聲食物飲料俱豐盈一三象聲馬聲鼓螺聲車音小鼓笛鐃鈸銅鑼飲食招客聲十種音聲宣全城唱佛種姓經中偈一四都中各般齊具備一切業務此處有城中備有七種寶諸種之人來尋集善業之輩來住此繁榮猶如天人都一五不死都中有一人彼名善慧婆羅門積聚數億之財寶多財多穀為巨富一六彼為學生諳神咒兼亦善通三吠陀相術史傳等諸道彼已於此達極意善慧之冥想某日賢者善慧於宮殿樓臺之上盤足獨坐靜思賢者來世受生實為苦痛每出生處身壞亦同豫為生老病死之身豫須求無生無老無病無苦無樂清涼不滅之涅槃解脫生死趣涅槃者必同歸此路於是如是述偈一七豫獨坐時如是思惟再出生苦身壞亦同一八豫為生老病質之身求無老死平穩安樂一九種種之尸棄腐爛身期待欲望豫皆離去二此道應有此不能無為脫生死努力達道有與非有生死與涅槃彼更思惟於此世中應有苦痛相對之安樂同此有生存相對之非有非生存恰似除熱有寒生亦不能無有貪欲盡時之涅槃有邪惡賤相對無過之善良邪生則其相對為棄一切生想亦不能無有無生之涅槃於是如是述偈二一恰似有苦樂亦存有有亦應望非有二二恰似有熱寒亦存有三火時望涅槃二三亦有善良有邪惡生時亦應望不生過在不求道之人彼更思惟恰如埋於糞堆中人見遠處有以五色蓮花覆於大池時豫應依何道可往彼處當然尋探往其池之道若彼不探尋往彼池之道乃非池之過同此洗淨煩惱之垢有不滅之大涅槃池不尋探彼者非不滅之大涅槃池之過又恰由四方為盜賊所圍之人有其遁逃之路若彼不遁逃乃非路之過是其人之過同此由四方為煩惱所圍縛之人雖有可達涅槃安全之路若彼不求非路之過乃人自己之過又恰為疾病煩惱之人可得愈病之醫師而不尋求醫師以治愈其病者此非醫師之過同此為煩惱病所擾之人有善知方法可除煩惱之教師而不往探尋此為其人之過非滅煩惱教師之過於此如是述偈二四恰如陷糞中見水滿之池達池不努力過不在其池二五洗淨煩惱垢見不滅之池達池不努力過不在其池二六為敵遮四方見有可退路其人不遁出過不在其路二七煩惱遮四方見有安全路探路不努力過不在其路二八恰似罹病者有可愈病人彼不愈其病過不在醫師二九煩惱之病苦為病所苦惱不往訪其師過不在導者棄腐爛之身彼更思惟恰如愛好淨身之人棄自己頭上垂下之死尸心情愈快豫亦棄此腐爛之軀為無希求之身而入涅槃城恰如船夫不顧舊船而將棄之豫亦不顧此九孔滴漏之身放棄而入涅槃城恰如携種種寶與盜賊同行為懼失己寶捨棄盜賊而尋安全道此易毀乏身如同奪寶之賊若豫對此起愛著心豫將失尊道法之寶是故豫棄如同盜賊之肉身而入涅槃城於此如是述偈三恰如垂首尸厭惡而捨棄棄此得安樂自由善自主三一如積種種尸棄此腐爛身以成為無欲無希求之身三二男女不淨處棄去不淨物無欲無希求豫捨此而去三三積滿種種尸棄去此肉身辨用不淨處豫捨此而去三四猶如其船主捨棄破漏船無欲無期待豫捨此而去三五九孔常漏汁捨棄此肉身猶如彼船主捨棄破漏船三六恰如携寶人與盜賊同行恐懼失其寶捨盜賊而去三七然豫此肉身如同大盜賊恐失幸福故豫捨此而去善慧之出家修行如是賢者善慧依種種譬喻思惟與出離關聯之意義如前所述將自家積蓄多量財寶大施喜捨與乞食旅人及其他之人捨棄物質之欲及煩惱之欲進入不死城獨自於雪山地方之有法山近處以設道院樹葉之家無五障之不便説如斯心寂具八種因緣之經行處為獲神通力於道院中脫棄九種不便之俗衣著具十二種德之樹皮衣出家入仙人之道如是出家後捨棄八種不便之樹葉家屋往居十種便利之樹下避攝取諸穀類唯食果實唯坐或起立經行精進努力七日之內獲八定五力如其所望獲得神通力於此如是述偈三八豫如是思惟數億之財産貧富咸施後豫入雪山中三九距雪山不遠有名有法山豫修善道院設一佳草舍四處離五不便便利有八種豫設經行處獲得神通力四一彼處豫棄脫九種不便衣豫著樹皮衣十二種便利四二不便滿八種棄樹葉家屋豫居往十種便利之樹下四三蒔收之穀類一切皆避離便利有果實摘取任隨豫四四坐立與經行努力行精進未經七日間獲得神通力燃燈佛之出世如是善慧行者獲神通力享禪定之樂度日之間遇燃燈佛出世此佛宿於母胎生得菩提轉法輪時大千世界悉皆震動揚大念聲現三十二種前兆善慧行者因享禪定之樂度日不聞其聲不見前兆於此如是述偈四五豫達完成域於教得自在勝者名燃燈出世為導者四六佛宿胎出生開悟雖説道豫專樂禪定不見四種相燃燈佛來喜樂城爾時十力之燃燈佛與四十萬之漏盡比丘等俱漸次遊行到喜樂城住善現大精舍喜樂城住民風聞曰沙門長者燃燈開最優勝之悟轉大法輪漸次遊行到喜樂城住善現大精舍人人持熟酥生酥其他之物及藥品衣服之類親手執香料花鬘傾心於佛法僧衆近佛之處捧香禮佛退坐一面一同聽聞説法招待佛之明日供養由座起立而去城民供佛翌日彼等準備作大施食裝飾都城修理十力者前來之道路為水中斷之處投入土砂平坦地面撒銀白色之砂炒穀物及散花用種種染色之布造旗飄揚路傍排齊芭蕉樹與滿水之瓶善慧之飛行見聞爾時善慧行者由自己之道院升空飛行於諸人上方之空中見者同大喜悅以問諸人如何緣由君等為誰莊飾道於此如是述偈四七邊都之土地招奉如來至皆以歡喜心清掃佛來路四八爾時豫善慧由於道院出以振樹皮衣飛升空中行四九見諸人興奮歡悅且狂喜彼由空中下先向諸人問五衆人起興奮歡悅且狂喜君等為何人清掃此道路諸人答言善慧尊師汝不知耶燃燈十力佛得正覺轉大法輪各處遊行中到著豫等之都城今住善現大精舍吾等招待彼世尊修理佛行道路善慧行者自思佛之聲音世所難聞佛之出世謂更難值豫須與此諸人共修佛來之路於是彼向諸人請曰汝等為佛修此道路亦請與豫一處豫亦與汝等修道路諸人言同意知善慧行者有神通力想出水所流失此處即分擔此處與彼填補善慧身俯泥土之上善慧對佛生起歡喜心豫以神通力能修膳此處然豫修膳此處並未滿足今日豫須作肉身之奉仕持運土塊來投入其處彼於其處修未終了間十力者燃燈有大威力具六神通隨從得漏盡智等四十萬人俱天人捧天界之花環及香奏天之音樂諸人捧人界之香及花環以無限佛力如雄黃山頂獅子之走跳狀運捧其繕飾步行於道路善慧行者睜目見從所修道路來之十力者具三十二種大人之相以莊嚴八十種隨相包以一尋量之光作摩尼色於空中現種種之電光佛體光明如六金色之濃或為花冠之形或成對出現彼禮拜此無上美顏自思今日豫對佛呈奉生命之喜捨請佛勿踏泥中望踏如摩尼珠之板橋與四十萬諸阿羅漢俱踏豫之脊背而行此亦即為豫之永久利益與安樂彼解其髮敷羚羊之皮髮結樹皮之衣於黑色之泥上彼如摩尼珠之板橋臥於泥上於此如是述偈五一彼等答豫問此佛無比倫勝者名燃燈出世為導者我等為此佛淨掃此道路五二豫聞彼語佛直即起喜念佛佛頻呼喚豫示滿悅情五三喜悅立其處興奮而思惟此處蒔種子機會莫空過五四汝等若為佛淨掃此道路與豫一處所豫亦淨掃路五五爾時彼等許與豫一處地時豫唯佛佛念而掃道路五六處所未掃終前來佛燃燈勝者大牟尼六種神通力證得漏盡智與彼離垢穢四十萬衆俱緩步行此路五七衆行迎拜禮多數鼓打鳴人天歡呼聲揚震於四方五八天人見人間人間見天人彼等同合掌佛後相隨行五九天人天界樂人間人界樂樂器共打鳴佛後相隨行六天之曼陀羅蓮華晝度樹珊瑚天人升空中處處散天華六一瞻波娑喇喇尼泊龍樹花奔那伽樹花啓他佳香花地上諸人人諸花向天投六二彼處豫解髮獸皮樹皮衣布敷泥土上平鋪臥俯伏六三請佛弟子俱皆踏豫背行為豫之利益勿踏著泥土善慧之誓願彼俯伏臥於泥土上再睜目時拜觀燃燈十力佛之尊嚴彼如是思惟若此豫望滅盡一切煩惱為僧團中之後輩入喜樂城但豫無須虛偽為滅盡煩惱到達涅槃姿態之必要應如燃燈佛達最上之覺者載衆人於法船救脫輪回之海而後豫始入大涅槃如是實與豫相應彼決心結八法當成佛於是俯臥如是作偈六四豫今臥地上生起如是念豫今如有望滅盡諸煩惱六五豫今有何要不裝虛偽相豫達一切智成佛人天界六六豫今有力量獨渡有何效豫達一切智以度人天界六七豫今有力量成為大力人豫達一切智以度衆多人六八斷輪回之流滅除彼三有乘正法之船度越人天界六九然望成佛者應結此八法人間得生男有見佛因緣出家且具德奉仕與願心結此八種法決心完成佛燃燈佛之預言燃燈世尊前來彼處近至善慧行者之頭而止立如開鏤有摩尼珠獅子之欄佛睜五色淨光之眼見臥泥土上之善慧行者佛以意識探向未來此行者決心成佛而臥此處然行者之願望能否達成佛知行者此後經四阿僧祇十萬劫將成名謂瞿曇佛佛立其處向群衆中預言佛言汝等衆人見此處有極度苦行之行者臥於泥土之上耶諸人尊師豫等確已見到佛彼決心要成佛而臥其願望必達由此四阿僧祇十萬劫後將成名謂瞿曇佛生於迦比羅衛城母摩耶夫人父淨飯王優婆帝沙舍利弗長老為最上首弟子拘利多目犍連為第二弟子阿難陀為佛侍者讖摩長老尼為最上首之女弟子烏婆羅般那蓮華色長老尼為第二女弟子智慧成熟為大出家行大精進於榕樹下受乳糜供養往尼連禪河之畔登上菩提道場於阿説他菩提樹下得上正覺於此如是述偈七燃燈知世間相應受供養豫之頭邊立而為説此語七一見結髮行者極度行苦行經由無量劫出世彼成佛七二如來降生處城名迦比羅遁出由樂都精進行難行七三如來行苦行牧羊樹下坐供養受乳糜入尼連禪河七四勝者由河出往岸納乳糜尋訪善整道附近菩提樹七五最上菩提場為行右繞禮菩提樹下覺有大榮譽人七六此佛之出生母名為摩耶父名淨飯王彼名為瞿曇七七離貪成無漏得定心寂靜舍利弗目連上位二弟子七八讖摩蓮華色上位女弟子侍者阿難陀常隨於勝者七九離貪成無漏得定心寂靜世尊菩提樹名為阿説他人天歡喜善慧行者云佛言豫之願望將可達充滿喜悅諸多群衆聞燃燈十力者之語皆大歡喜曰善慧行者為佛種佛芽彼等更如是思惟而立願恰如渡河直向不能得渡時由河之上遊向下方得渡豫等依燃燈十力者之教不得入向果者於善慧行者成佛時將能於尊者面前得入向果燃燈佛稱讚菩薩捧八握之花行右繞禮而去又四十萬之漏盡者等禮拜菩薩捧香花環而去人間與天人亦同樣以捧物禮拜菩薩而去汝必成佛大衆去後俯臥之菩薩起云豫且調攝波羅蜜於積花之上盤足而坐菩薩斯坐一萬大世界鐵圍界之天人聚集揚歡呼之聲曰善慧尊者昔諸菩薩調攝波羅蜜而坐時預現前兆今日尊者亦預現無餘尊者汝必成佛豫等善知人前現此兆者其人必定成佛汝自精進堅強努力諸人以種種之語稱讚菩薩於此如是述偈八聞此大仙語人天皆喜悅彼為佛種子彼為佛幼芽八一歡呼之聲揚拍手笑聲喧人天十千界合掌為禮拜八二我等於此世不得解佛教待等於來世當面會行者八三恰如渡河人不能著對岸指下遊渡場如同渡大河八四燃燈勝者去我等時已過待等於來世當面會行者八五相應受捧物燃燈知世間稱讚豫之行去時舉右足八六在場勝者子皆行右繞禮人龍乾闥婆拜豫而離去八七世間之導者弟子衆俱去爾時豫喜悅心歡由座起八八爾時豫心樂以樂為悅樂浸潤歡喜情盤足為靜坐八九盤足靜坐時豫如是思惟豫專修禪定上智達彼岸九於此千世界無等豫仙士無比神通法豫已得此樂九一豫盤足而坐十千世住者出言發大聲知汝必成佛九二昔日諸菩薩盤足為嚴坐彼等之前兆今日再現前九三寒去熱亦退此等之前兆今日得出現知汝必成佛九四十千之世界無音亦無騷前兆今日現知汝必成佛九五大風亦不吹大雨不降注前兆今日現知汝必成佛九六陸生水生花皆立即開花前兆今日現知汝必成佛九七蔓草與樹木立即結果實前兆今日現知汝必成佛九八空中地上寶皆共立放光前兆今日現知汝必成佛九九人天界樂器立即發音聲前兆今日現知汝必成佛一種種色之花立即由空降前兆今日現知汝必成佛一一大海水漲滿十千界震動前兆今日現知汝必成佛一二地獄一萬火立即皆消滅此火今日消知汝必成佛一三太陽無暈曇星光總顯現前兆今日現知汝必成佛一四天上雨不降地上水湧出今日地湧泉知汝必成佛一五星群與星斗空座有光輝氐星與月合知汝必成佛一六棲穴棲窟者出來依己意今日出棲處知汝必成佛一七生者無不平立即皆滿足今日皆滿足知汝必成佛一八爾時病已愈嫌惡之念消前兆今日現知汝必成佛一九爾時貪欲減瞋恚愚癡消今日總消失知汝必成佛一一爾時無怖心今日亦無之我等依此兆知汝必成佛一一一塵土不上散今日亦得見我等依此兆知汝必成佛一一二可厭香亦消天上香吹來今日此香吹知汝必成佛一一三除無色界天一切天人現彼等今日現知汝必成佛一一四諸到地獄者立即皆出現彼等今日現知汝必成佛一一五爾時壁戶石此等無障礙此等同虛空知汝必成佛一一六無論死與生剎那皆不起此等今日現知汝必成佛一一七堅執力精進不止亦不退我等今知此汝必成為佛佛語無虛妄菩薩聞燃燈十力者與一萬大世界天人等語愈益得力如次思惟佛語無虛妄佛語無違誤恰如投空落下土塊生者必死夜明日升獅吼出穴孕婦産子決難更動而佛語決不虛偽亦復如是豫必將成佛於此如是述偈一一八豫聞佛之語十千世界人大滿歡喜悅爾時豫思惟一一九佛語無二意勝者無語妄佛無偽裝事豫將必成佛一二如土塊投空必然落地上如此尊佛語確實而不變一二一如諸生物死確實而不變如此尊佛語確實而不變一二二如夜分之盡太陽必東升如此尊佛語確實而不變一二三如獅之出穴必作獅子吼如此尊佛語確實而不變一二四如宿母胎者終必出其胎如此尊佛語確實而不變布施波羅蜜如斯斷定豫必成佛然成佛之基本應為穿鑿之法然成佛根本之法在於何處為上方下方四方之隅耶探尋周遍法界發現昔日諸菩薩第一為行布施波羅蜜於是豫作如此之言以自誡賢者善慧汝此後應完成第一之布施波羅蜜恰如傾倒之瓶水傾出不能再如原樣收容一切財産名譽妻子肢體應毫不吝惜任隨來乞者之願悉皆施捨無餘坐於菩提樹下而成佛彼決心堅持第一布施波羅蜜於此如是述偈一二五於是於諸處豫探如來本上方與下方十方之法界一二六當豫探尋時第一布施度古之諸大仙依此為大路一二七若欲得菩提先行第一度布施波羅蜜堅持達成滿一二八水滿之水瓶如何使傾覆餘水盡傾出更無留止處一二九然見乞物者不問尊與卑行施無餘所猶如覆水瓶護戒波羅蜜爾後彼思成佛之基本法應非止此更發現第二之護戒波羅蜜彼如是思惟善慧賢者汝此後須完成護戒波羅蜜恰如犛牛不顧生命只重其尾汝亦今後不顧生命唯重護戒成佛彼決心堅持第二護戒波羅蜜於此如是述偈一三成佛基本法非惟此一端熟他菩提法於此須探尋一三一當豫探尋時第二護戒度古之諸大仙依此為行所一三二若欲得菩提次行第二度護戒波羅蜜堅持達成滿一三三恰如犛牛尾有物牽挂時待死於彼處彼不損其尾一三四於此四階級護戒達成滿常行守護戒如護犛牛尾出離波羅蜜爾後彼思成佛之基本法應非止此彼更探尋發現第三之出離波羅蜜彼如是思惟善慧賢者汝此後須完成出離波羅蜜恰如久住牢獄厭此無愛著心不欲思住其處同此汝見一切生有亦與此牢獄相同厭此一切生有望脫離之唯有向出離之道如是汝將成佛彼決心堅持第三出離波羅蜜於此如是述偈一三五成佛基本法非惟此一端熟他菩提法於此須探尋一三六當豫探尋時第三出離度古之諸大仙依此為行所一三七若欲得菩提次行第三度出離波羅蜜堅持達成滿一三八恰如久在獄苦痛起煩惱彼處無愛著唯欲力脫離一三九一切之生有視之如牢獄為由此脫出速向出離道智慧波羅蜜爾後彼思成佛之基本法應非止此彼更探尋發現第四之智慧波羅蜜彼如是思惟善慧賢者汝此後須完成智慧波羅蜜無論尊卑皆勿輕視親近問訊一切賢者恰如巡回托鉢比丘卑賤或其他種種差別之家次第行乞皆勿輕視以得資糧同此汝向一切賢者親近問訊汝將成佛彼決心堅持第四之智慧波羅蜜於此如是述偈一四成佛基本法非惟此一端熟他菩提法於此須探尋一四一當豫探尋時第四智慧度古之諸大仙依此為行所一四二若欲得菩提次行第四度智慧波羅蜜堅持達成滿一四三如比丘乞食貴賤中間家一一皆無漏斯得己資糧一四四汝常問知者智慧波羅蜜力行得成滿到達上菩提精進波羅蜜爾後彼思成佛之基本法應非止此彼更探尋發現精進波羅蜜彼如是思惟善慧賢者汝此後須完成精進波羅蜜恰如獸王獅子一切動作堅強精進同此汝於所有生存中於一切動作高強精進必將成佛彼決心堅持第五之精進波羅蜜於此如是作偈一四五成佛基本法非惟此一端熟他菩提法於此須探尋一四六當豫探尋時第五精進度古之諸大仙依此為行所一四七若欲得菩提次行第五度精進波羅蜜堅持達成滿一四八恰如獸中王獅子之坐立堅強常精進心強意氣高一四九所有生存中精進汝堅持精進波羅蜜成滿得成佛堪忍波羅蜜爾後彼思成佛之基本法應非止此彼更穿鑿探尋發現第六之堪忍波羅蜜善慧賢者汝此後須完成堪忍波羅蜜無論受褒與貶唯有寬恕之恰如大地無論人投清淨不淨之物大地於彼無親無怨只有寬恕忍耐同此汝於褒貶惟有寬恕遂將成佛彼決心堅持堪忍波羅蜜於此如是作偈一五成佛基本法非惟此一端熟他菩提法於此須探尋一五一當豫探尋時第六堪忍度古之諸大仙依此為行所一五二堪忍波羅蜜汝今須堅持心由此不離達無上菩提一五三淨與不淨物一總投大地大地皆堪忍無瞋亦無慈一五四稱揚與毀訾一切皆寬恕堪忍度成滿得達上菩提真實波羅蜜爾後彼思成佛基本法應非止此彼更穿鑿探尋發現第七之真實波羅蜜彼如是思惟善慧賢者汝此後須完成真實波羅蜜即使雷落頭上又財寶為或為其他物利欲心等應知此而善止吐虛言恰如曉之明星以通所有時季亦不棄自己應行之路而行他路必取自己之路同此汝如不棄真實不吐虛言必將成佛彼決心堅守真實波羅蜜於此如是述偈一五五成佛基本法非惟此一端熟他菩提法於此須探尋一五六當豫探尋時第七真實度古之諸大仙依此為行所一五七真實波羅蜜汝今須堅持於此語不違汝將成菩提一五八恰如曉明星人天界無比無論何時季不由其道逸一五九汝亦於真實勿由其道逸真實度成滿達無上菩提決定波羅蜜爾後彼思成佛之基本法應不止此彼更穿鑿探尋發現第八之決定波羅蜜彼如是思惟善慧賢者汝此後須完成決定波羅蜜決定之後決不可動恰如山由各方來風吹打不震不動惟立自之場所同此汝自決定場所不動必將成佛彼決定堅守第八之決定波羅蜜於此如是述偈一六成佛基本法非惟此一端熟他菩提法於此須探尋一六一當豫探尋時第八決定度古之諸大仙依此為行所一六二第八波羅蜜汝今須堅持於此不動搖汝達上菩提一六三山由磐石成堅立為不動強風吹不震峙立於其處一六四汝亦於決定常應為不動決定度成滿得達上菩提慈波羅蜜爾後彼思成佛之基本法應非止此更又穿鑿探尋發現第九之慈波羅蜜善慧賢者汝此後須完成慈波羅蜜對己利與不利皆以同心持之恰如於水善人惡人同等感受冷氣如此汝對所有生物以慈愛之情懷等同心遂將成佛彼決心堅持第九之慈波羅蜜於此如是説偈一六五成佛基本法非惟此一端熟他菩提法於此須探尋一六六當豫探尋時第九為慈度古之諸大仙依此為行所一六七若欲得菩提次行第九度慈愛無比類汝今須堅持一六八恰如有清水為除諸塵垢善人與惡人寒冷同感受一六九利者不利者慈受平等心滿慈波羅蜜達得上菩提捨波羅蜜爾後彼思成佛基本法應非止此彼更穿鑿探尋發現第十之捨波羅蜜彼如是思惟善慧賢者此後汝須完成捨波羅蜜苦樂平等宛如大地淨不淨物平等受之同此汝亦苦樂平等汝將成佛彼決心堅持遂行第十之捨波羅蜜於是如是述偈一七成佛基本法非惟此一端熟他菩提法於此須探尋一七一當豫探尋時第十為捨度古之諸大仙依此為行所一七二第十波羅蜜汝今須堅持堅固無可比證得上菩提一七三如棄染淨物皆投於大地忿怒與慈愛棄之見平等一七四對於苦與樂汝常使平衡滿捨波羅蜜達得上菩提三種波羅蜜而彼思惟於此世界菩薩完全應行使成熟菩提成佛之基本法惟此十波羅蜜而無其他此十波羅蜜上至虛空下至地上無論東西其他各方惟自住於心之內部徹觀如是住於內心之此十波羅蜜一總緊密再三順逆思惟執終而遂初執初而決終執中間而果兩端執兩端而果中間捨肢體而為波羅蜜捨自然之物而近於小波羅蜜捨生命而為最上義波羅蜜此十波羅蜜十近小波羅蜜與十最上波羅蜜如對於流出之油一齊混合可棒攪須彌山回旋大海水彼如是思此十波羅蜜時依其法之威力使四那由他二十萬由旬厚之此大地如象踏葭束機押甘蔗發大音而震動又如陶工及油榨機車輪之旋轉於此如是述偈一七五此世熟菩提惟有如此法無他能勝者汝今須堅持一七六性質與精髓形象併思惟依此法威力清淨世界震一七七如壓甘蔗機大地搖且鳴又如機車輪旋轉為震動大地震動大地震動喜樂城住民等不能起立如世間末日之風吹倒大沙羅樹人人氣絶悶倒磁瓶或其他陶工所器物轉碾相擊粉碎群衆戰恐往燃燈世尊之處曰此龍之捲起耶或此是鬼怪天人夜叉何者而起耶非豫等所知然群衆皆起煩惱此為世界之禍或福耶請佛詳細示知燃燈佛曰汝等勿恐怖此非降臨災禍之因今日豫曾預言善慧賢者於未來世成瞿曇佛彼今思惟十波羅蜜依其法之威力使一萬世界全體震動於此如是述偈一七八隨侍佛群衆失神皆震恐彼等於大地倒臥不能起一七九陶工所造器數百數千瓶其處互相擊打碎成粉末一八戰栗心震恐心病群衆集來至燃燈所請佛為開示一八一世將起何事福耶抑禍耶世人總煩惱乞攘有眼者一八二爾時大牟尼燃燈示彼等此大地震動安心勿懷恐一八三今日豫預言示知彼青年行古勝者法來世將成佛一八四成佛基本法無餘彼思惟為此大地震十千人天界群衆歡喜群衆聞如來語皆大歡喜携花環香及塗香出喜樂城赴菩薩處捧花環諸物禮拜行右繞禮然後還都菩薩思惟十波羅蜜誓堅精進由座起立於此如是述偈一八五群衆聞佛語心始得安寧一總來豫所再向豫禮拜一八六豫持佛之德豫心甚堅固爾時拜燃燈豫由座起立諸天讚祝菩薩由座起立一萬世界諸天人等皆來集捧獻天界花香述讚祝之辭曰尊貴之善慧行者今日汝於燃燈十力者足下立大願願汝成就無障礙勿懷怖畏無大驚險體無少病速行波羅蜜證正菩提恰如開花結實之樹時來花放實出汝亦適時勿過實現最上菩提如是祝辭終了彼等各歸天界菩薩為諸天盛稱自謂豫將完成行此十種波羅蜜將於四阿僧祇十萬劫後成佛彼決心堅持精進飛上空中往雪山地方而去於此如是述偈一八七天人與人間天界與人界由豫之座起散香撒諸花一八八天人與人間確知豫幸運汝之願甚大如望汝得果一八九攘解一切禍愈除一切病汝無諸障礙速證大菩提一九恰如時間到花樹花開放然而大雄者汝開佛智花一九一一切正覺者行十波羅蜜然而大雄者亦行十度果一九二一切正覺者開悟菩提場然而大雄者亦悟勝菩提一九三一切正覺者皆為轉法輪然而大雄者汝轉大法輪一九四恰如十五日證亘月輪輝然而汝心滿輝宣十千界一九五脫出羅睺口日輪之熱耀汝亦以尊嚴解脫世人耀一九六恰如諸河川同流入大海人天共兩界皆流入汝所一九七彼受此等讚堅持十種法遂行此等法爾時彼入林善慧故事談終其後之燃燈佛喜樂城之住民還都以佛為上首及比丘僧等行大布施佛為彼等説法多人受三歸戒出喜樂城更於一生間隨順諸佛之行而行入於無餘涅槃就彼應述之事於佛種姓經中盡述無遺於同經中如是述偈一九八彼等行供養佛與比丘衆歸依燃燈佛世間之導者一九九使住三歸依或住於五戒其他之信者使住十種戒二或與沙門道四種最上果或與無比法四種之解説二一人間之主得八種勝禪定或使某人得三明六神通二二牟尼依順序教化諸群衆世間導者教牟尼審為説二三頰豐肩寬廣是名燃燈佛度化多衆人脫離衆苦界二四往見開悟者十萬由旬間剎那往彼處牟尼使彼悟二五第一説教時十億人得悟第二説教時得悟一兆人二六佛於天宮中為天人説法第三説教時天人九千億二七於此燃燈佛有此三集會第一之集會集億萬有情二八勝者那羅陀間居峰上時漏盡離垢者集會有十萬二九善現大雄者彼住雪山時爾時大牟尼九千億人侍二一時豫為行者結髮激苦行往來虛空中五通達彼岸二一一悟得大法者二十萬之衆一二之悟者其數為無量二一二爾時祥者教清淨且微妙審説悟群生具不思議力二一三四十萬之衆六通威神力了解世間者常侍燃燈佛二一四爾時棄人界尚未言得志有學之徒衆非難尚不免二一五佛語善花開無垢無煩惱依此阿羅漢人天界光輝二一六都名有喜樂國王稱善慧燃燈師之母稱為須彌陀二一七善吉祥帝沙弟子中長者燃燈師侍者彼名為善來二一八喜悅善喜悅女弟中長者世尊菩提樹稱為畢波羅二一九燃燈大牟尼身長八十肘美好如燈台沙羅樹王花二二大仙之壽量具成百千歲於彼生之間成佛度群生二二一正法度多人照輝如火聚與彼弟子衆共入涅槃境二二二通力與名譽御足有輪寶一切皆歸無諸行總成空二二三燃燈佛之後導者憍陳如光明譽無量難測亦難及憍陳如佛燃燈世尊之後經一阿僧祇劫憍陳如佛出世佛行三度弟子之集會第一集會一兆人第二集會百億人第三集會九億人爾時菩薩為轉輪王名甚勝者向佛及一兆比丘衆行大施食佛向菩薩預言汝未來世當得作佛彼聞佛説法以國事托付大臣等而出家彼學三藏得八定及五神通修禪不怠生梵天界憍陳如佛之城名喜樂父為善吉悅剎帝利族之人母善生妃賢與善賢二人為上首弟子侍者阿䨲樓陀帝沙優婆帝沙為女弟子中之上首薩拉伽利亞尼為佛之菩提樹佛之身長八十八肘壽量十萬歲吉祥佛此佛之後經一阿僧祇劫於同劫中有吉祥善意離日所照四佛出世吉祥世尊之時行三度弟子集會第一集會一兆比丘第二集會為百億比丘第三集會為九億比丘佛之異母弟阿難慶喜王子與九億群衆共同聞法來詣佛所佛為彼次第説法彼與衆獲四種解脫及阿羅漢果佛徹見此等良家子前世之行知彼等有能依通力獲得衣鉢之機根伸右手曰來汝諸比丘一同於瞬間皆依通力成得持衣鉢之身具如六十歲長者之行儀禮拜之後附隨於佛此為佛第三次之集會他之諸佛身光四方不出八十肘但世尊之身光常滿一萬世界一切樹木大地山海等乃至炊釜之類皆如黃金之葉所包佛壽九萬歲其間日月難照自光晝夜之區別判然不分生物常依佛光往來如日中依太陽之光世間之人依夕間花放朝時鳥鳴而知晝夜之區別然則他之諸佛無此威神力耶否亦非如是他之諸佛若發是願望滿一萬世以上之光明吉祥佛依昔之願力身光常滿一萬世界一如他之諸佛一尋量之光吉祥佛之大施佛昔為菩薩行受生時擬為一切度與妻子共住似萬伽山之山有剛牙夜叉聞大士有施物之志現為婆羅門之姿來大士之所云請汝之二小兒與我大士歡喜與二小兒給婆羅門大地海邊悉皆震動夜叉於菩薩經行處之端所懸之板前噉食小兒如噉短柱之根菩薩見夜叉開口血潮如火焰噴出雖然如此絲毫不起不快之念彼思此誠為善施其身湧大喜悅之念彼云豫依此功德之力於未來世將出如是之光明佛依此大願成佛時由身體出現充滿如是之光明燒身供養佛今有一昔行據傳佛為菩薩時見某佛塔云豫須為佛捨棄生命彼風捲全身如捲炬火向飾有寶玉之把手價十萬兩金之鉢注入熟酥點燃一千燈心之火載於頭上全部火燃右繞塔之周圍以終夜如是堪忍至日出未受毛孔之熱恰如登上蓮萼此所謂法者善護自己之故於此如是述偈二二四隨法行者為法護善行法者齎安樂隨法行者無惡趣善行法者有效果依此行之功德力世尊之身光滿一萬世界善喜婆羅門爾時菩薩名善喜婆羅門某時彼思招待佛陀往詣佛所聞如蜜之説法向佛申述曰尊師明日請受豫之供養佛婆羅門汝欲招待比丘幾人善喜尊師隨侍比丘有幾人耶爾時佛恰正行第一集會佛曰有一兆人善喜申曰尊師請與諸衆同來豫家接受供養佛與承諾婆羅門為明日之招待於還自宅途中思惟豫非不能施此比丘衆之粥飯衣服但座位場所將如何處理當彼如是思惟使八萬四千由旬高處天王之赤黃毛毯色石座帶來溫味帝釋天曰何人使豫將由此座搖落彼以天眼遍觀發現大士而自思惟善喜婆羅門為招待佛與比丘座席之事躊思豫須參與彼處善業之分擔帝釋化身為木工之姿手携斧鐵現身大士面前云於何地方以工資雇用豫之人耶大士見曰汝能為何工作木工豫無不知之藝家中棚舍人能作者豫皆能為大士如是豫處有工作木工主人有何工作大士明日豫將招待一兆比丘大衆彼比丘衆所坐之棚舍汝能為耶木工若主人與豫工資豫將為之大士豫將付與木工甚善豫將為作木工之帝釋往見一處有十二十三由旬量之土地如遍處定之對象所用土地之平坦彼即作念此一場所以七寶建立為一棚舍棚舍立即破大地而出於金製之柱上載以銀製之大斗於銀柱之上載金之大斗於摩尼柱之上載珊瑚之大斗於珊瑚柱之上載摩尼之大斗於七寶之柱上載七寶之大斗然後於每一棚舍之間垂挂鈴網同時鈴網下垂微風吹動由五種樂器鳴響出微妙之音恰如天人一同讀誦時之狀彼念內側垂香繩與花環之繩則繩即下垂彼念一兆數比丘衆之座席與長凳破地出現則亦立即出現彼念每一隅各出一水瓶則水瓶亦即出現如是完成之後彼往婆羅門之處云主人請出觀覽汝之棚舍請付豫資金大士往觀棚舍一見而全身充滿五種喜悅彼見棚舍自思此非人間之所作依豫之志德感帝釋天界溫味是帝釋天王作此棚舍於此棚舍之中不可唯為一日之施豫將為七日之施無論外部之施如何菩薩尚不能喜惟有切首塗墨挖眼割肉之施菩薩由此施與始能滿意菩薩於尸王本生談中故事第四九九每日以五安瑪那量之伽瓦巴那錢幣於都城四門及中央行施猶不能與菩薩喜捨之滿悅然彼時帝釋天王以婆羅門之姿前來乞捨兩眼時菩薩挖目與之始起歡喜之心菩薩之心絲毫不趣外向是故今之如是施與菩薩不能滿足故此大士思惟豫須於七日之間施此一兆之比丘衆於是於棚舍中設座七日間行乳糜之施人間之力不足天人亦來交相服務於十二十三由旬量之場所尚難容納比丘於是比丘衆各依己之威神力而坐最終之日比丘衆洗鉢盛入醍醐味熟酥蜜糖及其他之物以為藥餌並添加三衣其中最年幼之比丘所受法衣即為十萬兩之價佛述隨喜之辭彼行如是大施究為如何成就佛鑽研得知彼於二阿僧祇十萬劫後將成為瞿曇佛佛呼大士豫言汝經如是如是之時後將成為瞿曇佛大士聞此豫言思惟佛言豫將成佛家族生活於豫亦無必要豫將出家於是唾棄己身之榮華詣佛之所而出家於出家後彼學佛之教得神通與禪定命終之後生梵天界吉祥世尊之都城名上勝父名上勝剎帝利族母名上勝妃善天法軍二人為上首弟子侍者所護喜瓦莉與無憂二人為女上首弟子那伽樹為菩提樹佛身長八十八肘生九萬年入於涅槃一萬大世界一時總黑暗所有大世界中諸人強烈悲泣二二五憍陳如佛後導者名吉祥拂去世黑暗揭舉法炬火善意佛如是一萬世界黑暗世尊入涅槃後有善意佛之出世佛有三次弟子集會第一集會集有一兆比丘第二集會於黃金山上為九十兆第三集會為八十兆爾時大士名無比龍王具大神通大威力彼聞佛出世率龍族之大衆出龍之世界向伴一兆比丘之世尊供養天上音樂施比丘法衣每人一領受三歸戒佛亦向彼預言於未來世汝當作佛佛之都城名安穩父名善施王母名有瑞者妃歸依與修身為上首弟子侍者名升輸那與優波輸那為女上首弟子那伽樹為菩提樹佛身長九十肘壽命一千歲二二六吉祥佛之後導師名善意一切法無比有情最第一離曰佛其後離曰佛之出世佛行三次集會第一集會其數不明第二集會為一兆第三集會亦同爾時菩薩名越天婆羅門聞佛説法受三歸戒合掌頭上讚佛捨棄煩惱獻上中衣佛亦向彼預言汝將成佛佛之都城名有善穀父名廣大王母名廣大妃婆樓那與梵天為上首弟子侍者名出生賢與善賢為上首女弟子那伽樹為菩提樹佛身長八十肘壽命六萬歲二二七善意佛之後導師名離曰無譬無等比最上之勝者所照佛此佛之後所照佛之出世佛有三次弟子之集會第一集會有十億比丘第二為九億第三集八億比丘爾時菩薩名未降婆羅門聞佛説法受三歸戒向佛及比丘衆行大施捨佛亦向彼預言汝將成佛佛之都城名善法父名善法王母名善法妃無等與善眼為上首弟子侍者非卑諾酤羅與善生為上首女弟子那伽樹為菩提樹佛身長五十八肘壽命九萬歲二二八離曰佛之後導師名所照得定心寂靜無比無對等高見佛此佛之後過一阿僧祇劫於同劫中有高見蓮華那羅陀三佛出世高見佛行三次弟子集會第一八十萬比丘第二七十萬第三集六十萬比丘爾時菩薩為夜叉軍之長具大神通大威力為數兆夜叉之長聞佛出世來向佛與比丘衆行大施捨佛亦向彼預言於未來世汝將成佛高見世尊之都城名有月父名有稱王母名耶輸達拉妃人主與非卑為上首弟子侍者名婆樓那孫陀利與善意為上首女弟子阿株那為菩提樹佛身長五十八肘壽命十萬歲二二九所照後高見正覺兩足尊聲譽揚無限威光難勝者蓮華佛此佛之後有蓮華佛之出世佛行三次之弟子集會第一之集會集一兆比丘第二集三十萬第三不在村落集住森林中比丘衆二十萬人如是如來居森林中菩薩生為獅子見佛入滅盡定發信仰心拜佛行右繞之禮懷歡喜愈悅之念三度為獅子吼七日之間以佛為對象不棄法喜因喜樂故不漁獵獲物願棄生命奉仕於佛佛於七日終出滅盡定見獅子而自思此獅對比丘衆發信仰心將一同禮拜佛為此念比丘衆來比丘衆立至獅子對比丘衆亦發信仰心佛知其心向獅預言於未來世汝將成佛蓮華世尊之都城名詹蔔迦父為蓮華王母曰無等沙羅與優婆沙羅為上首弟子侍者名婆樓那羅摩與優婆羅摩為上首女弟子蘇那樹為菩提樹佛身長五十八肘壽命十萬歲二三高見佛之次正覺兩足尊佛名稱蓮華無比對等人那羅陀佛此佛之後那羅陀佛之出世佛行三次弟子之集會第一集會集一兆之比丘第二集九千億第三集八千億之比丘爾時菩薩出家入仙人道於五神通及八定行自在向佛與比丘行大施捨獻赤旃檀佛亦向彼預言於未來世汝將成佛此世尊之都城名有穀父名善慧剎帝利族母曰阿諾瑪妃賢沙羅與勝友為上首弟子侍者名婆悉陀上勝與婆古尼為上首女弟子大蘇那樹為菩提樹佛身長八十八肘壽命九萬歲二三一蓮華佛之後正覺兩足尊佛名那羅陀無比對等人蓮華上佛那羅陀佛之後有蓮華上佛之出世佛行三次弟子之集會第一集一兆之比丘第二於毗婆山上時為九千億第三之時集八千億之比丘爾時菩薩名結髮摩訶羅吒人向佛與比丘衆行施法衣佛亦向彼預言於未來世汝將成佛於蓮華上世尊時代無外道天人與人間皆歸依佛佛之都城名有鵝父名慶喜剎帝利族母名善生執天與善生為上首之弟子侍者蘇摩那無量與無等為上首之女弟子娑羅樹為菩提樹佛之身長八十八肘身光四方達十二由旬壽命十萬歲二三二那羅陀之後正覺兩足尊蓮華上勝者不動似大海善慧佛此佛之後經三萬劫於同劫中有善慧與善生二佛之出世善慧佛行三次弟子之集會第一於善現之都行集會來十億之漏盡者第二為九億第三會集八億人爾時菩薩名上勝為一青年棄積蓄八億之寶向佛及比丘衆行大施捨聞法歸依三寶出家得度佛亦向彼預言於未來世汝將成佛善慧世尊之都城名善現父名善施王母名善施歸依與一切欲二人為上首弟子侍者名海羅摩與須摩羅二人為上首之女弟子摩訶尼巴樹為菩提樹佛之身長八十八肘壽命九萬歲二三三蓮華上佛後導師名善慧無比大威光諸世上牟尼善生佛此佛之後有善生佛之出世佛時亦行三次弟子之集會第一集會六萬比丘第二集五萬第三集四萬比丘爾時菩薩為轉輪王聞佛出世往詣佛處聽法向佛及大衆施七寶與四大洲之主權於佛處出家其國之人民藉佛來之機會完成園丁寺男服務之事對佛及比丘衆常行大施佛亦與彼豫言世尊之都城名善吉祥父名上行王母名發光善現與提婆天為上首之弟子侍者名那羅陀龍與龍共鬘為上首之女弟子大竹為菩提樹此樹筒管小而幹粗上方之葉呈孔雀之尾束狀而有光世尊身長五十肘壽命九萬歲二三四精好劫之中導師名善生牛肩獅子頰難測無比類喜見佛此佛之後自今一千八百劫之昔於同劫中有喜見義見法見三佛之出世喜見佛亦行三次弟子之集會第一集會一兆之比丘第二集九億第三集八億人爾時青年菩薩名迦葉通曉三吠陀聞佛説法棄一兆之寶建僧伽藍受三歸五戒爾時佛向彼預言經一千八百劫汝將成佛此世尊之都城名非卑父善與王母名為月所護與一切見為上首弟子侍者名所照善生與法與為上首女弟子槴子樹為菩提樹佛身長八十肘壽命九萬歲二三五善生佛之後大名自存者世界之導師喜見無等比義見佛此佛之後有義見佛之出世此佛亦三次行弟子之集會第一集九百八十萬比丘第二集八百八十萬第三亦集同數之比丘爾時菩薩名善界有大威力之苦行者彼由天人世界持來曼陀羅華以作大傘獻佛此佛亦向彼授與預言此世尊之都城名所照父名海王母曰善現息與安息為上首弟子侍者名無畏法與善法為上首女弟子闍康巴樹為菩提樹佛身長八十肘身光常遍四方滿一由旬壽命一萬歲二三六精好同劫中牛王義見佛拂去大黑暗達最上菩提法見佛此佛之後有法見佛之出世此佛亦三次行弟子之集會第一集十億第二集七億第三集八億比丘爾時菩薩為帝釋天王以天華天樂向佛供養此佛亦授菩薩預言此世尊之都城名歸依父名為娑羅那王母曰善慶蓮華與觸天為上首弟子侍者名善眼安穩與一切名為上首女弟子具羅波劫樹一名金網樹為菩提樹佛身長八十肘壽命一萬歲二三七賢劫同劫中大名法見佛拂去大黑暗人天世界光義成就佛此佛之後自今九十四劫以前於同劫中有義成就佛唯一人出在世間此佛亦三次行弟子之集會第一集會一兆第二集九億第三集八億之比丘爾時菩薩名吉祥行者有大威光具神通力彼持來大閻浮果獻與如來佛受果實向彼豫言經九十四劫汝將成佛此世尊之都城名毗婆羅父為勝軍王母曰善觸水與善友為上首弟子侍者名離曰喜瓦利與善樂為上首女弟子迦尼割羅樹為菩提樹佛之身長六十肘壽命一萬歲二三八法見佛之後導師義成就破除一切暗恰如日東升帝沙佛此佛之後自今九十二劫之昔於同劫中有帝沙與弗沙二佛之出世帝沙世尊亦三次行弟子之集會其中第一集會為十億第二集九億第三集八億之比丘爾時菩薩名善生有大財産大名譽為剎帝利族出家入仙人之道具大威力彼聞佛出由天界携來曼陀羅華蓮華婆利闍多迦華獻與為四衆弟子所圍繞之佛空中翳成花之天蓋佛亦向彼預言自今九十二劫之後汝將成佛此世尊之都城名安穩父曰結民剎帝利族母名蓮華梵天與上升為上首弟子侍者名上生觸與善與為上首女弟子阿薩那為菩提樹佛身長六十肘壽命一萬歲二三九義成就之次無等無對等無量無限界世界最第一導師帝沙佛弗沙佛此佛之後有弗沙佛之出世此佛亦三次行弟子之集會第一集會六百萬第二集五百萬第三集三百二十萬比丘爾時菩薩名已勝者王棄大王國於佛處出家學三藏為大衆説法完成戒波羅蜜佛亦與彼豫言此佛之都城名迦尸父曰勝軍母曰有瑞者善所護與法軍為上首弟子薩比耶為侍者動與近動為上首女弟子阿末羅樹為菩提樹佛身長五十八肘壽命九萬歲二四賢劫同劫中無上佛出世無比世第一導者弗沙佛毗婆尸佛此佛之後自今九十一劫之昔有毗婆尸佛之出世此佛亦行三次弟子之集會第一集會六百八十萬比丘第二集十萬第三集八萬爾時菩薩為有大神通力有大威神力之無比龍王以鏤七寶黃金所製椅子獻與世尊佛亦向彼預言自今經九十一劫汝將成佛此佛之都城名有親父為有親王母曰有親妃破片與帝沙為上首弟子侍者無憂月與月友為上首女弟子波吒梨樹為菩提樹佛之身長八十肘身光常滿七由旬壽命八萬歲二四一弗沙佛之後正覺上勝者其名毗婆尸具眼者出世尸棄佛此佛之後自今三十一劫之昔有尸棄與毗沙浮二佛之出世尸棄佛行三次弟子衆之集會第一集十萬比丘第二集八萬第三集七萬之比丘爾時菩薩為伏敵王行向佛及比丘僧衆添法衣之大施施以飾七寶之象寶獻與象等身量之比丘用具佛亦向彼預言自今經三十一劫汝將成佛此佛之都城名有日父名有日剎帝利族母曰有光勝者與出生為上首弟子作安穩為侍者瑪柯拉與蓮華為上首女弟子白蓮樹為菩提樹佛身長三十七肘身光滿三由旬壽命三萬七千歲二四二毗婆尸佛後正覺兩足尊佛名呼尸棄無比對等人毗沙浮佛此佛之後有毗沙浮佛之出世此佛亦三次行弟子之集會第一集會八百萬第二集七百萬第三集六百萬比丘爾時菩薩名善現王向佛及比丘僧衆行增添法衣之大施於佛所出家具十分行德念佛寶得大喜悅佛亦向彼預言自今經三十一劫汝將成佛此佛之都城名無譬父為善悅王母曰有稱蘇那與上勝為上首弟子侍者近寂調伏與共鬘為上首女弟子沙羅樹為菩提樹佛之身長六十肘壽命六萬歲二四三賢劫同劫中無比對等者佛名毗沙浮勝者出世間拘留孫佛此佛之後於此劫中有拘留孫拘那含牟尼迦葉及釋迦世尊四佛之出世拘留孫佛只行一次弟子衆之集會集四萬之比丘衆爾時菩薩為安隱王行向佛及大衆增添衣鉢之大施獻塗眼之藥及藥品聞佛説法而出家佛亦與彼豫言拘留孫佛之都城名啓瑪父名火旋婆羅門母曰毗沙佉婆羅門女甚遠與共活為上首弟子侍者名覺生黑與詹匐迦為上首女弟子摩河西利薩樹為菩提樹佛之身長四十肘壽命四萬歲二四四毗沙浮之後正覺兩足尊佛名拘留孫難測無比類拘那含牟尼佛此佛之後有拘那含牟尼佛之出世佛只有一次弟子之集會集三萬之比丘爾時菩薩為巴巴達山之王率大臣衆至世尊之所聞佛説法招待佛與比丘衆行大布施獻機織之上布震旦製之布絹布毛布黃麻布及金絲布於佛所出家佛亦授彼豫言此尊之都城名有彩父名祭施婆羅門母日善勝婆羅門女斷多與上勝為上首弟子侍者名吉祥生海與善勝為上首女弟子優曇鉢羅樹為菩提樹佛身長二十肘壽命三萬歲二四五拘留孫之後正覺兩足尊拘那含牟尼世間之勝者世界之長者人中之牛王迦葉佛此佛之後有迦葉佛之出世佛亦有一次弟子之集會集三萬之比丘爾時青年菩薩名光護通達三種吠陀奧義善知地上與天界為陶器師作瓶之友彼與其友俱詣佛所聞法話而出家精進努力修學三藏遂行大小義務為佛教添加光彩佛亦授彼豫言此世尊出生之都城名波羅奈父名梵施婆羅門母曰有財婆羅門女帝沙與婆羅墮闍為上首弟子侍者名一切友阿䨲羅與優樓頻羅為上首女弟子尼拘律榕樹樹為菩提樹佛身長二十肘壽命二萬歲二四六拘那含佛後正覺兩足尊勝者名迦葉法王起光輝一切佛於燃燈十力者出世之劫中有三佛出世然菩薩未受此三佛豫言故此處不舉釋義書中為示此劫後之一切佛述偈如次二四七作欲作慧佛作依燃燈佛憍陳如佛陀正覺兩足尊二四八吉祥善意佛離曰聖所照阿諾瑪達西蓮華那羅陀巴多姻塔拉以上共八佛二四九善慧善生佛喜見有大名阿塔達西佛丹瑪達西佛世之指導者義成就佛陀二五帝沙弗沙佛正覺毗婆尸尸棄毗沙浮拘留孫佛陀拘那含牟尼導師迦葉佛二五一此等正覺者得定除貪欲百條光明現拂去大黑暗照輝如火炬弟子入涅槃菩提資糧之成滿菩薩於燃燈佛以下二十四佛所立誓過四阿僧祇十萬劫於迦葉佛之次除此等正覺者外其他佛不在於燃燈佛以下二十四佛所菩薩受成佛豫言生人得男性見佛有因緣出家且具德奉仕與願心結此八種法成就佛願望彼結合如是八法伏於燃燈佛足下起大願望此處彼處努力尋求成佛之基本法彼謂當豫探尋時見第一布施波羅密菩薩見出布施波羅蜜為成佛之要件能生出耶山多羅一切度其次能起讚美諸菩薩德之願望即能具如下諸德二五二必達菩提人完具其肢體一億劫之間長路於輪回二五三無間大地獄世界中間獄飢渴黑繩獄一切皆不入微小諸昆蟲惡趣亦不生二五四生於人趣中不成為盲者聽覺無缺陷亦不為聾啞二五五必達菩提人不生於女性不為兩性者不屬根不具二五六不犯五無間行處常清淨不懷邪見事理解作業故二五七雖住天上界不生無想天亦無是因緣生於淨心天二五八善人心出離由生不執生遂行波羅蜜行世之利行施波羅蜜之成滿彼為遂行波羅蜜生為阿奇底婆羅門桑伽婆羅門拘樓王大善見王摩訶哥溫達王尼彌大王旃陀王子衛賽哈長者尸義王尾送達羅完行布施波羅蜜之生活實為無數然實際彼於沙沙般提陀本生本生談第三一六中謂二五九見乞食來近己則棄此身施無等豫者此豫布施度如是當彼自己棄身之時布施波羅蜜乃成就最上波羅蜜持戒波羅蜜之成滿彼生為具戒龍王瞻波耶龍王槃達龍王旃壇達他龍王伏敵王之子不著敵王子完行持戒波羅蜜之生活實為無數然實際彼於護螺龍王本生本生談第五二中謂二六雖然被串刺則雖刃物切豫對彼無怒此豫持戒度如是當彼棄身之時持戒波羅蜜乃成就最上波羅蜜出離波羅蜜之成滿同樣彼又生為蘇摩那薩王子哈提婆羅王子鐵屋賢者棄大王國完全行出離波羅蜜數實無量然彼實際於秋拉斯塔蘇摩本生本生談五二五中謂二六一大國入手中豫棄如唾液更棄無執著此豫出離度如是彼無欲執棄國王位而出家時出離波羅蜜乃成就最上波羅蜜智慧波羅蜜之成滿同樣彼又生為威烏拉賢者摩訶哥溫達賢者庫達羅賢者阿拉伽賢者菩提普行沙門大藥賢者完全行智慧波羅蜜數實無量然實際於薩茲巴陀本生本生談第四二中彼生為賢者賽那伽時謂二六二以探尋智慧為苦婆羅門由苦患救出精進於智慧世無及豫者此豫智慧度當彼見蛇入鞴中時智慧波羅蜜乃成就最上波羅蜜精進波羅蜜之成滿同樣彼又完行精進波羅蜜及其他數實無量然實際彼於摩訶伽那迦本生本生談第五三九中謂二六三中流不見岸人總有失誤豫心終不變此豫精進度彼渡大海時以精進波羅蜜成就最上波羅蜜堪忍波羅蜜在堪提瓦達本生本生談第三一三中謂二六四伽西王利斧斷豫失意識慘痛豫不怒此豫堪忍度於是在失去意識狀態下忍耐巨烈之痛苦時以堪忍波羅蜜成就最上波羅蜜真實波羅蜜之成滿於大須陀須摩本生本生談第五三七中謂二六五護持真實語捨棄己生命豫救百剎利最上真實度如是捨棄生命護持真實時以真實波羅蜜成就最上波羅蜜決定波羅蜜於啞躄本生本生談第五三八中謂二六六豫不憎父母豫不厭大譽豫受一切智故豫起修行如是棄生命遂修行時以決定波羅蜜成就最上波羅蜜慈波羅蜜之成滿於一王本生本生談三三中謂二六七無人威脅豫豫亦不畏人慈愛力堅固豫樂住森林如不顧自己生命垂慈愛時以慈波羅蜜成就最上波羅蜜捨波羅蜜於怖畏本生本生談第九四中謂二六八豫於墓場中頭枕髑髏眠群童來集合示現種種相如是豫被村中兒童等唾吐或贈豫花環及香料雖然痛苦與快樂交熾而不失平等心時以捨波羅蜜成就最上波羅蜜以上此處不過簡單説述詳細意義見闍梨耶毗陀迦所行藏經如是完成諸波羅蜜彼生於一切度之生二六九不知樂與苦大地本無意依豫布施力大地七震動如是彼行有使大地震動之大功德壽命盡時由其處死生兜率天由彼伏於燃燈佛足下至出生兜率天都間之話應須知為遠因緣本生二不遠因緣談三種之豫告菩薩住兜率天之都為有佛出現之預告世有三種預告即改劫預告佛出世預告及轉輪王出世之預告其中自今經十萬年將為劫初爾時世界群衆屬欲界之天人等散髮泣面以手拭淚身著赤衣姿容怪異徘徊人間世間作如次之言曰善男子由此經十萬年為劫初爾時世界將亡大海將乾大地與須彌山王悉皆燒盡至大梵天世界無存善男子須起慈心悲心喜心捨心孝養父母尊敬長者此為改劫之預告由此經千年將有佛出世世界守護者諸天人等處處徘徊大聲呼喚善男子由此經一千年為佛出世此為佛出世之預告由此經一百年轉輪王將出諸天人等徘徊四方大聲呼喚善男子今經百年轉輪王將出世此為轉輪王出世之預告以上三者為大預告諸天懇願此三者中聞佛出世之預告一萬大世界之天人等皆集一處知某佛將成佛則往其人之處為成佛之懇願因懇願預示前兆故為懇願之舉爾時諸天人等一一世界之四大王天帝釋天善時分天兜率天他化自在天及大梵天共集於一世界往兜率天菩薩之處懇願言曰菩薩汝完全敢行十波羅蜜非為求帝釋天之光榮及魔王梵天轉輪王之光榮而敢行乃為救度世界之衆人求一切智而敢行今為汝應求菩提之時應求菩提之時機矣五種之觀察菩薩考慮對天人等之承諾遂行時機國土地方家系母親及其壽命之五大觀察其中第一觀察時機何時為好時機何時為非好時機於此多人間之壽命由十萬歲增時非好時機何以故爾時生物不知生老死因而佛之説法不具三特相之莊嚴彼等雖聞無常苦無我之説訝異此究為何事雖聞而不思信故不理解不理解則化導無效故非好時機但由百歲壽命減少時亦非好時機何以故此時生物滿溢煩惱滿溢煩惱而受教不從如附水之印立即消失故亦非好時機因此由十萬歲以下百歲以上壽命之長度為好時機是時人壽百歲大士知今應出世之時然後為洲之觀察對四洲及其屬島一併觀察諸佛不出於三洲唯只生閻浮提此為觀察洲然此閻浮提為大洲廣有一萬由旬諸佛生於何方此為觀察地方於是觀察中部地方中部地方者東之方位有迦旦遮羅村越此有大沙羅樹此前為邊鄙地方由彼至此為中部地方東南方位有沙羅羅瓦底河此前為邊鄙地方由彼至此為中部地方南之方位有白木調村越此為邊鄙地方由彼至此為中部地方西之方位有土拿婆羅門村落此前為邊鄙地方由彼至此為中部地方北之方位有烏西拉達迦山此前為邊鄙地方由彼至此為中部地方此為律藏中所説之中部地方其長三百由旬幅二百五十由旬周圍九百由旬此中部地方中有佛辟支佛之上首弟子二人大弟子共八十人有轉輪王其他有大偉力剎帝利婆羅門居士之富豪等出生彼決心謂此處為迦毗羅衛都城豫須於彼處出生其次為家系觀察諸佛不生毗舍與首陀之家唯生於受人尊敬之剎帝利與婆羅門此二種族今剎帝利為世界之人所敬豫將生此一族中淨飯王為豫之父其次為母之觀察佛母無愛欲不溺酒十萬劫間遂行波羅蜜此生未破五戒大摩耶妃為如是之女性此將為吾母然其壽命如何而觀察知彼為十個月與七日間下生之宣言終了此五大觀察彼云諸位天人豫成佛時機已至彼迎天人等愈快承諾繼謂汝等且歸送彼等出彼隨兜率天之天人等入難陀園天上世界皆有此園天人等於此處向菩薩云由此處死去將生善地使彼憶起前世所行善業之效果如是度過時日天人等彼憶起過去善業之間隨侍於側菩薩於是死去而宿於大摩耶妃之胎中次之本生則為説明此托胎之奇瑞依據傳言其時迦毗羅衛之都遇到阿沙陀祭秋祭群衆為祭祀之心情大摩耶妃於十五夜之日前七日以來禁止飲酒增飾花環與香料享祭祀之樂於第七日早起而出浴香水行捨四十萬兩金之大施身裝各種類之飾攝上味之食守八關齋戒入裝飾之寢殿橫臥榻上而見奇夢由四大天王共持臥榻與妃運往雪山地方置廣六十由旬之悅意石之平原中七由旬之大沙羅樹下彼等立於一隅於是天王等之妃前來運摩耶妃往阿耨達池請妃浴水以除人間垢穢身著天人之服塗香料飾天界之花有白銀山於附近中有黃金宮殿設天人臥榻使妃臥其上枕向東方菩薩化為優美之白象由彼處不遠黃金山上漫步而下登白銀山由北方而來以銀索色之鼻握白蓮華一聲高吼入黃金殿中三度右繞母妃臥榻之周開母妃右脅為入胎狀如此菩薩於阿沙陀祭最後之日宿於母胎翌日妃覺醒向王告此夢事王招集六十四位名高之婆羅門等於以緑樹之葉或炒穀付以祭飾於地上設高價之座席坐於其處之婆羅門等獻混醍醐蜜糖之美味飲料覆以金銀之鉢大量施捨其他新衣赭色之牛及以外甚多物使彼等十分滿足後王問此夢之話吉凶如何婆羅門等答曰大王勿慮此乃王妃懷妊宿胎為王子而非王女貴君之王子降生若居家生活為轉輪王若出家生活則除被蓋而成佛菩薩宿於母胎同一瞬間一萬世界悉皆震動出現三十二種前兆一萬之大世界充滿無限之光明為見此榮光盲者見物聾者聞聲啞者互話傴僂體伸跛者能行受縛者解放枷鎖地獄之火皆消餓鬼世界無飢畜生不感恐怖生類悉無疾病並皆話以愛情快風馬嘶象吼樂器各自發音飾物自鳴四方清澄涼風柔吹生類快樂不時雨降地中湧水散飛空鳥停飛河川而止流大海水味甘總之有必要者其上覆五色蓮花水陸花放滿樹幹莖莖放蓮花枝放蓮花蔓放蓮花於陸地破磐石之上生有七莖蓮花空中垂蓮花四方雨降蓮花空中天上音樂齊鳴一萬世界回轉散放花環之塊如飾於花環座上之壓縛花環之束如振犛尾拂子薰郁花之好香全體形成唯一花環世界實為美麗之極菩薩之母菩薩宿母胎後為防菩薩與母之災禍四天子執劍守護菩薩之母毫不起欲念名利正達絶頂心境安樂身體無疲菩薩宿於胎內如覆金絲透明摩尼之寶菩薩所宿之母胎如祠之內殿為他人不能宿用之處是故菩薩之母於菩薩誕生後七日死去生兜率天其他之婦女滿十月或過十月或坐或臥而産菩薩之母則不如是彼女於十個月間保護菩薩於胎內後立而生産此菩薩之母生子常法大摩耶妃恰如器中盛油十個月間胎中保護菩薩月滿之時思惟欲還親族之家向淨飯大王云豫思欲往故鄉天臂之都王曰甚善與以承諾王命修理由迦毗羅衛城至天臂城間之道路路旁飾以芭蕉滿水之瓶及其他之物妃乘黃金之駕由大臣等肩擔及多數侍從相送降誕二城之間有二城之人共稱為藍毗尼園之沙羅樹遊苑爾時各樹之花由根幹至頂枝一切以一色開放枝之間花之間有五色蜂群及各種鳥群飛繞鳴出美妙之聲藍毗尼園全體宛如闍達羅達園帝釋天之遊園如大偉力王巧整酒宴場所妃見而起遊戲沙羅林之念大臣等送妃乘駕入沙羅林妃如王者往沙羅樹下思捉沙羅樹枝樹之一枝如蘆莖加溫而垂下接近妃手之方妃伸手捉枝同時催動胎氣諸人以幕圍妃而退其場妃捉娑羅之枝立而生産爾時四大梵天具清淨心手持金網接受菩薩立佛母之前曰貴妃喜慶産生具大偉力之兒其他之生類出胎之時有可厭不淨污物菩薩不然恰如説法者下座如人之下階擴展兩手兩足於母胎中無絲毫不淨之物清淨潔白如伽師絹布包摩尼寶光耀出胎為向菩薩及佛母表尊敬之意由空中降來二脈水流洗浴菩薩及母體增強氣力張金網於梵天之手四大天王接受佳兆觸柔羚羊之皮所製衣服由彼等天人之手以人間黃麻之褥接受菩薩菩薩由人間之手下而立於大地之上眺望東方數千大世界如一庭苑於此天人人間皆捧香花之類供養曰大士此處無等汝者無任何勝汝者如是菩薩遍觀四方四隅上下十方不見能等己者彼知此乃最好方位菩薩大股邁行七步梵天翳以白傘善時分天執犁毛拂子其他諸天人等持王者標示之其他品物相隨而來彼行七步止立莊嚴發聲為獅子吼曰我為世界第一人者三生之發語菩薩於三生中出母胎時發聲即是摩訶沙陀大藥之時益參陀羅一切度之時及此生三者大藥生時即由其母生之同時帝釋天王來以旃檀樹心握其手中而去彼菩薩乃握拳出生其母問曰彼握何而來答曰母親此乃奧沙陀藥也因如是握藥而來故名奧沙陀陀羅藥王子取其藥投入甕中來此之盲聾諸人以藥愈一切諸疾諸人採其語謂此藥偉大此藥偉大彼乃得名為摩訶沙陀大藥一切度之生出母胎時擴展右手續謂母曰母親家有何物作為施捨母曰汝生於有寶之家以兒之手置於自己掌上使其抱持千兩之囊次於此生如前所述菩薩為獅子吼如菩薩三生由母胎出時發聲七者同時出現菩薩出生時一如宿胎內時現三十二種前兆恰值菩薩於藍毗尼園出生時羅睺羅之母妃闡那大臣迦留陀夷大臣乾陟馬王大菩提樹藏寶之四瓶亦出現於世此四瓶中之一為伽烏達一為半由旬一為三伽烏達一為一由旬以上七者同時出現至此迦毗羅衛與天臂兩城住民等伴隨菩薩還都阿私陀仙同日三十三天天人之群振衣嬉戲皆大歡喜咸謂迦毗羅衛城淨飯大王之王子出生此王子將坐於菩提樹下成佛爾時出入淨飯大王宮中得八定之黑執天行者阿私陀仙飯食終了為晝休登上三十三天坐於彼處休息見此天人等問曰汝等何故如是喜戲耶豫願聞其理由天人等答曰吾友淨飯大王出生王子將坐菩提道場成佛轉大法輪豫等仰佛無限威力能聞法門是以如是歡喜行者聞彼等語急由天人世界降下入於王宮著座言曰大王聞汝生王子請與拜見王命伴來著飾王子向行者禮拜然行者轉菩薩之足附於其結髮之上蓋於此生菩薩禮拜無非是好事若不知者以菩薩之頭據於行者之足下則其人之頭裂為七瓣行者自思豫不可毀滅自身即由座起立向菩薩合掌王面見此不思議我不覺亦向自己王子禮拜行者記憶過去四十劫與未來四十劫之八十劫間事見菩薩具有完全相好乃自思惟彼成佛耶或不成佛耶由鑽研得知彼必將成佛彼自思而微笑此誠不可思議然後彼又鑽研豫自身能否見彼成佛彼知豫於中途死去不能得見矣縱有佛百人千人亦不能使豫開悟豫將出生於無色界天彼思而泣曰不得見此不可思議之人成佛豫之損失實莫大焉諸人見之而問曰尊者先則微笑次則啜泣尊師豫等之王子有何障礙耶行者王子無他障礙必將成佛諸人何故汝啜泣耶行者答曰豫不能見王子成佛豫之損失實莫大焉豫因憂自己之事而泣那拉伽少年之出家爾後彼思豫之親族有否何人能見王子成佛反復鑽研思及其甥那拉伽少年於是彼往妹家云行者汝子那拉伽現在何處妹兄長在宅中行者喚彼前來來至己所彼向那拉伽云少年淨飯大王宮中王子出生彼為佛種子自今經三十五年彼將成佛汝將能遇彼汝由今日即可出家生於八億七千萬寶家之少年思惟伯父命豫出家非不利豫彼立即由庫中取來黃色衣物持土製之鉢剃除鬚髮身纏黃衣自謂豫之出家當世界最殊勝者乃向菩薩之方合掌五體投地禮拜納鉢袋中肩負入雪山修沙門道彼於如來開悟成最上覺時前來佛為説那拉伽道那拉伽經彼聞法後再入雪山得阿羅漢果履行尊道唯護生命七個月後立於近黃金山之一處入無餘涅槃相好占觀於第五日王洗菩薩之頭行命名式於王宮塗四種香粉第五於地上撒炒穀物及種種花炊煮不混他物之乳糜招請通三吠陀婆羅門一百八名坐於宮中共享以美味之食表大尊敬之意使觀王子相好與其成就爾時諸人中二七拉瑪與達伽拉迦那曼提昆丹彌普伽須雅瑪須達其時通六分此八婆羅門唱誦諸咒文或佛或轉輪王只此八人婆羅門觀菩薩相好菩薩宿胎中時此等人曾占夢兆其中七人伸二指而為豫言彼等謂彼王子相好如居家為轉輪王如出家者則將成佛彼等無保留地説明轉輪王之光榮然此中最年少青年姓憍陳如彼見菩薩具完全最優相好彼謂王子無居家之理由彼確將除煩惱蓋而成佛故彼只伸一指豫言唯一之道彼於過去佛所曾立誓願為達最後之生者故其智慧勝他七人故謂具此相好不應居家王子必將成佛彼認此唯一之道故伸一指如是豫言五群比丘爾後婆羅門等各各還家呼其子等近前謂曰吾子豫已年老淨飯大王王子得一切智豫等能否拜不得而知王子如遂行一切智時汝等應入其教而出家此七人盡所生之生命後隨業生於應生之處唯憍陳如青年一人健在菩薩為求菩提敢行大出家後次第來此優羅頻羅地方彼生是念此處為良家子具精勤志者精進努力恰好之地當彼定居其處之時聞大人已出家彼往婆羅門子等之所謂曰悉達太子出家彼必成佛若汝等之父平安無事彼等應今日棄家出家若汝等亦望亦請出離豫將隨彼出家然彼等志不相同三人不願捨離其他四人則以憍陳如婆羅門為長而出家此五人成為五群之長老王子見何而出家耶爾時王問豫之王子見何而出家耶臣有四前兆王彼為云何臣見老人病人死人出家者王曰自今以後此等之物不許近豫王子之側豫之王子無成佛之必要豫思欲見豫之王子握有一萬二千屬島所圍四大洲之統治權遂行政治四周為三十六由旬群衆所圍繞步行空中王為遮蔽此四種前兆之諸人出現於王子目前於四方每一伽烏達設置岡哨當日有同族八萬戶人集於祝場每戶各捧獻一子向王申告曰無論王子成佛或為王豫等各獻一子若成佛則為剎帝利族出家之沙門敬侍外出若為王則為剎帝利族身之諸子敬侍外出王擇容貌殊勝無稍缺點之婦人隨侍菩薩菩薩受無數宮人侍奉於無上榮華富貴中生長耕種之式某日王行耕種之式是日宮中飾如天人之宮殿僕役之輩皆著新衣以香料花環之類飾身集於王宮之內王於工作場所結鋤千架是日於百八架中除一架外其他牛與網繩皆以銀飾王手執鋤飾赤色金牛角網繩刺釘皆以金飾王有衆多侍臣相隨與王子相伴而出於工作場所有一閻浮大樹下設王子臥榻翳以上鏤金星之傘蓋周張縵幕分置警衛王著各類之飾大臣等相隨往行鋤式場所而去於此處王取金鋤大臣等取百八架中少一架之銀鋤而農夫等取其他之鋤一同取鋤各處耕鋤而行王由此至彼由彼來此於是王感身大榮華樹影之奇瑞坐於菩薩周圍之婦人等由幕中外出而言曰豫等往觀大王雄風菩薩環視各處覺察無人急起盤足而坐調出息入息入第一禪定婦人等為往來搬運軟硬食物之間歸來稍遲見他之樹影稍動而菩薩之樹影描繪成圓形而靜止婦人等思樹下唯王子一人急還而開幕入內觀之見菩薩盤足坐於臥榻之上見其樹影之不思議急往王處申述大王陛下王子靜坐他樹之影移動唯閻浮樹之影圓形而靜止王急來其處見此之不思議王曰王子豫將再度禮拜汝身王向王子禮拜三時殿爾後次第生長菩薩年十六時王為菩薩建三宮殿適於三時一為九階一為七階一為五階四萬舞姬侍奉菩薩菩薩如天王受天女之群所圍繞為美飾之舞姬所包圍不交男子奏樂為樂身感莫大榮華應時住入宮殿之一以羅睺羅之母為第一妃競技王子如感大榮華度日之間某日同族集會之中發出斯話悉達耽於遊樂渡時未習任何一藝如有戰爭將如之何王喚菩薩近前王王子同族申言悉達無習任何一藝耽於遊樂渡時汝思如何始為相應王子大王豫無習藝必要為示豫藝請向都中擊大鼓宣告自今七日集合同族之人請觀豫藝王如其言而行菩薩集合神電射手及斷髮射手彼於多人之中向同族之人顯示為他之弓箭手所不能學之十二種技藝此事如薩拉般伽本生本生談第五二二中所言於是同族之人始不懷疑四門出遊爾後某日菩薩思欲往遊苑呼御者近前命備車馬御者尊命準備高價華麗之車飾各類之飾由國王所用之四頭辛度産白蓮瓣色之駿馬駕駛御者準備車馬妥當回報菩薩菩薩似於天人宮殿乘車向遊苑而去天人等曰悉達太子成正覺時近應示前兆一天子化為老朽之人齒落髮白面皺體僂携杖戰顫此唯菩薩與御者得見菩薩如大本經所述問御者曰友此為何人此人毛髮不同他人菩薩聞御者答後心受感動自思生者老衰隨至生實為禍菩薩歸還登上宮殿王向御者問曰豫之王子何故早歸御者大王彼見年老之人是故早歸王子見年老之人將欲出家王汝等何故違吾命令舞姬用心使樂榮華出家之心將不生起王於四方每半由旬增置警衛爾後某日菩薩如前往苑中遊覽天人等作出病人令王子見之王子問同以前心受感動還宮升殿王問亦同如上指示更於四方每三伽偉陀增置警衛爾後某日菩薩同前出往苑中天人等使見死人彼問同以前心受感動還宮升殿王問亦同前如上指示於四方每一由旬增置警衛爾後某日菩薩又往苑中天人同前使見整然上下著衣沙門彼問御者友此為何人爾時世間無佛出世御者不知出家及出家之功德但依天人威力御者答曰此為出家之人並説明出家之功德菩薩心為出家所引曳其日即往苑中據長部經典之誦者謂此四前兆均為一日中所見最後之莊飾於其處菩薩為日中遊戲浴於王用蓮池之中日落之時王子調適身飾坐於磐石座上隨侍之人著各種衣服手執各種飾物花環香塗料等四面圍繞王子而立與此同一瞬間帝釋天王之座發生暖昧帝釋天王鑽研何人將使豫由座上搖落彼知此為菩薩裝飾之時帝釋呼毗首羯磨云友毗首羯磨悉達太子今日夜半為大出家而出門今為王子最後之裝飾汝往苑中以天人之飾裝飾大士彼遵帝釋之命以天人威力瞬間即往其處化為王子理髮師之狀由理髮師之手取來卷布捲纏菩薩之頭菩薩以手觸之知非人乃天子一度捲纏則須一千幅見來如頭被中之寶玉二度纏捲又須一千幅十度則須一萬幅布菩薩頭小如何須此多布實不可思其中最大纏捲則如奢摩蔓草之花其他則大如屈俊巴伽花菩薩之頭則如以蓮花絲擴散為貴雅伽花狀菩薩以各類裝飾飾身音樂師皆各示其伎倆婆羅門等以勝利慶喜等語表示敬意詩人樂師案陀羅人以種種賀辭讚辭表示敬意菩薩則乘坐以各種裝飾所飾之華麗馬車羅睺羅之誕生此時羅睺羅之母王子之妃生産淨飯大王遣使往告菩薩曰向豫王子菩薩傳豫之喜慶菩薩聞之曰邪障羅睺羅出為我之繫縛王問曰豫之王子是何言哉聞其語王今後豫孫命名為羅睺羅王子菩薩乘華麗馬車具大光榮而進入人心極端喜慶之華美莊嚴都中大出家時有剎帝利族幼女枳薩憍曇彌升登華美樓閣高台之上見於都中巡行菩薩之尊姿起喜悅之情唱如次喜悅之偈二七一彼母實有幸彼父實有幸有斯夫之婦實為真有幸菩薩聞此而自思此婦人作如是語到底人對人皆作如是看法則母心父心妻心皆歸寂靜然如何滅者心實真正寂靜耶菩薩之心已脫離煩惱故如是思彼思貪欲之火消時能得安靜瞋恚之火愚癡之火消時能得安靜慢與邪見等之一切煩惱苦痛消時能得安靜此婦人使豫得聞善事豫為求涅槃而作此遊行今日此日豫不能不捨棄家庭生活為離家出家之身求取涅槃豫將向此婦人當為師而贈其物彼由首取下價值十萬兩之真珠首飾贈與枳薩憍曇彌彼婦人自思悉達太子寄豫思慕之情賜豫贈物彼女起喜悅之心歌舞姬之醜態菩薩於大尊嚴華美之中返還自己宮中臥於寢殿於是立即有如天女之姿婦女等以各類之飾飾身熟練舞蹈音樂執各種樂器圍繞菩薩開始舞蹈音樂歌唱以樂菩薩之心菩薩之心已脫離煩惱對舞蹈等絲毫不感興趣不久入眠婦人等亦自思彼已成眠豫等徒勞何為於是各擲所持樂器而臥味香之油燈寂然燃燒經時不久菩薩醒覺於臥榻上盤足趺坐眺望彼婦人等擲出樂器之臥相或流唾液口沫污染四肢或軋齒鼾聲或囈語張口或敞胸懷現怖厭相菩薩見婦人等之醜態出離諸欲之念愈益迫切而在裝飾如帝釋天宮菩薩所居之大高臺上宛如縱橫遍地無數刺殺之死尸傾躓之墓場三界如同被火之家此實為禍此實悲慘菩薩口唱感嘆之偈一心傾向出家出城菩薩決心自思豫今必須遂願出家彼由臥榻起立行至門前問曰在其處者誰敷席枕頭而臥之車匿答曰尊王子殿下豫為車匿王子豫今日思欲遂行為大出家汝且去備馬車匿謹尊命令彼持馬具往馬廄而去燃香油燈見犍陟馬王立於素馨花葉棚蓋之下彼思今日須備此馬於是附馬具於犍陟身上馬知今日所附之堅固馬具與平時出遊御苑所附之馬具不同豫之王子今日將遂行心願為大出家馬心滿足而高嘶其聲震動擴往都中但天人等遮蔽其音不使他人得聞菩薩於送車匿出後思欲見幼兒一面解趺坐而起立赴羅睺羅母居之處輕開室門於此瞬間見室中香油燈火孤獨點燃羅睺羅之母臥於素馨茉莉諸花大量散撒之床上以手置幼兒之頭上而眠菩薩置足於地席之上而立彼見此自思若豫退妃之手抱兒妃必醒覺如是則豫行將受阻礙待豫成佛之後再來相會於是彼由宮殿下來依本生談之釋義書中所述羅睺羅王子生將七日而他之釋義書中則未有記載是故不作此解菩薩由宮殿下來來至馬側謂曰犍陟今日汝須伴豫行一夜之途程如是豫藉汝力成佛將度一切人天世界彼作是語乘上犍陟之背犍陟由首到尾體長十八肘高亦與此相配疾馳力強全身純白如洗美麗硨磲之貝此馬嘶聲及叩蹄之音響徹都中是故天人等以自己之威力使其聲不為任何人所聞以蔽其馬嘶聲馬腳每一著地則以掌置於其下菩薩坐於馬背中央車匿則捉曳馬尾夜半來至大門之所爾時王使菩薩於任何時皆不能開門外出置其門之兩扉如開其一須用千人之力菩薩有大力以象計算有百億象之力以人計算為千億人之力於是菩薩思惟若門不開則豫乘犍陟背上車匿捉尾一同由犍陟支持兩足可飛越高十八肘之城壁車匿思惟如門不開豫使王子乘豫肩上以右手抱犍陟之腹腋下靠緊馬背飛出城壁爾時犍陟亦思若門不開王子乘豫背上車匿捉豫之尾向上抬起隨豫飛越城壁然若城門任何時皆不開放此三者之思考將以其中任何一種以達目的但棲於門傍之天人使門開啓此一瞬間魔王思使菩薩歸還彼來立於空中曰汝不可行自今七日出現輪寶汝將為一萬二千小島圍繞四大洲之王汝請歸還菩薩汝為何人魔王豫乃婆沙婆天菩薩豫知輪寶出現然豫不思王位豫將成鳴響一萬世界之佛魔王曰若是此後汝抱貪欲之念瞋恚之念危害之念時豫將前來捉汝為探尋菩薩之過失彼將形影不離隨定菩薩菩薩唾棄歸己手中轉輪王位如棄敝屣毫不吝惜以大光榮離都於阿沙陀月滿月之夜月在天稱之座時出行但心思再一次得見故都當菩薩唯起此心時大地恰如作破裂語曰大士汝不可向後回觀如陶工之回車菩薩站立向都之方向眺望指示此地應為犍陟建紀念之祠犍陟使自己向當行之道具大光榮大尊嚴與具華美前途而去天人之奉送據傳此時天人等於前後左右各揭舉六萬之炬火其他天人等於大世界之邊緣亦揭舉無量無數之炬火又其他天人等龍及金翅鳥等亦捧獻天上之香花環粉香薰香隨行巴利奢他伽花恰如出濃雲降大雨時之狀降下充滿天空無有間隙天上升起歌聲六十種樂器及六百八十萬樂器由四方鳴響宛如海中雲雨轟鳴如由犍陀羅中大海之起嘯音阿奴摩河如是向尊嚴華美之途前進之菩薩於一夜之間通過三個王國到達遠隔三十由旬之阿奴摩常滿河時然馬不能前進耶否非不能前行也此馬恰如踏據於軸為中心之車輪邊緣回旋於一大世界之端而於朝食之前還來餐食自己調煮之食物此時天人龍金翅鳥及其他諸天由空中撒散之妙香花環積達至股上之高菩薩等必須由此中脫出以將絆腳之好香花環撕裂故前進遲緩只向前行三十由旬途程於是菩薩立於河畔尋問車匿菩薩此河為何名車匿此名阿奴摩河菩薩云豫之出家亦將為阿努摩非卑尊勝菩薩以踵叩馬而為指示馬於是飛過幅寬八烏薩巴河之對岸而立落飾菩薩由馬背下立於廣擴如銀葉砂之河原呼車匿菩薩云友車匿汝持豫之瓔珞與犍陟歸去豫往出家之處車匿言王子殿下豫亦出家菩薩汝不能出家可歸去菩薩三度勸退使其受瓔珞與犍陟而自思惟豫之髮髻不與沙門相應然菩薩無適於切斷毛髮之物彼思以刀斷之於是右手執刀左手握被頭髻而斷之毛髮存留二指右捲附著頭上毛髮之長度至菩薩一生皆為如是鬚亦與之配合後髮及鬚均不剃除菩薩握斷下之頭髻投向空中祝曰若豫成佛止於空中若不成佛落於地上於是其髻之摩尼寶珠頭捲止於空中一由旬處帝釋天王以天眼見此將其納入長一由旬之寶函之中安置於三十三天世界髻寶珠之祠內二七二好香薰頭纏菩薩用刀斷投彼向空中世間第一人帝釋具千眼垂頭見寶髻納入金函中修祠為供奉迦提伽羅之友情菩薩復自思惟此伽尸國産之衣服豫為沙門亦不相應於是有迦葉佛時菩薩之舊友迦提伽羅瓦工大梵天思惟自前一佛至今一佛之間相續不朽誠篤之友情彼謂今日豫之友人為大出家而來豫將為友人持去沙門之用具二七三三件法衣與一鉢剃刀與針及腰帶加漉水布共八種專心觀行比丘用犍陟之悲死於是彼持此八種沙門之道具來獻菩薩身著阿羅漢之標章纏著最上之出家服時向車匿曰車匿汝向父王傳豫之言謂豫身平安無事車匿禮拜菩薩右繞為禮而去犍陟聞菩薩與車匿之語立而自思豫二度不能再見王子矣彼次第行進不見菩薩之姿悲痛不堪胸張裂而死出生三十三天為犍陟天人車匿與王子告別乃唯一重之悲痛今為犍陟之死更為二重之悲痛所壓彼於悲泣中入於都中菩薩入王舍城如是菩薩出家其地有名阿奴夷之菴婆樹林彼於其處過七日間一日行路三十由旬入王舍城菩薩入都次第行乞都中之人拜見菩薩之姿相以為護財狂象入王舍城如阿修羅王入天宮城中起大混亂吏人等往王宮告王曰大王此人在都中行乞彼為天人耶為人耶為龍耶為金翅鳥耶抑為其他何物豫等不知王立於宮殿之高臺見大士而起希有之感命吏人曰汝等前往察看彼若為怪物出都即告消失若為龍則潛往大地若為人則將食其所得之食大士持種種食物混合一起歸來彼知此乃充分保豫生命之物彼由進入時通過之門而出往般荼婆山之蔭涼處向東方而坐開始進食然菩薩聞而反胃食物欲由口中吐出為彼可厭之食物所煩惱此等食物為菩薩此生所未見菩薩對此自誡曰悉達汝生於易得飲食之家經三年食香好米飯佐以美味為副食汝見一人著襤褸衣而思惟何時豫將為如是之姿相行乞而食豫將有如是之時機耶如是思考而出家而今竟如是是何故耶彼如是自誡於是乃從容進食吏人等窺見其狀前往告王王聞使者言急出都往菩薩處敬服其殊勝威儀王願讓渡一切主權菩薩曰豫不望物質之欲煩惱之欲豫為求最上菩提而出家王雖盡一切語相勸終未得其承諾王曰汝確將成佛汝如成佛請先來我國以上言其概略詳情如出家經與釋義書中所見之出家故事中有眼者出家之文可知兩仙人菩薩與應諾王次第遊行訪阿羅邏迦蘭仙與優陀羅羅摩子仙得修禪定彼知此非菩提之道彼對其禪定並不用力彼於人天世界為示自己之力思勤修大精進赴優樓頻羅彼謂此處實為心境愈快之場所於是安住其地入大精進五仙人以憍陳如為首之五出家者於大小村邑王城等處行乞而於此處與菩薩相遇其後六年於菩薩大精進期間彼等思惟彼今將成佛彼今將成佛掃除靜室奉仕其他大小勤務為菩薩之從僕苦行菩薩思為極端之苦行日惟攝食一粒之胡麻與米經過一日或全部斷食天人等欲由其毛孔注入滋養液但被拒絶因如是斷食菩薩極度瘦細金色之身變為黑色三十二種大人之相好亦隱而不現某時觀斷息禪大為痛苦所惱失去意識倒臥於經行處之地天人等中有謂沙門瞿曇已死有謂此為阿羅漢之習性天人等其中謂菩薩已死者往淨飯大王之處云汝之王子已死大王豫之王子成佛而死耶抑未成佛而死耶天人彼未成佛彼倒臥於大精進場所而亡王聞此語加以拒斥王曰豫未置信豫之王子未得菩提而死斷無此事王何故不豫置信因王禮拜黑執天行者之日不思議見閻浮樹下靜坐時之奇瑞故當菩薩恢復意識後起立天人等來王之處告知曰大王汝之王子平安無事王曰豫固知王子之不死也苦行之放棄菩薩六年之苦行如空中樓閣彼知此苦行非菩提之道為求攝取滋養食物彼往大小邑行乞得食於是菩薩之三十二種大人相好復現原狀身體亦成金色五群比丘等曰彼為六年苦行不獲一切智今往村里行乞為得滋養食物如此之人如何得成就一切智彼趣豪奢放棄精勤吾等對彼具特別之期待恰如大旱之望雲霓而今又有何用於是捨棄大士各攜衣鉢往十八由旬外之道入仙人墮處修行乳糜供養爾時優樓頻螺地方之將軍村於賽那尼長者之家有名善生之成年少女彼女向一大榕樹祈願若豫嫁入同血統之良家初胎得男每年豫將以十萬兩金供養彼女作如是之祈願而正值大士苦行滿六年時彼女思於毗舍佉月滿月之日捧獻供物先以千頭牝牛放牧於杖蜜林中其乳使五百頭牝牛飲之而以五百頭牝牛之乳使八頭牝牛飲之如是最後所得之乳濃甘而滋養分多行所謂乳之轉寄於毗舍佉月滿月之日彼女晨起思欲捧獻供物天明即起出搾八頭牝牛之乳不使犢等行於牝牛乳房之傍而置新乳器於乳房之側而乳汁自動流入器中彼女見此不思議事即親手取乳入新器中親自焚火開始炊煮其乳炊煮時多起乳泡向右回旋一滴亦不外落竈內亦不升煙此時有四護世天子前來於竈上輪流護守大梵天翳以大傘帝釋天持炬火前來焚火天人等以天人之威力恰如以棒搾蜂巢之蜜將二萬島歟圍繞之四大洲中天人與人間必要之營養物集取前來投入其中天人等時時將此營養之物少量投入而佛成就菩提之日與入於涅槃之日則全部投入鍋中善生於此一日中見於其身之周圍出現種種不思議事彼告其下婢芬那滿曰芬那豫等之神今日甚喜豫今見此前所未有之不思議事汝可急往神之住處探視下婢謹尊主命下婢應善生之語急來樹側菩薩於前夜得五大夢彼自熟思今日必將成佛彼下決心於天明時整備行裝待托鉢時至晨起即往樹下趺坐身光照耀樹之全體芬那來至其處見坐於樹下關心東方世界之菩薩身體放出光明由樹降下親來接受供物坐於此處彼女狂喜急歸向善生告知其事善生聞語喜悅曰自今日以後汝即為豫之長女於是以與少女相應之飾品悉數與之而因菩薩成佛之日須得價值十萬兩之金鉢善生起意以乳粥盛於金鉢之內於是使芬那持金鉢來思盛乳粥向釜中窺探乳粥恰如水中之蓮瓣悉數移轉鉢中盛滿鉢內善生以他之金鉢覆於鉢上上圍捲布以一切飾飾身置其鉢於自己頭上以大威神力往榕樹之下見菩薩而大喜思菩薩為樹神一見之下屈身步行取頭上之器放置而開啓攜馨香之花所浸之水入於金瓶往菩薩之處而立瓦工大梵天所獻之土鉢前次始終未離菩薩之側然此瞬間忽然不見菩薩因不見土鉢伸右手受水善生以盛乳粥之金鉢一同置於大士手上大士觀見善生善生見狀禮拜菩薩而言曰尊者請受豫所捧獻之物請如願發心如豫之得適心願尊者亦得成就心願語畢置價值十萬兩黃金之鉢如棄樹之朽葉不顧而去水浴於是菩薩由自己坐處起立右繞榕樹後攜鉢往尼連禪河之岸彼處有數十萬諸大菩薩於達上菩提之日下往河中而為水浴之善住水浴場菩薩亦於岸邊置鉢下往水浴場而為水浴身著阿羅漢之標章亦即代表數十萬諸佛之衣服向東方而坐將以乳粥製成如帶核之熟多羅果大小四十九個團子少水而甘悉數食竟此為菩薩於成佛七七日間於菩提道場之食物此七七日間無乳粥以外之食物亦無水浴洗面及大小便惟以定樂向果之樂度日逆流之奇迹如是食乳粥畢取金鉢云若能今日成佛此鉢逆流而止若不能成佛則順流而下語畢投鉢鉢斷水流往河之中央如加速之疾馬逆流上行八十肘於一曲角處沉沒至迦羅時龍王之宮殿與過去世三佛所用之鉢相撞發鏗鳴之音而止於最下迦羅龍王聞其音謂昨日一人之佛出世今日一人之出世佛彼述詩數百句表示讚意龍王由大地升空至滿一由旬三伽烏達量時則昨日與今日相同菩薩於河岸滿開之沙羅樹林中過午而至黃昏花落之時由天人等所飾之幅寬八烏薩巴道路上起立如獅子之狀赴向菩提樹之方龍夜叉金翅鳥及其他神衆捧天上香花響亘天上之音樂一萬世界以一色之香一色之花環發一色喝采之聲四方觀察爾時有刈草之男吉祥由對方而來見大士之狀已知其故獻草八攫菩薩受草登上菩提道場由南向北而立瞬時南之大世界思將下沉至無間地獄東之大世界上達至有頂天菩薩自思此非應成上菩提之處乃右繞往西方向東方而立於是西之大世界思將下沉至無間地獄東之大世界上達至有頂天每立之處如據軸為臺足踏大車輪端時之狀大地即向一方傾斜菩薩自思此亦非應成上菩提之處乃右繞往北方向南方而立於是北方之世界思將下沉至無間地獄而南方之大世界上達至有頂天菩薩自思此亦非應成上菩提之處乃右繞往東方向西方而立東方乃一切諸佛盤足趺坐之處此處無有震搖大士知此處不為一切諸佛所棄又無震動之處應可打破煩惱之牢籠菩薩取吉祥所獻之草振抖其頭立即成一十四肘之座此座為繪工陶工難以寫製之堅固菩薩之決心菩薩於菩提樹幹前面向東方以如金剛堅固之心假令我之皮膚筋骨全身血肉乾枯我如不成正覺誓不解此踟趺之坐彼坐於雷擊而不壞不動之金剛座上惡魔之來襲爾時魔羅天子曰悉達太子欲出豫之領域豫能忍受其出耶彼往魔軍之處告知此事魔音轟動率同魔軍而來魔軍延續於魔王前方亘十二由旬左右十二由旬後方至大世界之端吼叫之聲至上方九由旬之高響徹一千由旬之大地為崩裂之狀魔羅天子騎高百五十由旬之奇梨爾迦羅山帶象生有千手持各種武器他之魔王眷屬每人各持不同武器具與普通之人不同面貌之怪物等以壓倒之勢奔向菩薩另一方面一萬世界之天人等向大士讚歌帝釋天吹上勝之螺貝螺貝長百二十肘一次吹鳴響徹四月間而後止摩河迦羅龍王更作百句讚詩大梵天王翳白傘而立當魔軍漸近菩提道場時天人一人亦難立足面向菩薩當場逃去迦羅龍王潛入大地入曼蟄利迦龍之五百由旬宮殿之內以雙手掩面而臥帝釋天背負上勝之螺貝立於大世界之邊緣大梵天置大白傘於大世界之端還歸梵天世界而去天人無一人得能立足大士唯一人獨坐魔王語其眷屬曰汝等大衆淨飯之子悉達非比他人吾等不能正面作戰須由後方進攻大士環顧三方見天人悉皆逃去其處已空見魔軍再由北方推進而來如是衆多魔軍為豫一人而奮戰努力豫之父母兄弟及親族無一人在此但十波羅蜜為豫長養之侍者豫將以波羅蜜為楯振波羅蜜之刀擊退魔軍於是靜坐回想十波羅蜜九嵐魔羅天子思惟豫將以九嵐攻擊悉達於是大起旋風瞬時由東及其方位起風暴風具有破壞半由旬二三由旬之山峰森林之灌木喬木連根拔起及粉碎大小村邑之威力而依大士之功德威力與以減殺風達菩薩身旁法衣之邊皆不能動於是魔王思惟豫將以水壓倒殺之於是天將大雨依其威力起千層百層種種異狀之雲降雨之勢破壞大地大洪水達到森林樹木之上方但不能使大士之衣有露滴之濕繼之又起岩石之雨大山之峰揚起煙焰飛來空中及達菩薩身邊則均變為天上之花毬繼之又起亂擊之雨單刃雙刃之刀槍劍戰揚煙舉焰飛舞空中而來及達菩薩身邊化為天上之花繼之又起熱炭之雨如肉色花之炭火由空中飛來落於菩薩足下化為天上之花繼之又起熱灰之雨非常熾熱火色之灰由空中飛來落於菩薩足下分散成為旃檀粉末繼之又起砂雨揚起甚微細砂粒煙立揚焰由空中飛來落於菩薩足下化為天上之花繼之又起泥雨其泥土揚起煙焰飛來空中但落於菩薩足下化為天上之塗香於是最後魔王思惟豫將以此嚇走悉達於是起四種要件地水火風之大黑暗但達至菩薩身邊則如被太陽光所征服而黑暗消失如是魔王雖以此風雨石亂擊熱炭熱灰砂泥土暗黑之雨仍不能趕走菩薩魔王曰汝等何故朦朧不動向前捕殺將其趕走彼命令眷屬自乘於奇梨爾迦羅山帶象之背上執輪盤接近菩薩曰悉達速由座起立此非汝之物乃我之物大士聞其語云汝不遂行十種波羅蜜亦不果行十種最上波羅蜜十種近小波羅蜜五種大施種種利益行利世行菩提行故此跏趺座非汝之物乃我之物焦慮之魔王怒不可遏向大士投出輪盤但此輪盤化為花蓋止於菩薩回想十波羅蜜之頭上附以利刃之輪盤若於其他場所經彼忿怒投出則雖粗大之石柱亦將如竹筍之被擊碎然今對菩薩投出則如投花蓋而止魔王眷屬皆曰此次看彼將由座起立而逃於是執一大石山投出然在菩薩回想十波羅蜜之前如一花毬滾落於地上而立於大世界邊緣諸天人等伸首搖頭尋思眺望此極美之悉達太子非將喪失身體耶太子將如何處置菩薩曰昔日果行波羅蜜之諸菩薩成就上菩提之日所得此座今乃為我之物彼向魔王問云魔王何人證明汝有所施魔王云我有如是多數證人彼向魔眷伸手爾時魔之眷屬齊聲叫喚豫為證人豫為證人其音聲如震裂大地之狀於是魔王向大士云汝施施物時之證人為誰大士汝施施物時之證人為有心識之物然我於此處無任何有心識之證人我於他生所施之施物暫置不論我生為一切度時曾行七百遍之大施彼時之證人乃此不具心識之厚載之大地大士由法衣中伸右手指向大地云豫生為一切度行七百遍之大施時之證人為汝耶抑非汝耶大地曰豫為爾時汝之證人於是出百之音聲千之音聲訥喊壓倒魔軍魔軍退散如是大士向自身自語云悉達汝為大施最上之施當彼回憶一切度之施時高百五十由旬之奇梨爾迦羅象屈膝魔王眷屬棄其頭飾與所著之衣服紛紛向四面八方逃散於是天人之群見魔軍逃去曰魔王已敗悉達太子勝矣豫等捧獻勝利之物龍誘龍至金翅鳥誘金翅鳥天人誘天人梵天誘梵天手執香花來至大士菩提座前當彼等來至其處時其他一萬大世界之天人等獻花環香塗香而唱種種之讚歌曰二七四祥瑞者佛得勝利惡害魔王今敗北菩提道場龍群悅爾時齊呼勝大仙二七五祥瑞者佛得勝利惡害魔王今敗北菩提道場金翅鳥爾時齊呼勝大仙二七六祥瑞者佛得勝利惡害魔王今敗北菩提道場天人悅爾時齊呼勝人仙二七七祥瑞者佛得勝利惡害魔王今敗北菩提道場梵天悅爾時齊呼勝大仙其他一萬大世界之天人等獻花環香塗香歌種種讚歌而立大悟如是於太陽尚未西傾大士擊退魔軍恰如表示敬意菩提樹之幼芽及赤珊瑚色之葉垂於大士法衣之上彼於初夜獲宿住智中夜清淨天眼後夜為緣起觀當菩薩思量十二句緣起之樣式前後及順逆時一萬世界之海端起十二遍震動於太陽東升之時一萬世界齊聲喚出菩薩獲一切智莊嚴一萬之世界東之大世界端揭舉幢幡之光達到西之大世界端西之大世界端揭舉者達東之大世界端北之大世界端揭舉者達南之大世界端南大世界之端揭舉者達北之大世界端大地平面上揭舉幢幡之光達到梵天梵天幢幡之光達到大地平面之上一萬大世界中諸樹開花結實結實諸樹頗受負擔果實之纍莖放莖之蓮花枝放枝之蓮花蔓放蔓之蓮花空中垂下開放之蓮花地上破磐石向上生七莖之蓮花環顧一萬世界如投上花毬之狀或如地上擴展花之敷物大世界內部八千由旬之中間為地獄太陽之光不能照明而今則為唯一之光明所照深八萬四千由旬大海之水變甘河水止流生盲之人見色聾者聞音跛者能行枷鎖自行脫落如是以無限與莊嚴表示敬意於出現種種不思議中菩薩獲一切智唱一切諸佛必唱之感動之頌二七八求屋舍工人而此不得見多生驅輪回輾轉生死苦二七九屋工今得見不再構家屋汝之桷材破棟梁亦被毀汝心至滅度諸愛達滅盡如此由兜率天至此方菩提道場獲一切智間之話應知此為不遠因緣談話三近因緣談近因緣談為世尊在舍衛城之祗園給孤獨長者之林園毗舍離大林之重閣講堂及佛在各處所發生之事謂之近因緣談今由開始言之如次所述初七日佛唱感動之偈而續坐起如是之心念豫為獲得此座經四阿僧祗十萬劫間輾轉輪回其間惟為獲得此座有割取盛飾之頭首與人之事有抉善塗黑藥之眼目裂心肉與人之事有似闍利王子那樣之男兒似罽拏延王女那樣之女兒似曼提妃那樣之妻為使用人受他人差遣之事是故我座為勝利之座優越之座我坐於此善熟思惟是故我尚不起座於是安住於數兆種之禪定七日之間唯續坐於其處此依大品所述時世尊享解脫之樂七日之間惟坐於一座第二七日天人等中有思案者悉達太子今日現有何所為之事執著於座上而不退佛知天人等之憂慮為與制止升於空中現二神通此與在菩提道場所現神通集合諸親族時所現神通在波吒之子等集合場所所現神通與犍咜菴羅樹下所現之二神通相同佛依此神通制止天人等之憂慮由其座稍移向東面向北方而立曰我實於此座上獲一切智菩薩目不稍瞬於此座上經過七日此座成為享得四阿僧祗十萬劫間遂行波羅蜜果之場所自此以來其處即被稱之為不瞬之祠第三七日爾後由此佛座及佛所立之場所間造經行處佛於此處由東向西延續經行此一寶經行處又渡過七日自此以來此處即被稱為寶經行之祠第四七日於第四七日間天人等在菩提樹之西北方設寶之家佛於此處結跏趺坐詳察導人入涅槃及一切物根源之阿毗曇藏經過七日其後通阿毗曇諸人為兩種説明即寶之家乃作寶之家或謂佛會得七論之處為寶之家此二説明於此處皆為相應兩者均可採用自此以來其處被稱之為寶家之祠第五七日如是於菩提樹附近經過四個七日於第五之七日菩薩由菩提樹下往牧羊榕樹之處彼於此處更為享探解脫法之樂而坐魔王喪膽此時魔羅天子喪膽坐於大道不斷思惟得十六原因於地上畫十六印記出城以來糾纏不絶探求其過失豫未見此人有任何惡事此人已超越豫之領域矣魔王曰豫未曾敢行如此人之布施波羅蜜是故豫與此人不能相同於是畫一印記又同樣豫未曾能如此人敢行持戒波羅蜜出離波羅蜜智慧波羅蜜精進波羅蜜堪忍波羅蜜真實波羅蜜決定波羅蜜慈波羅蜜捨波羅蜜是故豫不能與此人相同於是畫至第十之印記又豫未曾能如此人敢行十波羅蜜為得知此世彼世諸人感覺之特別智慧之條件是故豫不能與此人相同於是畫第十一之印記同樣又豫未曾能如此人敢行十波羅蜜為得知他人意志性向之特別智慧大慈定智雙神通智無礙智一切智之條件是故豫不能與此人相同於是畫至第十六印記如是彼依此等原因於大道畫十六印記而坐魔女之誘惑爾時魔王之三位少女名愛嫌惡染探尋而至不見父王究在何處彼等見彼憂悶發現地上之印記往父之側女父王何故苦惱父吾女此大沙門超出豫之領域經豫長久探求其過去不能見出此人之過失是故豫甚苦惱女若然父勿憂慮豫等誘惑伴其人來父吾女此人何人均難誘惑此人安住於不動信念女云父親豫等身為女人豫等以愛欲之索縛之伴彼前來父王勿憂彼等接近世尊謂曰沙門吾等願仕於膝下世尊並未關心其語亦未開眼見之彼於無上之蘊聚滅盡心解脫唯坐享孤寂之樂魔女等曰男人之心種類繁多某男愛幼女某男愛少女某男愛中年之女某男愛老年之女豫等須以種種手段誘惑於是作人間百種幼女之姿如幼女未産之女一度生産之女二度生産之女中年之女及老女等六次接近世尊曰沙門願仕於尊者之膝下世尊對之毫不關心因彼於無上蘊聚滅盡心解脫之故然有某學者曾謂佛見老女前來謂曰如此等人應使拔齒白頭於是咒念此乃誤謬之説因佛從不誦念咒語佛曰汝等速離何故為此徒勞無益之舉耶此乃對未離貪者面前所為之事如來之貪欲已盡瞋恚已盡愚癡已盡就佛自身斷絶煩惱之事在法句經佛陀品中曾唱如次二偈二八勝者不再勝此勝無人入無限無迹佛如何導此道二八一欲與愛之網無何處可尋無限無迹佛如何導此道魔女等曰父王向豫等所言是真實善逝乃為此世之阿羅漢為難以貪欲誘惑之人彼等為以上之言還往父所而去第六七日佛於其處經過七日次赴文鄰陀龍王處於其處過七日間因起大雨為防寒氣文鄰陀龍王以七盤己身奉佛圍捲使佛不受寒害如在溫室之人享解脫之樂渡過七日第七七日其後佛赴羅闍耶達那王處樹之所於此處享解脫之樂續坐七日之間至此七七日圓滿此七七日間佛無洗面大小便及食事唯依禪定之樂道之樂向果之樂而渡過佛於七七最終第四十九日坐於其處時浮起洗面之思帝釋天王持阿伽陀訶梨勒藥果來獻佛佛用之此依而通便帝釋天獻那伽曼樹之齒楊枝及洗面用水佛嚼齒楊枝及以阿耨達池之水洗面後又復坐於羅闍耶達那樹下帝梨富沙跋梨迦之供養爾時有帝梨富沙與跋梨迦二商人率五百輛車由鬱迦羅地方往中部地方之途中與之原有血緣親族之天人等阻止其車勸其獻食物與佛彼等攜炒麵與蜜丸赴佛之側曰尊師世尊請以慈心受豫等之食物佛於受乳粥之日已失其鉢彼思如來不能以手受物將如何可耶於是四大天王知佛之心以青石之寶珠所作之鉢由四方持來但為佛所拒復次以菜豆色之石作四鉢持來佛喜四天子之念受其四鉢加以重疊佛曰合而為一於是於鉢之邊緣殘留四印成一中形大之鉢佛以此高價之石所作之鉢受其食物佛於食後而述謝辭此兄弟之二商人等歸依佛法唱二歸依成為信士二人曰豫等思欲奉戴尊師賜與之物佛以右手撫摸己頂贈髮以為紀念二人捧髮還都後為佛髮建塔納入供養梵天勸請正等覺者其後赴阿闍波羅牧羊榕樹之所坐於榕樹之下佛坐其處思惟自證法之甚深微妙如諸佛所習稱此法我已證得云云而抱不欲為他人説法之心境於是娑婆世界之主大梵天思惟世將毀滅實莫此為甚此世實將毀滅自一萬世界之帝釋善侍善知足善化作他化自在及大梵諸天相伴往佛之所勸曰請尊師世尊説法請尊師世尊説法向佛請願説法初轉法輪佛與承諾而自思惟豫先最初為誰説法彼察知阿羅邏迦蘭為賢人彼將立即了解此法次復觀察知彼已死七日繼又思起優陀羅羅摩子知彼已於前夜死去繼又思起五群比丘之事五群比丘可為最大助力探知彼等居於波羅奈之鹿野苑中思將往彼處試轉法輪佛於數日之間只在菩提道場之四周巡回托鉢決定將於阿沙陀月滿月之日往波羅奈於十四日晨耳天明之際攜衣鉢旅行十八由旬之道路途中遇活命派之苦行者優波迦向彼言自己成佛是日將脯到達仙人墮處五群之長老等見如來由遠處前來相互約束諸法友等此沙門瞿曇為奢靡生活身體壯大諸根豐滿面黃金色前來此處豫等不可向彼禮拜因彼為王家所生惟只有座席之價值故只為彼設一座席佛以得知人天兩界一切生類心理狀態之智慧探知彼等之所思佛探知其心暫置對一切人天徹悟之慈心而對彼等擴布特別無上之慈心彼等觸及佛之特別慈念隨如來之接近彼等竟不守約束一同禮拜出迎如迎一切人時所應為之事然彼等不知佛成正覺只呼瞿曇之名呼之為友而對話於是佛向彼等曰汝等比丘不可向如來呼名呼友汝等比丘我已為如來等正覺者佛示知自身為佛坐所設最善之佛座後當阿沙陀星之相合時佛由一億八千萬之梵天等相隨呼五群之長老等説轉法輪經五群中之阿若憍陳如長老聽聞説法獲得智慧而佛説此經終了一億八千萬之大梵天共入預流果無我相經佛於其處入於安居翌日婆沙波長老留精舍中受佛之教他之四人比丘等出外托鉢婆沙波長老於午前中即達預流果如是翌日為跋提耶長老翌日為摩訶那摩長老又翌日為阿説示長老皆使入預流果佛於分月五日集五人之比丘衆説無我相經於此説法終了五人之長老等皆入阿羅漢果耶舍之歸佛佛見一良家子耶舍有歸佛之可能彼於夜間起厭世之志棄家出走時佛將其喚止耶舍汝來當晚彼即得預流果翌日入阿羅漢果彼招其友五十四人前來佛依出家法使之為出家比丘達阿羅漢果如是六十一人成阿羅漢時佛於雨安居終了行自恣時謂曰汝等比丘可往四方遊行佛遣六十比丘前往諸方其自身則赴優樓頻羅林中賢群青年之歸佛佛於中途棉樹林中指導賢群青年三十人其中最末者得預流果最上者入不還果佛使彼等悉依出家法出家遣往諸方佛自身赴優樓頻羅迦葉之歸佛佛於其處示現三千五百神通有優樓頻羅迦葉等結髮道士兄弟三人率一千結髮道士歸依佛法佛依出家法使之出家留住於象頭山依侍火方便之説法入阿羅漢果頻婆沙羅王之歸佛爾後佛思豫將完成頻婆娑羅王之約於是率此千人阿羅漢入王舍城附近之杖林苑王由林苑之守衛得聞佛前來率十二萬婆羅門及居士詣佛之所車輛之表附有雕刻黃金天蓋放大光明王以頭頂禮如來之足與從者共退居一隅而坐但諸婆羅門及居士抱持疑惑此大沙門為就優樓頻羅迦葉修梵行耶抑或優樓頻羅迦葉就大沙門修梵行耶佛知彼等心中所思以偈問長老曰二八二優樓頻羅汝住苦行教誨者汝因何見棄火神迦葉以此意義我問汝如何汝今棄祀火長老亦知佛心而唱偈曰二八三諸欲婦女色聲味我曾以此説供犧今悟有質皆垢穢供犧祭祀不染著迦葉唱此偈後為示知自己為佛弟子置頭於佛之足甲云尊師世尊豫師豫為世尊之弟子於是由一多羅樹高二多羅樹高三多羅樹高乃至七多羅樹高七度升降禮拜如來退坐一隅多人見此神通思惟今得見識阿羅漢有如斯力誠然佛有大威神力諸人曰優樓頻羅迦葉破邪見網受如來教化於是皆一心稱讚佛德佛言我之教化優樓頻羅迦葉非自今始彼於昔日即受我之教化為明此意義佛説大那羅陀迦葉梵天本生談故事第五四四説四種真理爾時摩揭陀王頻婆沙羅與十一萬人共入預流果位其餘一萬人宣告為信士王坐於佛所向佛告五願望歸依佛後申告招待明日之供養由座起立右繞世尊為禮而去王舍城民之拜佛翌日王舍城之住民不問見佛與否一億八千萬人衆悉為拜見如來晨起由王舍城向杖林苑湧來超過三迦烏達之路程上杖林苑到處人滿無有罅隙恰如祭日之時多數人衆拜見極美十力者之姿不知饜飽後稱此為稱讚地凡來此場所皆不能不讚譽如來之相好及隨形好之光榮色身如此拜見達美之極致十力者之姿多數人衆到處騷動林園與道路上無一比丘能得出入帝釋天之開道是日如是混雜佛赴王之招待實甚困難佛思欲斷食然此舉甚為不佳於是帝釋天之座位感覺熱暖彼知其理由變身為青年之姿降來十力者之前以天人之威力作一開擴之空地就佛法僧三寶述讚嘆之辭二八四柔和之人得柔脫結髮行者亦等同金色世尊似金飾一同進入王舍城二八五離脫行者得離脫結髮之人亦等同金色世尊似金飾一同進入王舍城二八六度脫之人得度脫結髮行者亦等同金色世尊似金飾一同進入王舍城二八七十住十力解十法十無學法彼世尊一千人衆附隨後一同進入王舍城彼立於佛前唱此等讚佛之偈諸多人衆見青年尊嚴之姿而思此青年甚美豫等前未曾見彼此互語此青年由何處而來為誰家子青年聞之唱偈曰二八八柔和一切處雄士絶倫比善士阿羅漢吾為彼侍僕佛通行依帝釋天所開之道率同一千比丘衆入王舍城竹林園奉獻王向佛與比丘衆行大施王曰尊師豫無三寶則不能生豫定時或不定時往詣世尊之所杖林苑甚遠豫處有竹林園甚近往來使捷相應為佛之住處世尊請受豫之林苑王由金瓶取香花所薰摩尼珠色之水澡十力者手喜捨竹林之園佛受此園之施為佛教建立根基大地及時震動閻浮提中除受取竹林園為佛住處之外無使大地震動之處又除銅掌鍱錫蘭島大精舍為佛住處外亦無使大地震動之處佛受取竹林園向王述謝辭後由座起立率比丘衆入竹林園內舍利弗目犍連之歸佛爾時有舍利弗目犍連二普行沙門住王舍城之附近求不滅之涅槃此二人中舍利弗見阿説示長老托鉢前來以起信仰心隨長老後聞諸法因緣生之偈悟達預流果彼向其友目犍連普行沙門説此偈聞之彼亦達預流果彼等二人會其本師刪闍耶説明原委與自己之弟子等俱詣佛處出家二人之中舍利弗七日即達阿羅漢果目犍連於半個月亦到達佛使此二人立於上首弟子地位舍利弗長老於尚未達阿羅漢時行其弟子衆之集會淨飯大王之苦慮如來在竹林園時淨飯大王聞訊云豫之王子六年苦行達最上之上菩提轉勝法輪住王舍城附近之竹林園內王聞此傳説呼大臣一人近前咐囑曰汝率千人往王舍城傳豫之語汝父淨飯大王思欲會汝並伴豫之王子歸來大臣遵命點頭諾王之語率千人急行六十由旬路程於十力者坐於四種弟子四衆中説法時進入精舍之中彼思王遣之事暫須擱置彼坐於聽衆之端聞佛説法而坐於彼處千人之從衆皆得阿羅漢果求佛允許出家世尊伸手謂曰善來汝等比丘於瞬間彼等悉依神通力持所作出之衣鉢如高齡百歲之長老大凡達阿羅漢聖者對任何物皆無挂慮之念彼等由王所遣之事豫以保留向佛不傳一方面王甚驚訝前往使者不還且無消息於是今更派遣一大臣與前同樣率衆前往彼行亦行矣但與前同樣與伴隨之人同得阿羅漢果默然不歸王反復派遣九人大臣附一千人衆但彼等皆完成自事之果默然住於其處而不歸迦留陀夷之出家如是無任何一人持來回音國王自思此等諸人毫無情誼音信皆無誰能完成豫之使命彼於宮廷內環顧無遺終於注目於迦留陀夷彼為王之親屬為王聽用信賴甚篤而與菩薩同日所生共同遊戲之幼友於是王呼彼近前王曰迦留陀夷豫思欲會豫之王子遣九千人而無一人還來報信人之生命時有障礙在豫有生之時豫思欲會王子汝能否使豫得見迦留陀夷言大王若允豫出家豫思能見王曰汝之出家與否為汝之心願汝須使豫會見王子彼遵王命攜王書信往王舍城於佛説法時立於聽衆之端聽法同伴人等皆達阿羅漢果佛曰比丘善來依出家法彼亦出家優陀夷之勸誘佛成佛後最初之雨安居於仙人墮處度過安居終了施行自恣赴優樓頻羅於其處度過三月教化結髮行者三兄弟率一千比丘於弗沙月滿月之日赴王舍城於其處滯在兩個月間至此自出波羅奈以來已五個月寒冷期完全度過而迦留陀夷長老來此已逾七八日之久彼長老於巴迦那月滿月之日思惟寒季過去已至春之季節諸人刈稻所向任何道路皆通大地掩蓋青草森林開放美花道路已可通行此為十力者探視親族之大好時機於是彼往世尊之處以六十偈讚譽十力者往故鄉都城之行二八九捨葉求此等果樹今已呈紅色光輝如火焰大雄尊今乃應分法味時二九不逾寒與暑乞食無飢饉地上草木青此正為其時以六十偈十力者赴其故鄉之都讚歎其所行佛赴迦毗羅衛城於是佛曰迦留陀夷何故汝如是讚譽旅行長老尊師父君淨飯大王言欲會汝請師返里探親以示好意佛曰善哉優陀夷我探親族以示好意汝往告知比丘大衆準備返鄉之旅長老言謹如尊命尊師於是長老向大衆傳知佛率央伽摩偈陀之良家子弟一萬人住迦毗羅衛者一萬人共二萬漏盡比丘由王舍城出發日行一由旬由王舍城至迦毗羅衛六十由旬將於兩個月中到達出為不急之旅淨飯大王之供養長老思念世尊出發之事當告於王彼升入空中出現於王之宮殿王見長老大喜招以高貴之座席王自調種種美味食物施盛於長老之鉢長老起立作欲行狀王曰汝就座進食長老言豫思欲往佛所謁佛王曰佛在何處長老言大王佛為會見王率二萬比丘衆於旅行途中王心甚喜云汝且進食豫為王子之至都之前由此處運到食物長老承諾王供養長老王以香粉薰香於鉢盛最美味之食物謂曰請獻與如來交付長老之手長老於衆人之前投鉢於空中然後自己升入空中攜食物而來交與佛手佛受而食之於是長老日日運來佛始終食王所獻之食物長老每當食事終了謂曰今日佛將至附近今日佛將至附近並説述與佛德相應之話使王族於尚未見佛之間對佛懷信仰之念是故佛曰我比丘弟子中能廣招在家信者之第一人即迦留陀夷是也佛使彼立第一位釋族之迎佛不久佛至釋族人等思見此親族之長老均來集會研鑽協議以世尊住處之預備地尼拘律釋家遊園稱為最好之居地並於其處調整一切之準備人人手執香花出迎以一切盛裝之小男兒女兒為先導其次為王家之子女其次為釋迦族人等獻香花粉香等導引世尊入尼拘律遊園佛於此處由二萬漏盡比丘圍繞至於所設美麗之華座釋族驚奇瑞元來釋族具高慢不遜之性質彼等思惟悉達太子較我等年少為我等弟為我等甥為我等子為我等孫彼等向年少王子等云汝等拜佛我等坐於汝等之後於是彼等坐而不拜佛知其意佛思我之親族不拜豫將使彼等禮拜佛入神通足定由定中出升入空中由彼等頭上落下塵土如前在犍咜菴羅樹下所現相同之二神通王見此奇瑞云世尊汝於降誕時為拜黑執天仙之足伴至其側反之豫見汝之足反落於婆羅門之頭上於是豫拜汝之足此為豫第一之禮拜又於蒔種式之日汝坐於閻浮樹之蔭所設臥榻之上而閻浮樹之樹影靜止豫見之向汝之足禮拜此為豫第二次之禮拜今豫見前此未曾見之奇瑞豫今更又拜汝之足此為豫第三次之禮拜如是王拜世尊於是不拜世尊之釋族無一人不向佛各各禮拜如是世尊使親族禮拜由空中降下著於設席毗輸安呾囉王子本生談世尊就座親族來集達最高潮彼等皆心注於一點而坐爾後大雲群出降蓮葉雨出銅色水妙音降落思欲濡雨之人則降落於其身對不欲濡雨之人則一滴亦不沾身釋族人等相顧語曰此實不可思議實為稀有佛曰豫之親族得受蓮葉之雨非自今日始昔日亦有降注之事為説明此意義當於毗輸安呾囉王子本生談故事第五四七中詳述聞佛説法後諸人皆由座起立禮佛而去王與大臣任何一人皆思請受豫等家之供養故不離去迦毗羅衛之行乞翌日佛率二萬比丘於迦毗羅衛城各處托鉢然無一人招待亦無一人接鉢佛立於城門席居之上思惟昔日諸佛於自己故鄉之都如何行乞耶不依順序唯巡回於權威諸人之家耶抑向各戶順次行乞耶繼而佛知凡每一佛無一不依順序行乞者佛思我亦必須依此傳統習慣我之弟子等將能效倣我托鉢完成義務於是彼由住於一端之人家開始次第次第行乞多數大衆謂曰氣品高貴之悉達太子步行托鉢於是開二樓三樓乃至以上樓閣之獅子座以見佛就中羅睺羅之母妃思惟彼高貴之王子於此同一都中具有王者之偉大威光乘金車巡視四方今竟剃落鬚髮身著黃衣手執土器步行托鉢豫將見其影像如何於是開獅子窗眺望見佛以種種離欲之相又以其身光之光輝照都之大路周圍放一尋之光明飾以三十二種大人相及八十種隨形好輝映氣品高貴佛之尊嚴彼女見此開始以人中獅子之八偈讚佛二九一彼有柔捲髮光滑深碧色彼有平滿額皎潔似太陽彼有隆準鼻高長柔適度善擴大光明人中之獅子彼女往告王曰汝之王子步行托鉢淨飯大王獲二果王心動轉手整衣服愴惶而出阻立於世尊之前王曰尊師何故為使豫等懷有恥思何為而步行托鉢只為此等比丘不得食物耶汝為何思耶佛言大王此為我等之作法王曰尊師豫等之系統非大選出剎帝利之系統耶此系統中無一步行乞食者佛言大王所謂王統乃貴王之系統我等乃為燃燈佛憍陳如佛乃至迦葉佛之佛統此諸佛及其他數千之諸佛亦為行乞依行乞以保生佛立於街頭唱偈二九二起勿放逸修善行法隨法行者永世樂臥佛唱此偈終了王即入預流果初果二九三修善行法勿修惡法隨法行者永世樂臥聞此偈後王即入一來果二果爾後王聞大護法本生談故事第三五八四四七入不還果臨終之時臥於白傘之下榮耀之臥榻達阿羅漢果如是王不須住森林中精勵勤修而得聖果羅睺羅母之拜佛王達預流果後取世尊之鉢招世尊與比丘衆至大宮殿以上味之軟硬食物供養食事終了後宮諸人皆出拜世尊唯羅睺羅之母妃不出侍女等雖向彼女勸告請向氣品高貴之王子禮拜然彼女不往曰若於我有德者王子應自來我處來時我當禮拜王持佛之鉢與二位上首弟子入王女之寢殿曰王女隨心禮拜汝等從傍不可言語佛著所設之座彼女急出捉佛之足踝頭擦佛之足甲隨心而拜於是王就王女對世尊懷極大之愛情與其德性為如次之談話尊師我女王子妃聞汝身著黃色之衣自此以來彼女亦為黃衣之人聞汝日取一食彼女亦為一食知汝廢大臥榻彼女則臥於碎布所作之臥榻知汝不用花環香等彼女亦皆不用豫之親族等致書彼女謂自願奉養然彼女不會見任何親族一人世尊豫女具如是之德性佛曰大王今王女知識十分睿智發達有王保護善守其身無何不思議處此人昔日智識尚未十分發達之時無誰保護步行於山麓而亦善守其身佛語月緊那羅本生談故事第四八五起座而離去難陀之出家第二日難陀王子行即位式新殿初入式及婚禮式時佛來其家交鉢與王子思欲使彼出家為唱祝咒由座起立而去其妃國美見王子隨佛而去謂曰王子殿下汝須速歸彼女延首而待但彼不敢向世尊言請受取鉢去如是隨往精舍而來彼雖不願但世尊仍使其出家如此世尊來至迦毗羅衛都城第三日難陀亦為世尊度之出家羅睺羅之出家第七日羅睺羅之母妃為王子羅睺羅著飾伴往世尊之側彼女王子汝觀有二萬沙門相伴面黃金色如梵天姿之沙門乃汝之父君彼有無數積蓄之寶為出家而不稍顧汝往彼處聲言父親豫為王子羅睺羅行灌頂式後豫為轉輪王因寶為必要請與豫寶子乃父之財産之主請豫我以王家之財産於是王子往世尊之側對父感得愛情大為歡喜曰沙門藉汝之福蔭大為爽快王子言與自己相應之事而立其傍世尊食畢起座即行離去王子續云沙門與我王家之財産沙門豫我王家之財産彼隨世尊之後而來世尊亦不令王子歸去王子亦與隨侍人等隨世尊同行而不能歸去如是王子與世尊同入園中世尊思惟此子欲父之寶彼受輪回惹起苦患豫將使其於菩提道場得七種貴重之寶使彼成為由出世之親讓渡財産之主於是招具壽舍利弗近前曰舍利弗汝可使此王子出家王子出家大王倍增苦惱大王難耐苦痛王向世尊言曰願乞世尊如無父母許可勿使其子出家王求佛承諾佛即與王以承諾淨飯大王獲不還果翌日佛於王宮中攝取朝食退坐一隅王曰尊師汝為苦行時一天人來豫之所告曰汝之王子已死豫不信其語豫之王子未達菩提不能死亡豫與斥退佛曰昔我雖示汝以骨云汝王子已死汝猶不信而今又如何能信佛為説明此意為説大護法本生談故事第四四七説此話將終王即入不還果如是佛使父成就三果率比丘衆再還王舍城處於寒林之中給孤獨長者爾時有居士給孤獨載五百輛車之物品往王舍城親友長者之宅於彼處聞佛世尊出世某日清晨甚早天人等以力開門得入詣佛之處聽法入預流果祇園精舍之建立第二日向佛及比丘衆行大施捨得佛承諾於舍衛城招待奉佛歸途中四十五由旬間各施一萬兩每一由旬建一精舍於祇園各方隅布金以一億八千萬兩收購起動工事彼為十力者於中央構築香室佛之房室環繞香室為八十位大長老各別室又有一重壁二重壁繪白鳥鶉鳥之長室無頂之棚舍其他坐臥處蓮池經行處夜間居住場所晝間居住場所等費金一億八千萬兩於適於住居之土地上建立華美之精舍派遣使者乞請十力者前來佛聞使者之傳信率比丘大衆離王舍城次第行進到達舍衛城內佛入祇園精舍一方大長者查精舍落成慶典之準備於如來入祇園之日使男子著各類之飾與五百少年等共同出迎男子與少年等手執醒目之五百種五色布幢為十力者之最先導其後由大善賢小善賢二長者之女與五百少女等續持滿水之瓶其後為長者盛裝之妻由五百婦女相隨各各手執滿盛食物之鉢最後為大長者自身著新衣與五百長者同立於世尊之前方世尊使此信士男子先行彼由諸大比丘衆圍繞以身光照耀林園內部如黃金染為薄赤之色以無限佛之威力以無比倫之佛祥福入於祇園精舍給孤獨長者問佛尊師此精舍如何佛言善哉居士請為現在世及未來世比丘衆之布施長者謹如尊命尊師長者取金瓶以水澡十力者之手為獻辭曰此祇園精舍捧獻佛與現在世及未來世之四方比丘衆佛受精舍述謝辭並述施此精舍之功德二九四人得避寒暑亦可避猛獸蛇蚊皆可避又可避冷雨二九五烈風熱來避入定為禪觀保護與安寧精舍施僧伽施捨最第一為佛所稱讚二九六己知大利益是為賢智人樂構此精舍其處住多聞二九七布施以信心飲料與食物衣服坐臥具應施直心人二九八彼等為此人為説除苦法此處彼知法無漏般涅槃精舍落成之慶讚給孤獨長者由第二日開始為落成之慶祝毗舍佉信士女為樓臺之祝賀四個月終了而給孤獨長者精舍落成之慶典繼續九個月間此慶讚共費黃金一億八千萬兩如是此一精舍合計共費金五億四千萬兩之寶過去大精舍之建立昔日毗婆尸佛時有普納巴斯密陀長者敷金瓦求買土地於彼處建一由旬之僧伽藍尸棄佛之時有錫利瓦多長者敷金板求買土地於其處建三伽烏達之僧伽藍毗舍浮佛之時有蘇提亞長者擺列金象之足求買土地於彼處建立半由旬之僧伽藍拘留孫佛之時有阿周陀長者敷金瓦求買土地於彼處建一伽烏達之僧伽藍拘那含牟尼佛之時有烏伽長者擺列金龜買取土地於彼處建半伽烏達之僧伽藍迦葉佛之時有蘇曼伽拉長者以敷金瓦買取林園於彼處建十六伽利薩面積之僧伽藍而我世尊之時有給孤獨長者敷一千萬之迦利沙波拏金幣求買林園於彼處建十八伽利薩之僧伽藍此皆為不棄一切諸佛之場所以上佛於大菩提道場達一切智後至就大般涅槃牀之間為佛在處之話此謂之近因緣談一切本生談將準此以為説明因緣談終
